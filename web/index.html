    "summaryJa": "OpenAIは、同社がIPOに向けて歩みを進める中、長年金融幹部を務めたデビッド・ベレス氏とロビン・ビンス氏を非営利および営利の取締役会に任命したと発表した。ベレス氏はラテンアメリカ最大のデジタル銀行であるヌーバンクの CEO であり、ビンス氏は金融サービス会社 BNY の CEO です。 OpenAIは火曜日の声明で、両社は同社に「テクノロジーが産業をどのように再構築し、経済成長を促進できるかについて補完的な視点」を提供すると述べた。",
    "bodyOriginal": "OpenAI said it appointed longtime financial executives David Vélez and Robin Vince to its nonprofit and for-profit boards of directors, as the company marches closer to a prospective IPO.\nVélez is the CEO of Nubank, the largest digital bank in Latin America, and Vince is the CEO of the financial services company BNY. OpenAI said in a statement on Tuesday that the pair will provide the company with \"complementary perspectives on how technology can reshape industries and drive economic growth.\"\nThe appointments come as OpenAI, which is valued at more than $850 billion, gears up for a potentially massive initial public offering. The company confidentially filed its prospectus with the Securities and Exchange Commission in June, though it hasn't disclosed an official timeline for when it plans to debut.\nOpenAI carried out a recapitalization in October that solidified its structure as a nonprofit, called the OpenAI Foundation, with a controlling stake in its for-profit business, the OpenAI Group PBC. The company said in a release at the time that the nonprofit's equity was valued at around $130 billion, and it has since touted the organization as one of the most well-resourced nonprofits in the world.\n\"David and Robin are exceptional leaders who have used technology to reshape financial services and expand opportunity at global scale,\" Bret Taylor, chair of the OpenAI Foundation and OpenAI Group PBC Boards, said in a statement. \"Their experience will be invaluable as OpenAI serves more businesses and people around the world, working to ensure AI benefits everyone.\"\nVélez and Vince will serve alongside OpenAI's existing board members, including Taylor, the former co-CEO of Salesforce, and OpenAI CEO Sam Altman. Quora CEO Adam D'Angelo, longtime healthcare executive Dr. Sue Desmond-Hellmann, Carnegie Mellon University professor Zico Kolter, retired U.S. Army General Paul Nakasone, Adebayo Ogunlesi, the co-founder of Global Infrastructure Partners, and former Sony executive Nicole Seligman are also board members.\nKolter is the only one who doesn't serve on the board of the for profit. OpenAI said in October that within a year of the recapitalization, a second foundation director would transition to \"serving exclusively on the Foundation Board and as a non-voting observer to the Group board.\"\nAltman was briefly ousted from his position as CEO in 2023, when the previous board members determined he was \"not consistently candid in his communications.\" Altman rejoined the company after a dramatic few days of negotiations, and he was reinstated on the board in March of 2024.\nWATCH: Watch CNBC’s full interview with OpenAI chairman and Sierra co-founder Bret Taylor",
    "bodyJa": "OpenAIは、同社がIPOに向けて歩みを進める中、長年金融幹部を務めたデビッド・ベレス氏とロビン・ビンス氏を非営利および営利の取締役会に任命したと発表した。\nベレス氏はラテンアメリカ最大のデジタル銀行であるヌーバンクの CEO であり、ビンス氏は金融サービス会社 BNY の CEO です。 OpenAIは火曜日の声明で、両社は同社に「テクノロジーが産業をどのように再構築し、経済成長を促進できるかについて補完的な視点」を提供すると述べた。\nこの任命は、時価総額8,500億ドル以上のOpenAIが、潜在的に大規模な新規株式公開に向けて準備を進めている中で行われた。同社は6月に証券取引委員会に目論見書を極秘に提出したが、デビュー計画の正式なスケジュールは明らかにしていない。\nOpenAIは10月に資本増強を実施し、営利事業であるOpenAI Group PBCの支配権を持つOpenAI Foundationと呼ばれる非営利団体としての構造を強化した。同社は当時のリリースで、この非営利団体の資本価値は約1,300億ドルであると述べ、それ以来、この団体が世界で最もリソースが豊富な非営利団体の1つであると宣伝してきた。\nOpenAI FoundationおよびOpenAI Group PBC取締役会の会長であるブレット・テイラー氏は声明で、「デービッドとロビンは、テクノロジーを利用して金融サービスを再構築し、世界規模で機会を拡大してきた傑出したリーダーである」と述べた。 「OpenAI が世界中のより多くの企業や人々にサービスを提供し、AI がすべての人に利益をもたらすよう努める中で、彼らの経験は非常に貴重なものとなるでしょう。」\nVélez氏とVince氏は、Salesforceの元共同CEOであるTaylor氏やOpenAI CEOのSam Altman氏を含むOpenAIの既存の取締役会メンバーと並行して務めることになる。 Quora CEOのアダム・ディアンジェロ氏、長年ヘルスケア企業幹部を務めたスー・デズモンド・ヘルマン博士、カーネギーメロン大学教授ジーコ・コルター氏、退役米陸軍大将ポール・ナカソネ氏、グローバル・インフラストラクチャー・パートナーズの共同創設者アデバヨ・オグンレシ氏、元ソニー幹部ニコール・セリグマン氏も取締役会メンバーである。\nコルター氏は営利目的で理事を務めていない唯一の人物である。 OpenAIは10月、資本増強後1年以内に、2人目の財団理事が「財団理事会のみで、グループ理事会の議決権を持たないオブザーバーとして勤務する」体制に移行すると発表した。\nアルトマン氏は2023年に、以前の取締役会メンバーが同氏が「一貫して率直なコミュニケーションをしていなかった」と判断し、一時的にCEOの職を追われた。アルトマン氏は劇的な数日間の交渉を経て同社に復帰し、2024年3月に取締役に復帰した。\n視聴: OpenAI 会長兼 Sierra 共同創設者のブレット・テイラー氏への CNBC のインタビュー全文をご覧ください。",

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getCategories() {
  const cats = new Set(ARTICLES.map((a) => a.category));
  return ["すべて", ...cats];
}

function getArticleById(id) {
  return ARTICLES.find((a) => a.id === id);
}

function getArticlesByCategory(category) {
  if (!category || category === "すべて") return ARTICLES;
  return ARTICLES.filter((a) => a.category === category);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function paragraphs(text) {
  return text.split("\n\n").filter(Boolean);
}


let activeCategory = "すべて";

function navigate(hash) {
  if (hash) location.hash = hash;
  else {
    history.pushState(null, "", location.pathname + location.search);
    location.hash = "";
  }
  render();
  window.scrollTo(0, 0);
}

function updateMobileBar(show) {
  const bar = document.getElementById("mobile-back-bar");
  document.body.classList.toggle("has-mobile-bar", show);
  if (bar) bar.classList.toggle("hidden", !show);
}

function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("article/")) {
    return { page: "article", id: decodeURIComponent(h.slice(8)) };
  }
  return { page: "home" };
}

function renderHome() {
  document.title = "BizNews JP | ビジネスニュース和訳";
  updateMobileBar(false);
  const main = document.getElementById("app");
  main.className = "main-content";
  main.innerHTML = `
    <section>
      <h1 class="page-title">ビジネスニュース</h1>
      <p class="page-desc">世界の主要メディアから厳選。要約と全文和訳付き。</p>
    </section>
    <div class="category-bar" id="category-bar" role="tablist" aria-label="カテゴリ"></div>
    <div id="articles-container"></div>
    <div class="info-box">
      <strong>記事の読み方：</strong>
      各記事を開くと、まず全文の要約（日本語）が表示されます。その下に和訳全文を掲載しています。原文は折りたたみで確認できます。
    </div>`;
  renderCategories();
  renderArticles();
}

function renderCategories() {
  const bar = document.getElementById("category-bar");
  if (!bar) return;
  const categories = getCategories();
  bar.innerHTML = categories
    .map(
      (cat) =>
        `<button type="button" class="cat-btn${cat === activeCategory ? " active" : ""}" data-category="${escapeHtml(cat)}" role="tab">${escapeHtml(cat)}</button>`
    )
    .join("");
  bar.querySelectorAll(".cat-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      renderCategories();
      renderArticles();
    });
  });
}

function renderArticles() {
  const container = document.getElementById("articles-container");
  if (!container) return;
  const filtered = getArticlesByCategory(activeCategory);
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0">該当する記事がありません。</p>';
    return;
  }
  const [featured, ...rest] = filtered;
  let html = "";
  if (featured) {
    html += `
      <a href="#article/${encodeURIComponent(featured.id)}" class="featured-card" style="margin-bottom:0.75rem;display:block">
        <div class="featured-img-wrap">
          <img src="${featured.imageUrl}" alt="${escapeHtml(featured.titleJa)}" loading="lazy" />
          <div class="featured-overlay"></div>
          <div class="featured-overlay-text">
            <span class="badge">${escapeHtml(featured.category)}</span>
            <h2 class="featured-title">${escapeHtml(featured.titleJa)}</h2>
          </div>
        </div>
        <div class="card-body">
          <p class="card-summary">${escapeHtml(featured.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(featured.source)}</span><span>·</span>
            <span>${formatDate(featured.publishedAt)}</span><span>·</span>
            <span>${featured.readTime}分で読める</span>
          </div>
        </div>
      </a>`;
  }
  if (rest.length) {
    html += '<div class="articles-list">' + rest.map((a) => `
      <a href="#article/${encodeURIComponent(a.id)}" class="article-card">
        <div class="card-thumb"><img src="${a.imageUrl}" alt="${escapeHtml(a.titleJa)}" loading="lazy" /></div>
        <div class="card-content">
          <span class="badge badge-light">${escapeHtml(a.category)}</span>
          <h3 class="card-title">${escapeHtml(a.titleJa)}</h3>
          <p class="card-summary" style="-webkit-line-clamp:2;margin-top:0.25rem">${escapeHtml(a.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(a.source)}</span><span>·</span>
            <span>${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </a>`).join("") + "</div>";
  }
  container.innerHTML = html;
}

function renderArticlePage(id) {
  const article = getArticleById(id);
  const main = document.getElementById("app");
  main.className = "main-content article-detail";
  if (!article) {
    document.title = "記事が見つかりません | BizNews JP";
    updateMobileBar(false);
    main.innerHTML = `
      <div class="not-found">
        <h1>記事が見つかりません</h1>
        <p>お探しの記事は存在しないか、削除された可能性があります。</p>
        <a href="#" class="btn-primary" onclick="navigate('');return false;">トップに戻る</a>
      </div>`;
    return;
  }
  updateMobileBar(true);
  document.title = article.titleJa + " | BizNews JP";
  const parasJa = paragraphs(article.bodyJa).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  const parasEn = paragraphs(article.bodyOriginal).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  main.innerHTML = `
    <a href="#" class="back-link" onclick="navigate('');return false;">← 記事一覧に戻る</a>
    <div class="article-hero"><img src="${article.imageUrl}" alt="${escapeHtml(article.titleJa)}" /></div>
    <header class="article-header">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;margin-bottom:0.75rem">
        <span class="badge">${escapeHtml(article.category)}</span>
        <span style="font-size:0.75rem;color:#94a3b8">${escapeHtml(article.source)}</span>
      </div>
      <h1 class="article-h1">${escapeHtml(article.titleJa)}</h1>
      <p class="article-title-en">${escapeHtml(article.title)}</p>
      <div class="card-meta">
        <time datetime="${article.publishedAt}">${formatDate(article.publishedAt)}</time>
        <span>·</span><span>約${article.readTime}分で読める</span>
      </div>
    </header>
    <section>
      <div class="section-heading"><div class="section-bar"></div><h2>要約</h2></div>
      <div class="summary-box"><p>${escapeHtml(article.summaryJa)}</p></div>
    </section>
    <section>
      <div class="section-heading"><div class="section-bar gray"></div><h2>和訳全文</h2></div>
      <div class="translation-box">${parasJa}</div>
    </section>
    <section>
      <button type="button" class="toggle-btn" id="toggle-original" aria-expanded="false">
        <span>原文（英語）を表示する</span><span class="arrow">▼</span>
      </button>
      <div class="original-box hidden" id="original-box">${parasEn}</div>
    </section>
    <p class="source-line">出典：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.source)}</a></p>`;
  const toggleBtn = document.getElementById("toggle-original");
  const originalBox = document.getElementById("original-box");
  toggleBtn.addEventListener("click", () => {
    const isHidden = originalBox.classList.toggle("hidden");
    const isOpen = !isHidden;
    toggleBtn.classList.toggle("open", isOpen);
    toggleBtn.setAttribute("aria-expanded", String(isOpen));
    toggleBtn.querySelector("span").textContent = isOpen ? "原文（英語）を隠す" : "原文（英語）を表示する";
  });
}

function render() {
  const route = getRoute();
  if (route.page === "article") renderArticlePage(route.id);
  else renderHome();
}

window.addEventListener("hashchange", render);
window.addEventListener("popstate", render);
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.getElementById("mobile-back-btn");
  if (backBtn) backBtn.addEventListener("click", () => navigate(""));
  render();
});

  </script>
</body>
