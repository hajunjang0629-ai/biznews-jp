    "summaryJa": "休日に見知らぬ人と家を交換して6,000ポンドを節約しました- 公開されました",
    "bodyOriginal": "We saved £6,000 on holidays by swapping homes with strangers\n- Published\nWould you swap homes with a stranger in exchange for a cheaper holiday? Or would the idea of someone sleeping in your bed and using your kitchen while you were away put you off?\nHenry Vanderpump, 42, his wife Elliw, 39, and their two young children have had two home exchange holidays in the past two years and have another planned this summer.\nIn each case, they have stayed in another family's home, while that family stays in theirs, a five-bedroom house in Tarporley, rural Cheshire.\nNeither side pays anything for their accommodation, although they do pay an annual membership fee to Home Link, the listings site they use to book the trips.\nSo far, the Vanderpumps have stayed in similarly sized properties in Hamburg and Copenhagen, and Henry says they have saved around £2,500 on accommodation per trip, plus a further £700 on transport, as they also swapped cars.\n\"We used to have one holiday a summer, now we have two [because of the savings we make from home exchanges]. And the kids love the idea of living in someone else's house while that person is living in theirs.\"\nHome exchanges have been around since at least the 1950s, but an increasing number of people seem to be embracing them because of the rising cost of living, or simply to experience a new type of travel, commentators say.\n'We lived like a German family'\nHenry says the best thing about swapping homes isn't the savings but getting to visit places off the tourist trail and have a \"really authentic experience\".\nWhen the family visited Hamburg in 2024, they stayed in a suburb and lived \"like a German family\" for a week, exploring lakes on the edge of the city recommended by their hosts.\nLast year, they stayed in \"a very Scandinavian house\" in suburban Copenhagen, which was \"all on one level and had no clutter\".\n\"They also left us several electric bikes to use,\" Henry says. \"We cycled to the beach, swam in the Baltic and tried restaurants they recommended.\"\nSome people are not comfortable with the idea of strangers staying in their home, and for those who are, there's a lot of preparation and tidying to do before their guests arrive.\nHome swappers may also have to be more flexible about when they travel - Home Link says members typically send 10-15 messages before getting an offer.\n\"Last minute bookings won't always work,\" says May Burrough, 38, a chief operating officer from London who has done 34 home swaps over the last three years using HomeExchange.\nRather than doing direct exchanges, she hosts people in her central London flat while she's overseas staying with her partner in France.\nThis way, May builds up points on the platform she can use to book trips at other times.\nHow to home swap successfully\nIf you are putting your home on a booking platform, make the listing clear, with plenty of information and appealing photos\nKeep in contact before and during the exchange to build trust and avoid misunderstandings\nDeclutter and make space in wardrobes, drawers and cupboards your guests will use\nLeave a comprehensive guide for guests, covering things like appliance instructions, rubbish collection and emergency information\nShare local recommendations to help them get the most out of their stay\nLock away items of value to avoid them being damaged\nCheck that your home insurance policy provides the cover you need\nSources: Home Link, HomeExchange, the Association of British Insurers\nMay reckons she has saved about £5,000-£8,000 through swaps in places like Barcelona and the Swiss Alps.\nShe loves the \"community feel\" of home exchanges and says she's only ever had one \"semi-negative experience\" when a booking she thought was for a whole flat turned out to be a room in a flat share.\nAs for preparation before guests arrive, she says she tries to make sure her flat is clean and clears some space in her wardrobe. \"I provide clean sheets and towels. I lock away valuables.\"\nThe main home-swap listings platforms vet their members and invite them to review one another.\nBut the Association of British Insurers advises hosts to check that their home and contents insurance provides the cover they need before hosting guests.\nIt also says it is worth checking your travel insurance before staying in someone else's home to check it covers accidental damage.\nPetra Novak, who uses the home swap site Kindred, says the platform's own damage protection policy has covered her on the few occasions something was damaged in her London flat.\nThe 34-year-old, who uses the platform as she works remotely around Europe, says she has saved some £18,000-£20,000 through home exchanges.\nShe says she was nervous about swapping homes with strangers at first but has never had a bad experience.\nHowever, for added peace of mind, she likes to check out the social media profiles of prospective guests, adding that a personal touch can help build trust before an exchange.\n\"I personally like when someone submits their booking request along with a nice introduction letter, telling me about themselves and the reason why they would be visiting London.\"",
    "bodyJa": "休日に見知らぬ人と家を交換して6,000ポンドを節約しました\n- 公開されました\nより安価な休暇と引き換えに、見知らぬ人と家を交換しますか?それとも、あなたがいない間に誰かがあなたのベッドで寝ていてキッチンを使うと思うと嫌になりますか?\nヘンリー・ヴァンダーポンプさん（42歳）と妻のエリーさん（39歳）、そして二人の幼い子供たちは、過去2年間に2回自宅交換休暇を過ごしており、この夏にはもう一つの休暇を計画している。\nいずれの場合も、彼らは別の家族の家に滞在し、その家族はチェシャーの田舎、ターポーリーにある寝室が5つある自分たちの家に滞在している。\nどちらも宿泊費は一切支払わないが、旅行の予約に利用する物件情報サイト「ホームリンク」には年会費を支払っている。\nこれまでヴァンダーポンプ一家はハンブルクとコペンハーゲンにある同様の広さの物件に滞在しており、ヘンリーさんによると、旅行ごとに宿泊費が約2,500ポンド、さらに車も交換したため、交通費がさらに700ポンド節約できたという。\n「以前は夏に1回の休暇がありましたが、今は（住宅交換で得た節約のおかげで）2回あります。そして、子供たちは、その人が自分の家に住んでいる間、他の人の家に住むというアイデアが大好きです。」\nコメンテーターらによると、ホームエクスチェンジは少なくとも1950年代から存在しているが、生活費の上昇を理由に、あるいは単に新しいタイプの旅行を体験するためにこれを受け入れる人が増えているようだという。\n「私たちはドイツ人の家族のように暮らしました」\nヘンリーさんは、家を交換する一番の利点は節約ではなく、観光コースから外れた場所を訪れて「本当に本物の体験」ができることだと語った。\n2024年に家族がハンブルクを訪れたとき、家族は郊外に滞在し、ホストの勧めで市外れの湖を探索しながら「ドイツ人の家族のように」1週間暮らした。\n昨年、夫妻はコペンハーゲン郊外にある「まさにスカンジナビア風の家」に滞在したが、そこは「すべてが同じ階にあり、散らかったものは何もなかった」という。\n「彼らはまた、私たちに使用できる電動自転車を数台残してくれました」とヘンリーは言います。 「私たちは自転車でビーチに行き、バルト海で泳ぎ、彼らが勧めてくれたレストランを試しました。」\n見知らぬ人が家に泊まるという考えに抵抗を感じる人もいます。そのような人にとっては、ゲストが到着する前にたくさんの準備や片付けをしなければなりません。\nホーム交換者は旅行の時期についてもより柔軟になる必要があるかもしれない - Home Link によると、メンバーはオファーを得る前に通常 10 ～ 15 件のメッセージを送信するという。\n「直前の予約が常にうまくいくとは限りません」と、HomeExchange を使用して過去 3 年間で 34 件の住宅交換を行ったロンドン在住の最高執行責任者、メイ バロー氏 (38 歳) は言います。\n彼女は、フランスにいるパートナーと一緒に海外に滞在している間、直接的な交流を行うのではなく、ロンドン中心部のアパートで人々を受け入れています。\nこのようにして、メイさんはプラットフォーム上にポイントを貯め、別の機会に旅行を予約するために使用できます。\nホームスワップを成功させる方法\n自宅を予約プラットフォームに掲載する場合は、豊富な情報と魅力的な写真を掲載し、明確なリストを作成してください。\n信頼を築き、誤解を避けるために、交換前および交換中に連絡を取り続けます。\nゲストが使用するワードローブ、引き出し、食器棚を整理してスペースを作ります\n家電製品の説明書、ゴミの収集、緊急情報などを網羅した包括的なガイドをゲスト向けに残してください。\n滞在を最大限に楽しむために地元のおすすめ情報を共有する\n貴重品は破損しないように鍵をかけて保管してください\n住宅保険契約が必要な補償を提供しているかどうかを確認してください\n出典: Home Link、HomeExchange、英国保険会社協会\nメイさんは、バルセロナやスイスアルプスなどでの交換を通じて、約5000ポンドから8000ポンドを節約したと考えている。\n彼女はホームエクスチェンジの「コミュニティ感」が大好きで、アパート全体を予約すると思っていたのにアパートシェアの一室だったことが判明したときの「半否定的な経験」は一度だけだという。\nゲストが到着する前の準備に関しては、アパートを清潔にし、ワードローブにスペースを空けるように努めていると彼女は言います。 「清潔なシーツとタオルを提供します。貴重品は鍵をかけて保管します。」\n主要な住宅交換物件プラットフォームは会員を精査し、相互にレビューするよう招待しています。\nしかし、英国保険協会はホストに対し、ゲストを迎える前に、住宅保険や生活物品保険が必要な補償を提供しているかどうかを確認するようアドバイスしている。\nまた、他人の家に滞在する前に、旅行保険が偶発的な損害をカバーしているかどうかを確認する価値があるとも述べています。\n住宅交換サイト「Kindred」を利用しているペトラ・ノバクさんは、ロンドンのアパートで何かが破損したことは数回あったが、プラットフォーム独自の損害補償ポリシーでカバーされていると語った。\nヨーロッパ各地でリモートで仕事をする際にこのプラットフォームを利用している34歳の彼女は、ホームエクスチェンジを通じて約1万8000ポンドから2万ポンドを節約したと語る。\n最初は見知らぬ人と家を交換することに緊張したが、悪い経験は一度もなかったと彼女は言う。\nしかし、さらに安心感を与えるために、彼女は見込み客のソーシャルメディアのプロフィールをチェックするのが好きで、交流の前に個人的なタッチをすることで信頼を築くことができると付け加えました。\n「個人的には、誰かが自分自身のことやロンドンを訪れる理由を伝える素敵な紹介状と一緒に予約リクエストを提出するのが好きです。」",

  {
    "id": "new-fed-task-force-members-share-chairma-a4b75285",
    "title": "New Fed task force members share Chairman Kevin Warsh's embrace of AI",
    "titleJa": "FRB特別委員会の新メンバーがケビン・ウォーシュ議長のAIへの支持を共有",
    "summaryJa": "ケビン・ウォーシュ議長は木曜日、連邦準備理事会に外部の考え方を導入することを目的とした一連の特別委員会には「最も優れた頭脳」が含まれると述べた。 FRBの経済運営に特に影響を与える可能性のある人工知能に関する特別委員会にとって、外部の人々は皆同じ方向を向いているようだ。ウォーシュ氏の AI タスクフォースのメンバーは全員、AI が成長と生産性に広範囲に影響を与える革新的なテクノロジーになると信じているようだ。それはウォーシュ自身の見解と一致する。彼は特別委員会のメンバーを個人的に選出した。",
    "bodyOriginal": "A series of task forces designed to bring outside thinking to the Federal Reserve will include the \"best minds,\" Chairman Kevin Warsh said Thursday. For a task force that could be especially consequential for the Fed's management of the economy — on artificial intelligence — those outside minds all seem to lean in the same direction.\nWarsh's AI task force members all appear to believe AI will be a transformative technology, with far-reaching effects on growth and productivity. That lines up with Warsh's own views. He selected the task-force members personally.\nThe AI task force was one of five the Fed rolled out Thursday. Its formal charge is to \"assess the economic impact of new general-purpose technologies, including artificial intelligence, to inform the Federal Reserve's policy judgments.\" It will be led by three external advisors: venture capitalist Marc Andreessen, economist Charles I. Jones, and Xbox CEO Asha Sharma.\nAll have recently spoken or written in sharply positive terms about the effects of AI on the economy.\nThe Fed chairman is a longtime proponent of the potentially transformative economic potential of AI. Its adoption is \"perhaps as important a change in the economy and business and households that we've had in my adult lifetime,\" Warsh said in June at his first press conference as chairman.\nHe said in 2025 that he believed advancements in AI would be a reason for the Fed to cut interest rates, because it would help the economy to grow quickly without raising inflation.\nWarsh has been personal friends with Andreessen for decades. Warsh also ran venture-capital investments for investor Stanley Druckenmiller after a stint at the Fed that ended in 2011. That expanded his Silicon Valley network — and his wealth.\nAndreessen made a fortune creating some of the internet's earliest web browsers and is now one of AI's most vocal evangelists. \"We've turned sand into thought,\" Andreessen told podcaster Joe Rogan in May, referencing the silicon that is the physical basis for AI chips.\nJones, the economist, shares much of Andreessen's West Coast optimism. Jones recently went on leave from Stanford University to join the Anthropic Institute, part of leading AI firm Anthropic. Jones's academic work recently has focused on the effects of AI on economic growth, making him an important voice in Warsh's efforts to bring the Fed around to his point of view.\nJones noted in a recent paper that U.S. growth per capita has consistently averaged 2% over much of U.S. history. \"Nevertheless, if AI eventually automates away nearly all the weak links in the economy, economic growth could accelerate significantly, with rates potentially exceeding 5 percent per year,\" he wrote.\nThe paper analyzes what Jones identifies as weak links — aspects of the economy that will be difficult to automate — and considers lower potential growth rates as well. But Jones writes bluntly that AI \"will likely be the most transformative technology of the modern era.\"\nSharma, who in February became CEO of Microsoft's Xbox gaming business, has made strong statements in support of AI. But as the leader of an operating business, she made the rare decision not to prioritize AI. Even as Microsoft incorporates AI into all aspects of its products, Sharma opted not to put it front and center on Xbox, she said in a recent Bloomberg interview.\n\"Our console players aren't excited about that experience,\" Sharma said.\nBut that doesn't make her a skeptic. \"Now, do I believe in AI? Absolutely,\" she said.\nThe three task force members didn't immediately respond to a request for comment. The Fed declined to comment.\nWhere Warsh may encounter skeptics is on the Federal Open Market Committee, which has the power to set interest rates. FOMC members discussed at its June meeting the question of whether AI can raise productivity, minutes from the discussion released this week show. Some FOMC participants bought into the idea that productivity would speed up, the minutes said.\nAnd yet they weren't fully sold. \"These participants remarked, however, that considerable uncertainty remained regarding both the timing and magnitude of potential productivity gains, which were expected to lag the ongoing boost of AI adoption on demand.\"\nMeanwhile, U.S. tech firms' headlong embrace of AI is starting to heat the economy. New York Fed President John Williams on Thursday said he was concerned about price increases in electricity and semiconductors from the AI boom.\nPrices have risen like a \"hockey stick,\" with some components doubling and tripling, Williams said. AI is a \"demand shock,\" he said, adding that it is unclear if supply will grow alongside it, which would be necessary to keep inflation down.\nThe Fed meets again at the end of July, when it is expected to hold interest rates steady. The task forces are expected to finish their work by the end of the year.",
    "bodyJa": "ケビン・ウォーシュ議長は木曜日、連邦準備理事会に外部の考え方を導入することを目的とした一連の特別委員会には「最も優れた頭脳」が含まれると述べた。 FRBの経済運営に特に影響を与える可能性のある人工知能に関する特別委員会にとって、外部の人々は皆同じ方向を向いているようだ。\nウォーシュ氏の AI タスクフォースのメンバーは全員、AI が成長と生産性に広範囲に影響を与える革新的なテクノロジーになると信じているようだ。それはウォーシュ自身の見解と一致する。彼は特別委員会のメンバーを個人的に選出した。\nAIタスクフォースはFRBが木曜日に展開した5つのうちの1つだった。その正式な任務は、「連邦準備制度の政策判断に情報を提供するために、人工知能を含む新しい汎用技術の経済的影響を評価する」ことである。ベンチャーキャピタリストのマーク・アンドリーセン氏、経済学者のチャールズ・I・ジョーンズ氏、Xbox CEOのアシャ・シャルマ氏という3人の外部アドバイザーが率いることになる。\n全員が最近、AI が経済に及ぼす影響について非常に肯定的な言葉で話したり書いたりしています。\nFRB議長は長年、AIが経済に変革をもたらす可能性を提唱している。ウォーシュ氏は6月、会長として初めての記者会見で、この政策の導入は「おそらく私が成人してから経験したのと同じくらい重要な経済、企業、家計の変化だ」と述べた。\n同氏は、AIの進歩がインフレ率を上昇させることなく経済の急速な成長を促すため、2025年にはFRBが利下げする理由になるとの考えを示した。\nウォーシュはアンドリーセンと数十年来の個人的な友人だ。ウォーシュ氏はまた、2011年にFRB勤務を終えた投資家スタンリー・ドラッケンミラー氏のためにベンチャーキャピタルへの投資も行った。これにより彼のシリコンバレーのネットワークと富が拡大した。\nアンドリーセン氏は、インターネットの初期の Web ブラウザーのいくつかを作成して富を築き、現在では AI の最も声高な伝道者の 1 人です。 「私たちは砂を思考に変えました」とアンドリーセン氏は5月にポッドキャスターのジョー・ローガン氏に語り、AIチップの物理的基盤であるシリコンに言及した。\n経済学者のジョーンズ氏は、アンドリーセン氏の西海岸の楽観主義に多くの共感を抱いている。ジョーンズ氏は最近、大手AI企業アンスロピック社の一部であるアンスロピック研究所に入社するため、スタンフォード大学を休学した。ジョーンズ氏の学術研究は最近、AIが経済成長に及ぼす影響に焦点を当てており、FRBを自分の視点に近づけようとするウォーシュ氏の取り組みにおいて重要な発言者となっている。\nジョーンズ氏は最近の論文で、米国の歴史の大部分において、米国の一人当たりの成長率は一貫して平均2%であったと指摘した。 「それでも、最終的にAIが経済の脆弱な部分のほぼすべてを自動化すれば、経済成長は大幅に加速し、その率は年間5％を超える可能性がある」と同氏は書いた。\nこの論文は、ジョーンズ氏が弱点として特定したもの、つまり自動化が困難な経済の側面を分析し、潜在成長率の低下についても考慮しています。しかしジョーンズ氏は、AIは「おそらく現代で最も革新的なテクノロジーになるだろう」と率直に書いている。\n2月にマイクロソフトのXboxゲーム事業のCEOに就任したシャルマ氏は、AIを支持する強い発言をしている。しかし、運営ビジネスのリーダーとして、彼女は AI を優先しないという珍しい決断を下しました。マイクロソフトは AI を自社製品のあらゆる側面に組み込んでいますが、シャルマ氏はそれを Xbox の中心に据えることを選択しなかった、と最近のブルームバーグのインタビューで述べました。\n「当社のコンソールプレイヤーはその体験に興奮していません」とシャルマ氏は語った。\nしかし、だからといって彼女が懐疑的になるわけではない。 「さて、私はAIを信じますか？もちろん信じます」と彼女は言った。\n特別委員会のメンバー３人はコメントの要請に応じていない。 FRBはコメントを控えた。\nウォーシュ氏が懐疑論者に遭遇する可能性があるのは、金利を設定する権限を持つ連邦公開市場委員会だ。今週公表された議論の議事録によると、FOMCメンバーらは6月の会合でAIが生産性を向上できるかどうかという問題について議論した。議事要旨によると、一部のＦＯＭＣ参加者は生産性が向上するという考えを支持したという。\nしかし、まだ完全には売れていませんでした。 「しかし、これらの参加者は、潜在的な生産性向上のタイミングと規模の両方に関してかなりの不確実性が残っており、オンデマンドでの AI 導入の継続的な促進に遅れることが予想されると述べた。」\nその一方で、米国のハイテク企業による AI への真っ向からの取り組みが経済を加熱し始めている。ニューヨーク連銀のウィリアムズ総裁は木曜日、AIブームによる電力と半導体の価格上昇を懸念していると述べた。\nウィリアムズ氏によると、価格は「ホッケーのスティック」のように上昇し、一部の部品では2倍、3倍になっているという。同氏はAIは「需要ショック」であると述べ、インフレ抑制に必要となる供給もそれに伴って増加するかどうかは不透明だと付け加えた。\nFRBは7月末に再び会合を開き、金利は据え置かれると予想されている。対策本部は年末までに作業を完了する予定だ。",

    "id": "kevin-warsh-names-members-of-his-federal-7d7af9cd",
    "title": "Kevin Warsh names members of his Federal Reserve task forces, including Marc Andreessen, Doug McMillon",
    "titleJa": "ケビン・ウォーシュはマーク・アンドリーセン、ダグ・マクミロンらを連邦準備制度の特別委員会のメンバーに指名",
    "summaryJa": "FRBのケビン・ウォーシュ議長は木曜日、FRBの運営を調査するための5つの特別委員会を構成する専門家の名前を発表した。そのリストにはウォール街の著名人、ビジネスリーダー、そして広範囲にわたる学者や元FRB関係者が含まれている。ウォーシュ氏は先月初めて特別委員会を設置する意向を明らかにし、コミュニケーション、データ、FRBのバランスシート、データ、生産性、雇用、政策立案者のインフレに対する見方の枠組みに取り組むと述べた。同グループは、ウォーシュ氏が約束した金融政策の見直しの一環として、インフレから人工知能まであらゆるものに取り組む予定だ。",
    "bodyOriginal": "Federal Reserve Chairman Kevin Warsh on Thursday released names of the experts who will comprise five task forces to examine the institution's operations — a list that includes several prominent Wall Street names, business leaders and a wide expanse of academicians and former Fed officials.\nWarsh first disclosed his intention to create the task forces last month, saying they would tackle communications, data, the Fed's balance sheet, data, productivity and jobs and the framework for how the policymakers view inflation. The group's will tackle everything from inflation to artificial intelligence as part of Warsh's promised review of monetary policy.\nAmong the prominent names involved are venture capitalist Marc Andreessen, former Bank of England Governor Mervin King, and Greg Mankiw, former chairman of the White House's Council of Economic Advisers. Doug McMillon, the former CEO of Walmart, leads the names of business executives involved. Several of the names, including King, had been leaked previously.\n\"I am honored that the best minds from a range of disciplines have agreed to work with us to sharpen our performance as an institution,\" Warsh said. \"The goal is straightforward: to ensure the Fed is best positioned to achieve our objectives in this consequential time.\"\nA Fed news release did not indicate a timeline of when the task forces would complete their work, though Warsh has said he expects changes to come this year.\nThe statement also noted that the panels will \"operate independently, with a mandate to follow the evidence, provide candid feedback, and produce rigorous findings\" that will be reported back to officials on the Federal Open Market Committee.\nMembers represent a swath of interests, spanning ideologies and backgrounds.\nOthers named to the task forces include Raghuram Rajan, former governor the Reserve Bank of India; former Fed Governor Jeremy Stein and William White, a Canadian economist who warned about central bank easy money prior to the 2008 global financial crisis.\nFor Andreesen, this is the second prominent appointment in recent days, having been named in late June to the U.S. Defense Policy Board, a civilian advisory group for the Pentagon. Andreesen is on the productivity and jobs task force.\nWhen he initially announced the task forces, Warsh, who has been chairman for less than two months, said the groups would \"start with first principles; ask hard questions; examine current practice; consider alternatives; and, ultimately, propose next steps for policymaker consideration.\"\nThe chairman said in the Thursday announcement that the Fed has \"resolve to pursue our mandate with rigor.\"\nThe task forces are expected to take a sharp look at Fed orthodoxy. Warsh already has had an impact on Fed communications as officials look to provide less guidance about where policy is headed and focus more on their \"reaction function,\" or the conditions under which they will adjust interest rates. The post-meeting statement in June was notably shorter than prior versions.\nThe members of the task forces are:\nCommunications: Peter R. Fisher, professor of practice, Foster School of Business, University of Washington; Arminio Fraga, founder and chairman, Gávea Investimentos and the former president of the Central Bank of Brazil; and King.\nBalance Sheet Policy: Karen Dynan, Harvard economist; Rajan and Stein.\nData: McMillon, Harvard economist Raj Chetty and University of Chicago economist Kevin Murphy.\nProductivity and Jobs: Andreesen, Stanford economist Charles I. Jones, and Asha Sharma, executive vice president and XBOX CEO at Microsoft.\nInflation Frameworks: Mankiw, White and New York University economist Thomas Sargent.\nThe groups will be supported as well by Fed staff.",
    "bodyJa": "FRBのケビン・ウォーシュ議長は木曜日、FRBの運営を調査するための5つの特別委員会を構成する専門家の名前を発表した。そのリストにはウォール街の著名人、ビジネスリーダー、そして広範囲にわたる学者や元FRB関係者が含まれている。\nウォーシュ氏は先月初めて特別委員会を設置する意向を明らかにし、コミュニケーション、データ、FRBのバランスシート、データ、生産性、雇用、政策立案者のインフレに対する見方の枠組みに取り組むと述べた。同グループは、ウォーシュ氏が約束した金融政策の見直しの一環として、インフレから人工知能まであらゆるものに取り組む予定だ。\n関与した著名人の中には、ベンチャーキャピタリストのマーク・アンドリーセン氏、元イングランド銀行総裁マービン・キング氏、元ホワイトハウス経済諮問委員長グレッグ・マンキュー氏などが含まれる。ウォルマートの元最高経営責任者（CEO）であるダグ・マクミロン氏が、関与した企業幹部の名前を率いている。キング氏を含む数人の名前は以前にリークされていた。\n「さまざまな分野の最高の人材が、機関としてのパフォーマンスを向上させるために私たちと協力することに同意したことを光栄に思います」とウォーシュ氏は述べた。 「目標は単純明快で、この重大な時期にFRBが目標を達成するために最適な立場にあることを保証することだ。」\nFRBのニュースリリースでは、タスクフォースがいつ作業を完了するかについてのスケジュールは示されていないが、ウォーシュ総裁は今年中に変更が加えられると予想していると述べた。\n声明ではまた、委員会は「証拠を追跡し、率直なフィードバックを提供し、厳密な調査結果を生み出すという使命のもと、独立して運営」され、それらの調査結果は連邦公開市場委員会の当局者に報告されると述べた。\nメンバーは、イデオロギーや背景にまたがる幅広い関心を代表しています。\n特別委員会に指名された他のメンバーには、元インド準備銀行総裁のラグラム・ラジャン氏も含まれる。元FRB総裁のジェレミー・スタイン氏と、2008年の世界金融危機前に中央銀行のイージーマネーについて警告したカナダの経済学者ウィリアム・ホワイト氏。\nアンドリーセン氏にとって、これは、6月下旬に国防総省の文民諮問機関である米国国防政策委員会のメンバーに指名されて以来、ここ数日で2度目の重要な任命となる。アンドリーセン氏は生産性と雇用の特別委員会に所属している。\n委員長に就任して2カ月も経っていないウォーシュ氏は、最初にタスクフォースの設立を発表した際、各グループが「第一原則から始め、厳しい質問をし、現在の慣行を調査し、代替案を検討し、最終的には政策立案者の検討のために次のステップを提案する」と述べた。\n議長は木曜日の発表で、FRBは「我々の任務を厳格に遂行する決意」をしていると述べた。\n特別委員会はFRBの正統性を厳しく検討すると予想されている。当局者が政策の方向性についてのガイダンスをあまり提供せず、「反応機能」、つまり金利を調整する条件に重点を置く傾向にあるため、ウォーシュ氏はすでにFRBのコミュニケーションに影響を与えている。 6月の会合後の声明は、以前の声明に比べて著しく短かった。\nタスクフォースのメンバーは次のとおりです。\nコミュニケーション: ピーター R. フィッシャー、ワシントン大学フォスター ビジネス スクール実践教授。アルミニオ・フラガ氏、Gávea Investimentos の創設者兼会長、ブラジル中央銀行の元総裁。そしてキング。\nバランスシート政策: カレン・ダイナン、ハーバード大学の経済学者。ラージャンとスタイン。\nデータ: マクミロン、ハーバード大学の経済学者ラジ・チェッティ、シカゴ大学の経済学者ケビン・マーフィー。\n生産性と雇用: アンドリーセン氏、スタンフォード大学の経済学者チャールズ I. ジョーンズ氏、およびマイクロソフトの執行副社長兼 XBOX CEO のアシャ シャルマ氏。\nインフレの枠組み: マンキュー、ホワイト、ニューヨーク大学の経済学者トーマス・サージェント。\nこれらのグループはFRB​​スタッフからも支援される予定だ。",

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getCategories() {
  const cats = new Set(ARTICLES.map((a) => a.category));
  return ["すべて", ...cats];
}

function getArticleById(id) {
  return ARTICLES.find((a) => a.id === id);
}

function getArticlesByCategory(category) {
  if (!category || category === "すべて") return ARTICLES;
  return ARTICLES.filter((a) => a.category === category);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function paragraphs(text) {
  return text.split("\n\n").filter(Boolean);
}


let activeCategory = "すべて";

function navigate(hash) {
  if (hash) location.hash = hash;
  else {
    history.pushState(null, "", location.pathname + location.search);
    location.hash = "";
  }
  render();
  window.scrollTo(0, 0);
}

function updateMobileBar(show) {
  const bar = document.getElementById("mobile-back-bar");
  document.body.classList.toggle("has-mobile-bar", show);
  if (bar) bar.classList.toggle("hidden", !show);
}

function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("article/")) {
    return { page: "article", id: decodeURIComponent(h.slice(8)) };
  }
  return { page: "home" };
}

function renderHome() {
  document.title = "BizNews JP | ビジネスニュース和訳";
  updateMobileBar(false);
  const main = document.getElementById("app");
  main.className = "main-content";
  main.innerHTML = `
    <section>
      <h1 class="page-title">ビジネスニュース</h1>
      <p class="page-desc">世界の主要メディアから厳選。要約と全文和訳付き。</p>
    </section>
    <div class="category-bar" id="category-bar" role="tablist" aria-label="カテゴリ"></div>
    <div id="articles-container"></div>
    <div class="info-box">
      <strong>記事の読み方：</strong>
      各記事を開くと、まず全文の要約（日本語）が表示されます。その下に和訳全文を掲載しています。原文は折りたたみで確認できます。
    </div>`;
  renderCategories();
  renderArticles();
}

function renderCategories() {
  const bar = document.getElementById("category-bar");
  if (!bar) return;
  const categories = getCategories();
  bar.innerHTML = categories
    .map(
      (cat) =>
        `<button type="button" class="cat-btn${cat === activeCategory ? " active" : ""}" data-category="${escapeHtml(cat)}" role="tab">${escapeHtml(cat)}</button>`
    )
    .join("");
  bar.querySelectorAll(".cat-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      renderCategories();
      renderArticles();
    });
  });
}

function renderArticles() {
  const container = document.getElementById("articles-container");
  if (!container) return;
  const filtered = getArticlesByCategory(activeCategory);
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0">該当する記事がありません。</p>';
    return;
  }
  const [featured, ...rest] = filtered;
  let html = "";
  if (featured) {
    html += `
      <a href="#article/${encodeURIComponent(featured.id)}" class="featured-card" style="margin-bottom:0.75rem;display:block">
        <div class="featured-img-wrap">
          <img src="${featured.imageUrl}" alt="${escapeHtml(featured.titleJa)}" loading="lazy" />
          <div class="featured-overlay"></div>
          <div class="featured-overlay-text">
            <span class="badge">${escapeHtml(featured.category)}</span>
            <h2 class="featured-title">${escapeHtml(featured.titleJa)}</h2>
          </div>
        </div>
        <div class="card-body">
          <p class="card-summary">${escapeHtml(featured.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(featured.source)}</span><span>·</span>
            <span>${formatDate(featured.publishedAt)}</span><span>·</span>
            <span>${featured.readTime}分で読める</span>
          </div>
        </div>
      </a>`;
  }
  if (rest.length) {
    html += '<div class="articles-list">' + rest.map((a) => `
      <a href="#article/${encodeURIComponent(a.id)}" class="article-card">
        <div class="card-thumb"><img src="${a.imageUrl}" alt="${escapeHtml(a.titleJa)}" loading="lazy" /></div>
        <div class="card-content">
          <span class="badge badge-light">${escapeHtml(a.category)}</span>
          <h3 class="card-title">${escapeHtml(a.titleJa)}</h3>
          <p class="card-summary" style="-webkit-line-clamp:2;margin-top:0.25rem">${escapeHtml(a.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(a.source)}</span><span>·</span>
            <span>${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </a>`).join("") + "</div>";
  }
  container.innerHTML = html;
}

function renderArticlePage(id) {
  const article = getArticleById(id);
  const main = document.getElementById("app");
  main.className = "main-content article-detail";
  if (!article) {
    document.title = "記事が見つかりません | BizNews JP";
    updateMobileBar(false);
    main.innerHTML = `
      <div class="not-found">
        <h1>記事が見つかりません</h1>
        <p>お探しの記事は存在しないか、削除された可能性があります。</p>
        <a href="#" class="btn-primary" onclick="navigate('');return false;">トップに戻る</a>
      </div>`;
    return;
  }
  updateMobileBar(true);
  document.title = article.titleJa + " | BizNews JP";
  const parasJa = paragraphs(article.bodyJa).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  const parasEn = paragraphs(article.bodyOriginal).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  main.innerHTML = `
    <a href="#" class="back-link" onclick="navigate('');return false;">← 記事一覧に戻る</a>
    <div class="article-hero"><img src="${article.imageUrl}" alt="${escapeHtml(article.titleJa)}" /></div>
    <header class="article-header">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;margin-bottom:0.75rem">
        <span class="badge">${escapeHtml(article.category)}</span>
        <span style="font-size:0.75rem;color:#94a3b8">${escapeHtml(article.source)}</span>
      </div>
      <h1 class="article-h1">${escapeHtml(article.titleJa)}</h1>
      <p class="article-title-en">${escapeHtml(article.title)}</p>
      <div class="card-meta">
        <time datetime="${article.publishedAt}">${formatDate(article.publishedAt)}</time>
        <span>·</span><span>約${article.readTime}分で読める</span>
      </div>
    </header>
    <section>
      <div class="section-heading"><div class="section-bar"></div><h2>要約</h2></div>
      <div class="summary-box"><p>${escapeHtml(article.summaryJa)}</p></div>
    </section>
    <section>
      <div class="section-heading"><div class="section-bar gray"></div><h2>和訳全文</h2></div>
      <div class="translation-box">${parasJa}</div>
    </section>
    <section>
      <button type="button" class="toggle-btn" id="toggle-original" aria-expanded="false">
        <span>原文（英語）を表示する</span><span class="arrow">▼</span>
      </button>
      <div class="original-box hidden" id="original-box">${parasEn}</div>
    </section>
    <p class="source-line">出典：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.source)}</a></p>`;
  const toggleBtn = document.getElementById("toggle-original");
  const originalBox = document.getElementById("original-box");
  toggleBtn.addEventListener("click", () => {
    const isHidden = originalBox.classList.toggle("hidden");
    const isOpen = !isHidden;
    toggleBtn.classList.toggle("open", isOpen);
    toggleBtn.setAttribute("aria-expanded", String(isOpen));
    toggleBtn.querySelector("span").textContent = isOpen ? "原文（英語）を隠す" : "原文（英語）を表示する";
  });
}

function render() {
  const route = getRoute();
  if (route.page === "article") renderArticlePage(route.id);
  else renderHome();
}

window.addEventListener("hashchange", render);
window.addEventListener("popstate", render);
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.getElementById("mobile-back-btn");
  if (backBtn) backBtn.addEventListener("click", () => navigate(""));
  render();
});

  </script>
</body>
</html>
