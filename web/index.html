    "titleJa": "米国、係争中の浅瀬でフィリピン船員負傷を受け、中国の「危険で攻撃的な」行為を非難",
    "summaryJa": "マニラが中国沿岸警備隊職員が木製警棒でフィリピン人船員の頭を繰り返し殴り負傷させ、海軍のゴムボートを損傷させたとマニラが発表したことを受け、米国は係争中の南シナ海の海域でのフィリピン海軍職員に対する中国の「危険で攻撃的な」行動を非難した。月曜日の第二トーマス礁での衝突は、マルコ・ルビオ米国務長官が東南アジア諸国連合の外相会合のため今週マニラを訪問する予定であることから起こった。",
    "bodyOriginal": "The U.S. condemned what it termed China's \"dangerous and aggressive\" actions against Philippine navy personnel in the contested South China Sea waters, after Manila said a Chinese coast guard officer repeatedly struck a Filipino sailor on the head with a wooden baton, injuring him and damaging a navy rubber boat.\nThe confrontation in the Second Thomas Shoal on Monday came as U.S. Secretary of State Marco Rubio is scheduled to visit Manila this week for meetings of the Association of Southeast Asian Nations foreign ministers.\nTensions in the South China Sea are expected to feature prominently in the discussions, with Chinese Foreign Minister Wang Yi also in attendance. Rubio met Wang on the sidelines of last year's ASEAN gathering in Malaysia, and the two spoke by phone after President Donald Trump's Beijing visit earlier this year.\nRubio's trip also comes days after President Donald Trump accused Beijing of substantial meddling in U.S. elections.\nThe shoal is one of the most volatile flashpoints in the South China Sea, where Beijing claims almost the entire waterway despite a 2016 arbitral ruling that found those claims have no basis in international law. The reef lies within the Philippines' exclusive economic zone but has seen repeated clashes since 2023, as Chinese vessels have used water cannon, lasers, and ramming to block Filipino resupply missions.\nWashington is bound to Manila by a mutual defense treaty signed in 1951, meaning a serious escalation could draw in support from the U.S.\n\"We stand with our Ally, the Philippines,\" State Department spokesperson Tommy Pigott said in a statement Monday, calling on Beijing to \"immediately cease its destabilizing conduct\" and reaffirming the 2016 arbitral ruling that found China's expansive South China Sea claims have no basis in international law.\nThe Armed Forces of the Philippines said the encounter occurred near the BRP Sierra Madre, the warship Manila grounded on the shoal almost 30 years ago to anchor its claim. The military said a Chinese inflatable boat carrying eight personnel approached the outpost at close range and \"reacted violently and aggressively\" when two Philippine navy boats moved to drive the Chinese vessel away.\nBeijing has disputed that account with the China Coast Guard claiming Philippine dinghies launched \"illegally\" from the Sierra Madre, ignored repeated warnings, and rammed its patrol vessel, and that Filipino personnel attacked Chinese officers with oars and long sticks.\nThe flare-up complicates a week Manila had hoped would showcase its ASEAN chairmanship. Wang is scheduled to meet Philippine Foreign Secretary Theresa Lazaro on the sidelines of the annual summit — the first meeting of the two countries' top diplomats since 2024 — while Rubio is expected to see President Ferdinand Marcos Jr., with the South China Sea issues set to dominate both conversations.",
    "bodyJa": "マニラが中国沿岸警備隊職員が木製警棒でフィリピン人船員の頭を繰り返し殴り負傷させ、海軍のゴムボートを損傷させたとマニラが発表したことを受け、米国は係争中の南シナ海の海域でのフィリピン海軍職員に対する中国の「危険で攻撃的な」行動を非難した。\n月曜日の第二トーマス礁での衝突は、マルコ・ルビオ米国務長官が東南アジア諸国連合の外相会合のため今週マニラを訪問する予定であることから起こった。\n中国の王毅外相も出席し、南シナ海の緊張が議論の中で特に取り上げられると予想されている。ルビオ氏は昨年マレーシアで開催されたASEAN会合の傍らで王氏と会い、今年初めのドナルド・トランプ大統領の北京訪問後に両者は電話で会談した。\nルビオ氏の訪問は、ドナルド・トランプ大統領が中国政府が米国の選挙に実質的に干渉していると非難した数日後に行われた。\nこの浅瀬は南シナ海で最も不安定な引火点の一つで、2016年の仲裁裁定で国際法上の根拠がないとされたにもかかわらず、中国政府は同水路のほぼ全体を領有権を主張している。この礁はフィリピンの排他的経済水域内にあるが、中国船舶が放水、レーザー、体当たり攻撃などを用いてフィリピンの補給任務を阻止してきたため、2023年以来衝突が繰り返されている。\nワシントンは1951年に署名された相互防衛条約によってマニラと結ばれており、深刻な事態のエスカレーションが米国の支持を集める可能性があることを意味している。\n国務省のトミー・ピゴット報道官は月曜の声明で「われわれは同盟国であるフィリピンを支持する」と述べ、中国政府に対し「不安定化行為を即時停止する」よう呼び掛け、中国の広大な南シナ海の主張には国際法上の根拠がないとした2016年の仲裁判決を再確認した。\nフィリピン国軍は、衝突はBRPシエラマドレ付近で発生し、軍艦マニラは約30年前に主張を固めるために浅瀬に座礁したと発表した。軍は、人員８人を乗せた中国のゴムボートが前哨基地に至近距離で接近し、フィリピン海軍のボート２隻が中国船を追い払おうと移動した際に「激しく攻撃的に反応した」と発表した。\n中国政府は、フィリピンのディンギーがシエラマドレ山脈から「違法に」進水し、度重なる警告を無視して巡視船に体当たりし、フィリピン人職員がオールや長い棒で中国職員を攻撃したと主張し、中国海警局のこの説明に異議を唱えている。\nマニラがASEAN議長国としての地位を誇示することを期待していた一週間で、事態の再燃は事態を複雑化させた。王氏は、2024年以来の両国トップ外交官の会談となる年次首脳会談の傍ら、フィリピンのテリーサ・ラザロ外相と会談する予定で、ルビオ氏はフェルディナンド・マルコス・ジュニア大統領と会談する予定で、南シナ海問題が双方の会話の中心となる見通しだ。",

    "id": "ships-shun-strait-of-hormuz-as-renewed-f-70dc3fb9",
    "title": "Ships shun Strait of Hormuz as renewed fighting strains key oil corridor",
    "titleJa": "重要な石油回廊で新たな戦闘緊張が高まる中、船舶がホルムズ海峡を回避",
    "summaryJa": "ドナルド・トランプ米大統領による封鎖が先週発効して以来、ホルムズ海峡を通る船舶の往来は低迷しており、米国とイランの間の戦闘が激化する中、船主らは世界で最も重要なエネルギー回廊の一つを避ける傾向が強まっている。米国による対イラン攻撃の再開、テヘランによる海上交通の全面禁止宣言と商船への新たな攻撃により、海峡の通過は複数の海運データセットで急激に減少しており、海峡の航行業者は湾岸進入のリスクを再評価するよう促されている。",
    "bodyOriginal": "Vessel traffic through the Strait of Hormuz has slumped since U.S. President Donald Trump's blockade took effect last week, with shipowners increasingly avoiding one of the world's most important energy corridors as fighting between the U.S. and Iran intensifies.\nCrossings through the Strait have fallen sharply across multiple shipping datasets with renewed U.S. strikes on Iran, Tehran's declaration of a blanket ban on maritime traffic and fresh attacks on commercial vessels has prompted operators to reassess the risks of entering the Gulf.\nLloyd's List Intelligence recorded just 53 vessel transits in the week through July 20, down 66% from 157 the previous week. Tanker and gas carrier movements, which are the ships responsible for transporting most Gulf crude oil and liquefied natural gas, dropped to 30 crossings from 90.\nKpler data similarly show activity deteriorating almost immediately after the blockade began. Daily crossings, which had averaged more than 20 vessels before July 15, fell to 16 that day before dropping to single digits on July 16. Traffic remained subdued through the rest of the week, with only sporadic recoveries.\nThe latest slowdown reverses weeks of gradual normalization after the mid-June ceasefire had encouraged some shipowners to resume Gulf voyages.\nInstead, the renewed fighting has once again nearly emptied the strategic waterway that carries roughly a fifth of global oil consumption.\n\"Things have slowed down significantly since tensions reignited,\" said Bridget Diakun, senior risk and compliance analyst at Lloyd's List Intelligence. \"That's not surprising - people pull back and reassess, as you'd expect.\"\nTraffic has not disappeared altogether, however. \"Every single person has a different risk appetite,\" Diakun said. \"We're still seeing tankers crossing in and out, it hasn't ground to a complete halt.\"\nRather than recovering steadily, vessel movements are likely to continue coming \"in ebbs and flows\" as shipowners seize brief windows of perceived safety before pulling back again whenever tensions escalate, she said.\nS&P Global data painted a similar picture. Just 40 vessels transited the strait between July 17 and July 19, averaging roughly 13 crossings a day, while weekly traffic through July 19 fell almost 50% from the previous week.\nCommercial ships still accounted for more than 70% of traffic over the period, although only about one-third were assessed as compliant with maritime restrictions. Iran-linked and sanctioned vessels continued to dominate many movements, suggesting mainstream international shipowners remain reluctant to return.\n\"The latest escalation shows how expectations of a rapid opening of the Strait were premature,\" said Saul Kavonic, head of energy research at MST Marquee.\n\"The hostilities and reimposed blockade set the conflict back on an escalatory trajectory,\" he said, adding that flows through Hormuz had dropped to around 15% of pre-war levels. Oil could retest $100 a barrel if the current intensity of fighting persists for several weeks or if regional energy infrastructure comes under attack, he told CNBC via email.",
    "bodyJa": "ドナルド・トランプ米大統領による封鎖が先週発効して以来、ホルムズ海峡を通る船舶の往来は低迷しており、米国とイランの間の戦闘が激化する中、船主らは世界で最も重要なエネルギー回廊の一つを避ける傾向が強まっている。\n米国による対イラン攻撃の再開、テヘランによる海上交通の全面禁止宣言と商船への新たな攻撃により、海峡の通過は複数の海運データセットで急激に減少しており、海峡の航行業者は湾岸進入のリスクを再評価するよう促されている。\nロイズ・リスト・インテリジェンスが記録した船舶の航行は7月20日までの1週間にわずか53隻で、前週の157隻から66％減少した。湾岸原油と液化天然ガスの輸送の大部分を担っているタンカーとガス船の運航は、90回から30回に減少した。\nKpler データも同様に、封鎖開始直後に活動が悪化したことを示しています。 7 月 15 日までは 1 日あたり平均 20 隻以上の船舶が航行していましたが、その日は 16 隻に減り、7 月 16 日には 1 桁にまで減少しました。交通量は残りの週を通じて抑制されたままで、回復は散発的でした。\n今回の減速は、6月中旬の停戦により一部の船主が湾岸航海の再開を促した数週間にわたる緩やかな正常化を覆すものだ。\nその代わりに、新たな戦闘により、世界の石油消費量のおよそ5分の1を運ぶ戦略的な水路が再び空になりかけている。\nロイズ・リスト・インテリジェンスのシニア・リスク・コンプライアンスアナリスト、ブリジット・ディアクン氏は「緊張が再燃して以来、事態は大幅に減速している」と述べた。 「それは驚くべきことではありません。ご想像のとおり、人々は撤退し、再評価します。」\nただし、トラフィックが完全になくなったわけではありません。 「リスク選好度は人それぞれ異なります」とダイアクン氏は言う。 「まだタンカーが出入りしているのが見えますが、完全には停止していません。」\n同氏は、船主らは緊張が高まるたびに船主が安全と思われる一瞬の隙をつかみ、再び撤退するため、船舶の動きは着実に回復するというよりも「盛衰」が続く可能性が高いと述べた。\nS&P グローバルのデータも同様の状況を示しています。 7月17日から7月19日までの間に海峡を通過した船舶はわずか40隻で、1日平均約13回の海峡横断を行ったが、7月19日までの週間交通量は前週比でほぼ50％減少した。\nこの期間の交通量の 70% 以上は商船で占められていましたが、海上規制に準拠していると評価されたのは約 3 分の 1 のみでした。イラン関連船舶や制裁対象船舶が引き続き多くの航海を支配しており、主流の国際船主が依然として復帰に消極的であることを示唆している。\n「最近の事態の拡大は、海峡の急速な開放に対する期待がいかに時期尚早であったかを示している」とMSTマーキーのエネルギー研究責任者ソール・カボニック氏は語った。\n同氏は、「敵対行為と封鎖の再発動により、紛争は再びエスカレートする軌道に戻った」と述べ、ホルムズを通る物流は戦前の水準の約15％に低下したと付け加えた。現在の激しい戦闘が数週間続く場合、または地域のエネルギーインフラが攻撃にさらされた場合、石油は1バレル当たり100ドルを再試行する可能性があると同氏は電子メールでCNBCに語った。",

    "id": "why-andy-burnham-will-find-it-so-tricky-438a9baf",
    "title": "Why Andy Burnham will find it so tricky to unite Britain",
    "titleJa": "アンディ・バーナムがイギリスを統一するのが難しい理由",
    "summaryJa": "暴力的なメルトダウンの真っ只中にある現在のアメリカをディストピア的に描いた 2024 年の映画『シビル・ウォー』をご覧になりましたか?これほど効果的なスリラーになったのは、すべてが恐ろしいほど現実的に見えたからです。あの内戦の双方は架空のものではあったが、現代のアメリカに傷を残す非常に明白な分断だからこそ、この出来事は生々しい神経を刺激した。",
    "bodyOriginal": "Did you get to see the 2024 film Civil War, with its dystopian depiction of a present day USA in the midst of a violent meltdown?\nWhat made it such an effective thriller was that it all seemed so frighteningly real. Although the two sides in that civil war were fictitious, it hit a raw nerve precisely because of the very obvious divides that scar modern day America.\nBut interestingly it was actually written and directed by a British film-maker, Alex Garland, and he expressed worries about his home country, as well as the US. In both countries, he told the Guardian, \"there's a lot to be very concerned about\".\nHe's not alone. If you are an avid user of social media, you could almost believe that we are a nation disunited enough to have a full-on civil war of our own. And even away from the exaggerated adversarialism online, there are plenty of people worried that Britain is gripped by uncontrollable rage.\nIt's a sense of discord that Britain's new prime minister, Andy Burnham, seems to recognise. Since announcing his run for the Makerfield seat in May, he's repeatedly urged Britons to forget about party labels or factional identities and instead unite around pride in their local area. \"Place first, not party first\", is how he puts it.\nAnd as he entered Downing Street on Monday, he called for a \"new national sense of unity, of common purpose and positivity\".\nBut it's worth asking: just how divided really is Britain?\nCommon Ground\nEvan Davis travels across the UK exploring the forces that are driving the UK apart, and he hears ideas to improve our sense of \"social cohesion\".\nListen Now\nSome talk as though the population is ready to wield the pitchforks; that we are close to social breakdown; that a small spark could lead to a serious fire.\nLast year, a commission co-chaired by the former Home Secretary, Sir Sajid Javid, warned in a report: \"The bonds that hold society together - civic participation, and a shared sense of belonging - are under growing pressure.\"\nWell, I have just had the privilege of spending a month journeying - literally and figuratively - through some of the divisions that define modern Britain, for a Radio 4 series.\nIs there any common ground left in the country that Burnham has now inherited - or are we polarised to the point of no-repair?\nA defining split\nFor a long time, Britain had a clear, defining split: social class. What kind of job you had, how you spoke, what time you had your evening meal, what you watched on TV, how you voted… it was all pre-determined by your working or middle class background.\nToday, that has got a lot more complicated with a decline in the number of jobs that would have been regarded as \"working class\", and a big rise in the number of young people going to university from those backgrounds. That's not to say it isn't still there.\nBut probably the most obvious faultline in Britain and other western countries now is in values, with a marked difference between two sides: progressives on one side, and social conservatives on the other. If we have a civil war any time soon, it'll be the Allied Readers of the Guardian versus the United League of GB News Viewers. That schism is more clearly driven by age and education than it is by class.\nThis clash defines politics at the moment, and manifests in rows about \"woke\" values, patriotism, and immigration. And what makes it so intense is a feeling, held by some on both sides, that the other side is some kind of existential threat to their vision of what society should be.\nBecause this is such a clear schism, we commissioned polling from the More in Common research institute (covering Great Britain, not Northern Ireland).\nWe asked respondents if they prefer living in communities \"where more people come from different cultural backgrounds\", or \"where most people come from the same cultural background\". We found a population split down the middle: 53% prefer a diverse community, 47% said they preferred a more homogenous one.\nIt poses a challenge for Burnham: it's much harder to settle a national argument where there is a 50-50 divide, than where one side dominates completely.\nOn the specific question of immigration, however, the country looks more united. Our poll found that about three-quarters of Britons thought immigration was too high. Burnham himself has said that net migration was \"way too high\" under the Conservative government, and said he'll try to \"find the right balance\" on the issue.\nFaultlines\nBut that's not the only faultline cutting across British society. From my conversations around the country, I heard a list of other, quite distinct concerns. These are often bound up under one general heading of \"polarisation\", but it's been illuminating to unpack them.\nOne specific worry - most keenly felt on the right - is about social integration. It is whether in some cities, there are communities of different culture, ethnicity and even language, residing right next to each other but living totally separate lives. We saw that voiced in Leicester, the city with the highest share of people who speak a main language that's not English.\nJason, a 54-year-old window installer, has watched the city undergo this change, and has made Hindu and Sikh friends. But Jason, who is white British, also has his complaints, and says that Muslim families in the area tend to turn down his services. \"They do stick to their own.\"\nHe says there's one part of the city he now stays away from, after he was racially abused last year by a group of men in a car \"calling me a white so-and-so\". And he finds the language barrier particularly difficult. \"Sometimes it's very hard to take an inquiry on the phone. You're doing a quote on the windows and you just really can't communicate.\"\nAnd then there's another worry - perhaps felt more keenly on the left - about what some see as rising levels of racism and violence. From Southport to Southampton, racial tensions have erupted on the streets in the last few years.\nHannah Henderson, who runs a dog-friendly coffee shop in Southampton, says she was recently driving with her daughter when they passed a hotel that houses asylum seekers. \"There was a protest happening… people with the St George's flags around their shoulders… police lining up. She felt really unsafe. She's twelve. She didn't really understand, why would people be so cross?\".\nAnd then there's the divide between different places. Some residents of deprived, post-industrial towns - areas that have suffered from the disappearance of manufacturing and mining - feel a quiet frustration towards larger, economically flourishing cities. Those smaller towns tend not to have a university, and they tend to have a run down high street, giving a visual sense of decline. Places like Wigan - in Greater Manchester, Burnham's stronghold - often languish next to the bigger cities in whose shadow they sit.\nThis is a point made by Fiona Hill, the daughter of a coal miner from Bishop Auckland who later moved to Washington DC to become a senior White House adviser. Her book, There's Nothing For You Here, is named after the advice her father gave when she left school in 1984.\n\"The reason it's called 'left behind' is because you look at health outcomes, education, transport, access to amenities… and all of the [towns] that we're talking about are left behind,\" says Hill, who is now chancellor of Durham University. \"Certainly they're not on the same level as… the flourishing city centres in Manchester, Liverpool, and absolutely not at the same level as London.\"\nSharing too little\nAnother, related concern is that we simply share too little these days: we do things at home alone; we don't go to church together each Sunday; we barely go out to the pub like we used to.\nAnd on the national level - in England at least - there's only a vague sense of identity. Yes, most of us might enjoy watching the national football teams. But is that all our sense of nationhood consists of now? Even the flag - and its place on lampposts and signs - has become divisive.\nPlaywright James Graham thinks that a nation is largely defined via \"the story it tells itself\" - and parts of England, he says, feel excluded from the national story.\n\"Some people get bigger roles than others in that story, historically,\" he says. \"If you see yourself on screen or stage, or in film or books or newspapers, if you feel like you're being seen and you're being heard and you feel part of a story, that does temper some of the natural bitterness and resentment that you feel when your economic situation isn't quite so good.\"\nIt all suggests Britain is a nation not quite at ease with itself and with a lot to fix.\nCommon ground\nThat being said, we found a lot of common ground talking to people around Britain; reasonable folks dispirited by the problems they observe, but ready to navigate their way through them constructively. For every riot, there are volunteers who'll come out the next day to clean up the mess.\nOften there's a sports team or community centre that becomes a focal point for neighbourly spirit. At Grimsby Town Football Club, we heard from Christine Green, who started volunteering for the club during a difficult period in her life. \"I was going through a divorce and… needed something to occupy my time and my mind so I'm not focusing on negative stuff\", she remembers.\nShe lives in the deprived East Marsh area of Grimsby, a neighbourhood she says is often derided as a place of crime and unemployment. It is an image she doesn't recognise. \"I know the person next door and I know the person across the road. My mum lives the next block up and my daughter can take the dogs for a walk. That's nice to me - not living in a secluded house where you've got no idea who anybody is around you.\"\nLord Stockwood, the Grimsby-born entrepreneur who bought the football club in 2021, says: \"In an increasingly complex and crazy world, this is a place of permanence and love and memory for me and for many others.\"\nIndeed, in our poll, it was encouraging that most respondents didn't seem to want to burn their locality down. We asked respondents if the city, town, or village they lived in was a good place to live and work. A full 70% thought their location was \"very good\" or \"somewhat good\" as a place to live. (It was less than that, only about half, who thought it was a good place to work.)\nBut is 70% good enough? You can take a glass two-thirds full or a third empty view of that figure.\nPlace is a unifying force\nI do wonder if one way of finding common ground will be a renewed focus on the idea of \"place\". Increasingly, there's a push - from politicians and academics - to help people forge (or re-forge) connections to their local areas.\nCertainly, Burnham seems to agree. When we embarked upon this journey, we didn't know he would be entering No 10. What fortuitous timing. He must have spent more time outside London in the years running up to his premiership than any other modern prime minister - and it's fascinating to see where that's landed him.\nLast year, he told the Institute for Government think tank: \"Place is a unifying force. However people vote, they are united by a desire to see the place where they live move forward.\"\nFrom the capital, the thinking goes, it's easy to think that if we can make Britain work, then each community will flourish. It might be that we really need to do it the other way round - if we can make each community flourish, then the country will work.\nThat's not straightforward by the way. As Burnham knows, it has been easier to revitalise Manchester than the many towns spread around it. But creating social cohesion where it is lacking, is surely a defining mission of Burnham's premiership.\nTop picture credit: Getty Images\nMore from InDepth\nBBC InDepth is the home on the website and app for the best analysis, with fresh perspectives that challenge assumptions and deep reporting on the biggest issues of the day. Emma Barnett and John Simpson bring their pick of the most thought-provoking deep reads and analysis, every Saturday. Sign up for the newsletter here\nGet in touch\nAre you personally affected by the issues raised in this story?",
    "bodyJa": "暴力的なメルトダウンの真っ只中にある現在のアメリカをディストピア的に描いた 2024 年の映画『シビル・ウォー』をご覧になりましたか?\nこれほど効果的なスリラーになったのは、すべてが恐ろしいほど現実的に見えたからです。あの内戦の双方は架空のものではあったが、現代のアメリカに傷を残す非常に明白な分断だからこそ、この出来事は生々しい神経を刺激した。\nしかし興味深いことに、実際に脚本と監督を務めたのは英国の映画監督アレックス・ガーランドであり、彼は米国だけでなく母国についての懸念を表明していた。両国において「非常に懸念すべきことがたくさんある」と同氏はガーディアン紙に語った。\n彼は一人ではありません。あなたがソーシャルメディアの熱心なユーザーであれば、私たちは本格的な内戦を起こすほど分裂した国だと信じているかもしれません。そして、オンラインでの誇張された敵対主義とは別に、英国が制御不能な怒りに捕らわれているのではないかと心配する人はたくさんいる。\n英国の新首相アンディ・バーナムもそれを認識しているようだ。 5月にメイカーフィールド議席への出馬を発表して以来、彼は英国人に対し、政党のレッテルや派閥のアイデンティティを忘れ、代わりに地元への誇りを中心に団結するよう繰り返し訴えてきた。 「パーティー第一ではなく、場所第一」というのが彼の言葉です。\nそして月曜日にダウニング街に入る際、彼は「共通の目的と積極性を備えた新たな国民的統一感」を呼び掛けた。\nしかし、尋ねてみる価値はある：英国は実際にどれほど分断されているのだろうか？\n共通点\nエヴァン・デイヴィスはイギリス中を旅して、イギリスを分裂させている要因を調査し、私たちの「社会的一体感」を改善するためのアイデアを聞きます。\n今すぐ聴く\nあたかも国民がピッチフォークを振るう準備ができているかのように話す人もいます。私たちは社会崩壊に近づいているということ。小さな火花が重大な火災につながる可能性があるということです。\n昨年、元内務大臣サジド・ジャビド卿が共同委員長を務める委員会は報告書の中で、「社会を結びつける絆、つまり市民参加や帰属意識の共有は、ますますプレッシャーにさらされている」と警告した。\nさて、私はラジオ 4 のシリーズのために、文字通りにも比喩的にも、現代の英国を定義するいくつかの地域を巡る旅に 1 か月を費やす機会に恵まれました。\nバーナムが現在受け継いでいる共通の基盤がこの国に残っているのだろうか、それとも私たちは修復不可能なところまで二極化しているのだろうか？\n決定的な分裂\n長い間、英国には社会階級という明確な決定的な分裂がありました。どのような仕事に就いていたか、どのように話し、夕食を何時に食べたか、テレビで何を見たか、どのように投票したか…すべては労働者階級または中流階級の背景によってあらかじめ決められていました。\n今日では、「労働者階級」とみなされる仕事の数が減少し、そのような背景から大学に進学する若者の数が大幅に増加しているため、状況はさらに複雑になっています。それがまだ存在しないというわけではありません。\nしかし、おそらく現在、英国と他の西側諸国における最も明白な断層は価値観にあり、一方は進歩主義者、もう一方は社会保守主義者という、双方の間に顕著な違いがある。近いうちに内戦が起きるとすれば、それはガーディアン紙の読者連合対GBニュース閲覧者の連合リーグとなるだろう。この分裂は階級によるものよりも、年齢と学歴による方が明らかだ。\nこの衝突は現在の政治を定義しており、「目覚めた」価値観、愛国心、移民をめぐる口論として現れています。そして、それを非常に強烈にしているのは、社会がどうあるべきかという自分たちのビジョンに対して、相手はある種の実存的脅威であるという、双方の一部の人が抱いている感情である。\nこれは明らかな分裂であるため、私たちはモア・イン・コモン研究所（北アイルランドではなく英国を対象）に世論調査を依頼しました。\n私たちは回答者に、「より多くの人が異なる文化的背景を持つ地域」と「ほとんどの人が同じ文化的背景を持つ地域」のどちらに住むことを好むかを尋ねました。人口が真ん中で分かれていることがわかりました。53% が多様性のあるコミュニティを好み、47% がより均質なコミュニティを好むと​​回答しました。\nこれはバーナムにとって課題となる。国内の意見が50対50で分かれている場合、一方が完全に優勢な場合よりも、国内の議論を解決するのがはるかに難しい。\nしかし、移民という具体的な問題に関しては、この国はより団結しているように見える。私たちの世論調査では、英国人の約4分の3が移民が高すぎると考えていることが判明した。バーナム氏自身も、保守党政権下では純移民が「多すぎた」と述べ、この問題について「適切なバランスを見つける」努力をすると述べた。\n断層線\nしかし、英国社会を横切る断層はそれだけではない。全国各地での会話から、他にも全く明確な懸念事項のリストを聞きました。これらは多くの場合、「二極化」という 1 つの一般的な見出しの下にまとめられていますが、それらを紐解いてみると明らかになります。\n特定の懸念の 1 つは、右側が最も強く感じていることですが、社会的統合に関するものです。それは、いくつかの都市に、異なる文化、民族性、さらには言語さえも異なるコミュニティが存在し、互いに隣り合って暮らしているにもかかわらず、まったく別の生活を送っているかどうかです。英語ではない主要言語を話す人々の割合が最も高い都市、レスターでそのような声が聞かれた。\n54 歳の窓設置業者のジェイソンさんは、この街の変化を見守り、ヒンズー教とシーク教の友人を作りました。しかし、白人のイギリス人であるジェイソンさんにも不満があり、この地域のイスラム教徒の家族は彼のサービスを断る傾向があると言う。 「彼らは自分たちのものにこだわります。」\n彼は、昨年車の中で男性グループから「白人なんとか呼ばわり」されて人種的虐待を受けた後、現在は遠ざけている街の一角があると語った。そして彼は言葉の壁が特に難しいと感じています。 「電話で問い合わせを受けるのが非常に難しい場合があります。窓口で見積もりをしているのに、まったくコミュニケーションが取れません。」\nそして、人種差別と暴力のレベルが上昇していると一部の人が見ているものについて、おそらく左派の方がより強く感じている別の懸念もあります。サウスポートからサウサンプトンに至るまで、ここ数年路上では人種間の緊張が噴出している。\nサウサンプトンで犬同伴可のコーヒーショップを経営するハンナ・ヘンダーソンさんは、最近娘と一緒に車で運転していたところ、亡命希望者が宿泊するホテルの前を通りかかったと語った。 「抗議活動が起こっていました…セントジョージの旗を肩に担ぐ人々…警察が列をなしていました。彼女は本当に危険だと感じました。彼女は12歳です。彼女は本当に理解していませんでした。なぜ人々がそこまで反対するのでしょうか？」。\nそして、さまざまな場所間の分断があります。産業が衰退した貧困都市、つまり製造業や鉱業の消滅に苦しんでいる地域の住民の中には、経済的に繁栄した大都市に対して静かな不満を感じている人もいる。これらの小さな町には大学がない傾向があり、目抜き通りは荒廃している傾向があり、見た目に衰退した印象を与えます。バーナムの本拠地であるグレーター・マンチェスターのウィガンのような場所は、その影に隠れて大都市の隣にひっそりと佇んでいることが多い。\nこれは、オークランド司教の炭鉱夫の娘で、後にワシントン DC に移り、ホワイトハウス上級顧問になったフィオナ・ヒルの指摘です。彼女の著書『There's Nothing For You Here』は、1984 年に彼女が学校を辞めたときに父親が与えたアドバイスにちなんで名付けられました。\n「この町が『取り残された』と呼ばれる理由は、健康上の成果、教育、交通機関、アメニティへのアクセス…そして私たちが話している[町]のすべてが取り残されているからです」と、現在ダラム大学の学長を務めるヒルは言う。 「確かに、それらはマンチェスターやリバプールの繁栄する都市中心部と同じレベルではありません。そしてロンドンと同じレベルでは絶対にありません。」\n共有が少なすぎる\nこれに関連するもう 1 つの懸念は、最近私たちが共有するものが少なすぎることです。私たちは家で一人で何かをします。私たちは毎週日曜日に一緒に教会に行くわけではありません。以前のようにパブに出かけることはほとんどありません。\nそして国家レベルでは、少なくともイギリスでは、漠然としたアイデンティティしかありません。はい、私たちのほとんどはサッカーの代表チームを観戦するのが好きかもしれません。しかし、今の私たちの国家意識はそれだけで構成されているのでしょうか？国旗、そして街灯や標識の上でのその位置さえも意見を対立させるものとなっている。\n劇作家のジェームズ・グレアムは、国家は主に「国家自体が語る物語」によって定義されると考えており、イングランドの一部は国家の物語から疎外されていると感じている、と彼は言う。\n「歴史的に見て、その物語の中で、他の人よりも大きな役を任される人もいます」と彼は言う。 「スクリーンやステージ、映画や本や新聞で自分の姿を見て、自分が見られている、話を聞いてもらっている、物語の一部であると感じると、経済状況がそれほど良くないときに感じる自然な苦味や憤りの一部が和らげられます。」\nこれらはすべて、英国が自分自身にあまり満足しておらず、修正すべきことがたくさんある国であることを示しています。\n共通点\nそうは言っても、英国中の人々と話をする中で、多くの共通点を見つけました。理性的な人々は、観察した問題に落胆していますが、建設的に問題を乗り越える準備ができています。暴動が起きるたびに、翌日には混乱を片付けるために出てくるボランティアがいる。\n多くの場合、スポーツ チームやコミュニティ センターが近隣の精神の中心となります。グリムズビー タウン フットボール クラブでは、人生の困難な時期にクラブのボランティア活動を始めたクリスティーン グリーンさんの話を聞きました。 「私は離婚を経験していて…自分の時間と心を占める何かが必要だったので、ネガティブなことに焦点を当てていません」と彼女は思い出します。\n彼女はグリムズビーのイースト・マーシュ地区の恵まれない地域に住んでいるが、この地区はしばしば犯罪と失業の場所として嘲笑されていると彼女は言う。それは彼女が認識していないイメージです。 「私は隣の人も道路の向かい側の人も知っています。母は隣のブロックに住んでいて、娘は犬を散歩に連れて行くことができます。それは私にとって嬉しいことです。周りに誰がいるかわからないような人里離れた家に住んでいないのです。」\n2021年にフットボールクラブを買収したグリムズビー生まれの起業家ストックウッド卿は、「ますます複雑でクレイジーな世界において、ここは私と他の多くの人にとって永遠と愛と思い出の場所だ」と語る。\n実際、私たちの世論調査では、ほとんどの回答者が自分たちの地元を焼き払うことを望んでいないように見えたのは心強いことでした。回答者に、住んでいる市、町、村が住み、働くのに良い場所であるかどうかを尋ねました。実に 70% が、自分たちの場所が住む場所として「非常に良い」または「やや良い」と考えています。 （それよりも少なく、働きやすい職場だと考えている人はわずか約半数でした。）\nしかし、70% で十分なのでしょうか?その人物の 3 分の 2 をガラスに映すことも、3 分の 1 を空から見ることもできます。\n場所は団結力です\n共通点を見つける一つの方法として、「場所」という概念に改めて焦点を当てることができるのではないかと思います。人々が地元とのつながりを築く（または再築く）ことを支援するよう、政治家や学者からの圧力がますます高まっている。\n確かに、バーナムも同意しているようだ。私たちがこの旅を始めたとき、彼が10番に入るとは知りませんでした。何という偶然のタイミングでしょう。彼は、首相に就任するまでの数年間、他の現代の首相よりもロンドンの外で多くの時間を過ごしたに違いないが、それが彼をどこに導いたのかを見るのは興味深い。\n昨年、同氏はシンクタンク政府研究所に対し、「場所には団結力がある。どのような投票をしようが、人々は自分の住んでいる場所が前進するのを見たいという願望によって団結している」と語った。\n首都から見ると、英国をうまく機能させることができれば、それぞれのコミュニティが繁栄するだろうと考えるのは簡単だ。私たちは本当に逆のことをする必要があるのか​​もしれません。私たちが各コミュニティを繁栄させることができれば、国はうまくいきます。\nところで、それは簡単ではありません。バーナムが知っているように、マンチェスターを再活性化することは、周囲に多くの町が広がるよりも簡単でした。しかし、社会的一体性が欠けているところに社会的一体性を生み出すことは、バーナム首相の明確な使命であることは確かだ。\nトップ画像クレジット: Getty Images\nInDepthのその他の作品\nBBC InDepth は、思い込みに疑問を投げかける新鮮な視点と、その日の最大の問題についての深いレポートを提供する、最高の分析を提供する Web サイトとアプリです。エマ・バーネットとジョン・シンプソンが、毎週土曜日に、最も示唆に富んだ深い読み物と分析を厳選して紹介します。ここからニュースレターに登録してください\n連絡する\nこの話で提起された問題によってあなたは個人的に影響を受けていますか?",

    "titleJa": "クラフトとキーボード: 技術と古くから伝わるスキルを習得する研修生",
    "summaryJa": "クラフトとキーボード: 技術と古くから伝わるスキルを習得する研修生- 公開されました",
    "bodyOriginal": "Craft and keyboard: The trainees mastering tech and age-old skills\n- Published\nOllie Priestley is not just doing any mechanical apprenticeship.\nWorking at specialist car restoration business Tolman, Priestley, 29, has embarked on a \"heritage vehicle technician\" apprenticeship. He's learning the skills to work on modern classic cars that need a mix of traditional and new techniques to restore.\nNew technologies are enabling those techniques - from computer-aided design (CAD) for new vehicle components, to 3D printing them, as well as learning the intricacies of a car's electronic control units.\n\"I wanted to develop the skills that allowed me to work on the cars that I love and excite me, like the Peugeot 205 GTi,\" says Leicestershire-based Priestley.\n\"Getting to know how to make things keeps me focused and engaged. I've just fabricated a gearbox mount for a classic BMW. It's cool to know that the things I create will bring the car back to life.\"\nTolman founder Chris Tolman says what Priestley is learning sets him apart from apprentices in mainstream car dealerships, who, due to digital tools, are increasingly becoming \"just fitters\".\n\"The computer identifies the issue and they swap the part. For specialist car businesses, our technicians need to identify and understand a problem, and then be creative and innovative to find the answer,\" says Tolman, who is based in Warwickshire.\nTolman's point highlights an important question hanging over how trade apprentices are being taught today, as technology plays an increasingly bigger role.\nAs a result, apprenticeships are moving up the education value chain.\nFor example, Priestley's three-year apprenticeship, which he is doing through the Heritage Skills Academy in Bicester (HSA), was introduced in 2018 to incorporate 3D printing and CAD amongst other digital skills, alongside essential skills like welding and glazing.\nIt is a level three apprenticeship offering the equivalent of three A-levels. It replaces the previous level two and three \"classic vehicle framework\" apprenticeship.\nHSA managing director John Pitchforth says it's \"radically improved\" as it combines \"modern technology with engineering fundamentals\".\nGovernment apprenticeship data also shows that the number of people starting level two intermediate apprenticeships have fallen by nearly a quarter over the past year, in favour of people starting higher level apprenticeships - level four to seven.\nLevel six and seven respectively equate to bachelors and masters degrees. Level three apprenticeship numbers have remained stable.\nBut with tech having a growing influence over the curriculum, are apprentices now just learning how to run computer software, at the expense of the actual skills of a specific trade?\nHSA's Pitchforth argues that the organisation's apprentices come out highly skilled - perhaps more so than those from other programmes.\n\"When modern engineers come to us to transfer into our sector, they often lack the basic engineering principles and are unable to diagnose and repair vehicle systems without a computer telling them what's wrong,\" he says.\nChris Iveson is CEO of FourJaw Manufacturing Analytics, a platform for industrial businesses to gain production monitoring data. He is based in Sheffield, where FourJaw works with a number of local businesses.\n\"The modern apprentice is increasingly learning two things at once: the practical skill of making, and the digital skill of using technology to understand what is happening in production,\" explains Iveson.\n\"That might include CNC programming (coding for automated tools), CAD, robotics, additive manufacturing, quality control systems and production monitoring, all of which now appear in modern engineering and manufacturing apprenticeship routes.\"\nBut he warns that if training becomes too narrow, apprentices can end up lacking a proper understanding of materials, methods, tooling, quality and process.\nJust down the road from FourJaw in the city centre is scissor-maker Ernest Wright. Operating since 1902, it's one of just two scissor-makers left in the city, which once boasted a blade manufacturing industry of over 100 workshops.\nNow just Ernest Wright, and William Whiteley, located on the other side of town, remain.\nWhile Ernest Wright is proud of its long history, its the latest manufacturing technology that has helped it create a niche in the market for scissors and shears.\nWorking with the University of Sheffield, the firm introduced 3D metal printing to make new product development a faster and less expensive process. Now it can create highly accurate prototypes to then be made via traditional methods.\nThe company used 3D metal printing to revive its 1960s \"nurseryman scissors\", and now uses it to create a new product each year, largely based on vintage designs.\n\"Now we can make just six pairs of scissors through metal printing [as tests]. Then if we want to change things, we don't have to do it on 6,000 pairs,\" says Paul Jacobs who bought the company in 2018 along with fellow-Dutchman Jan-Bart Fanoy.\nFor trainee Elliott Nurcombe, who has worked part-time at Ernest Wright for the past three years alongside his aerospace engineering degree, the chance to work with such technology has added an exciting extra element to learning a trade he was already intrigued by.\n\"Maintenance wise, a lot of the parts for our machines simply don't exist anymore, so using modern technologies like CAD and 3D printing, we've been able to replicate some,\" says Nurcombe, 21.\n\"But I don't think that technology will take over or overshadow what goes on in this workshop. In terms of actual production of what we make here and what we do day to day, there's no real opportunity for technology to take that over from the people that work here.\"\nAt Whiteley, which has been running since 1760, 3D printing has also revitalised the business after a change of ownership in 2024. Sally Ward, an 11th generation of the Whiteley family, and her husband Jeremy retired, and sold the business to manufacturing company Kaymich.\nManaging director Mark White is considering using new materials like reclaimed titanium, but is taking a measured approach to introducing further technology, in an effort to preserve the craftsmanship behind Whiteley scissors.\n\"At the moment I'm looking to recruit trainee scissor manufacturers, as opposed to looking to put people out of work by investing in more technology,\" says White.\n\"What we're not about is loading something on a machine and pressing a button.\"\nBack in Sheffield city centre at Platts & Nisbett, makers of surgical instruments, the process now includes CNC at the first stage, which is when a software programme directs machinery to cut the components. They are then fitted and finished by hand.\nEach instrument is also now laser tagged so it can be traced back to Platts & Nisbett, regardless of what hospital it ends up in.\nRecruiting the next generation of crafts people, though, hasn't been straightforward as the rise of technology has shifted many people's interests that way.\n\"There will be an abundance of people who want to press buttons. It's getting someone who likes to work with their hands, other than computers,\" says business development manager Julie Topham.\nMore Technology of Business\n- Published12 June\n- Published5 June\n- Published9 June",
    "bodyJa": "クラフトとキーボード: 技術と古くから伝わるスキルを習得する研修生\n- 公開されました\nオリー・プリーストリーは単に機械の見習いをしているだけではありません。\n車修復専門会社トールマンで働くプリーストリーさん（29）は、「伝統車両技術者」の見習いに乗り出した。彼は、レストアするために伝統的な技術と新しい技術を組み合わせる必要がある現代のクラシックカーに取り組むスキルを学んでいます。\n新しい車両コンポーネントのコンピュータ支援設計 (CAD) から 3D プリントに至るまで、また、自動車の電子制御ユニットの複雑さを学習するなど、新しいテクノロジーがこれらの手法を可能にしています。\n「プジョー 205 GTi のような、大好きでワクワクする車に携われるスキルを身につけたいと思っていました」とレスターシャーを拠点とするプリーストリーは言います。\n「ものの作り方を知ることで、集中力が保てます。クラシック BMW のギアボックス マウントを製作したところです。自分が作成したものが車に命を吹き込むと知るのは素晴らしいことです。」\nトールマンの創設者クリス・トルマン氏は、プリーストリー氏が学んでいることは、デジタルツールのせいでますます「ジャストフィッター」になりつつある主流の自動車ディーラーの見習いたちとは一線を画していると語る。\n「コンピューターが問題を特定し、部品を交換します。自動車専門企業の場合、当社の技術者は問題を特定して理解し、創造的かつ革新的に答えを見つける必要があります」とウォリックシャーに拠点を置くトルマン氏は言う。\nトルマン氏の指摘は、テクノロジーの果たす役割がますます大きくなる中、今日の貿易実習生の教育方法に懸かる重要な問題を浮き彫りにしている。\nその結果、実習生は教育バリューチェーンの上流に移動しています。\nたとえば、プリーストリー氏がビスターのヘリテージ スキル アカデミー (HSA) を通じて行っている 3 年間の見習い制度は、溶接やグレージングなどの必須スキルに加えて、他のデジタル スキルの中でも 3D プリンティングと CAD を組み込むために 2018 年に導入されました。\nこれは、A レベル 3 つと同等のレベル 3 の実習です。これは、以前のレベル 2 および 3 の「クラシック ビークル フレームワーク」実習に代わるものです。\nHSA マネージングディレクターのジョン・ピッチフォース氏は、HSA は「最新のテクノロジーとエンジニアリングの基礎」を組み合わせたもので、「根本的に改善された」と述べています。\n政府の実習データによると、レベル 2 の中級実習を開始する人の数が過去 1 年間で 4 分の 1 近く減少し、より高いレベルの実習（レベル 4 から 7 まで）を開始する人が増えていることが示されています。\nレベル 6 と 7 はそれぞれ学士号と修士号に相当します。レベル 3 の実習生の数は安定しています。\nしかし、テクノロジーがカリキュラムに対する影響力を強めている今、実習生は特定の職業の実際のスキルを犠牲にして、コンピューター ソフトウェアの実行方法を学ぶだけなのでしょうか?\nHSA のピッチフォース氏は、この組織の実習生はおそらく他のプログラムの実習生よりも高いスキルを持っていると主張しています。\n「現代の技術者が私たちの分野に異動するために私たちのところに来るとき、彼らは基本的な工学原理を欠いていることが多く、何が問題なのかを知らせるコンピューターがなければ車両システムの診断や修理ができないのです」と彼は言う。\nChris Iveson は、産業企業が生産監視データを取得するためのプラットフォームである FourJaw Manufacturing Analytics の CEO です。彼はシェフィールドに拠点を置き、FourJaw は多くの地元企業と協力しています。\n「現代の実習生は、ものづくりの実践的なスキルと、生産現場で何が起こっているのかを理解するためにテクノロジーを使用するデジタルスキルという 2 つのことを同時に学ぶことが増えています」とアイブソン氏は説明します。\n「これには、CNC プログラミング (自動化ツールのコーディング)、CAD、ロボット工学、積層造形、品質管理システム、生産監視が含まれる可能性があります。これらはすべて、現在、現代のエンジニアリングおよび製造の見習いルートに登場しています。」\nしかし、訓練の範囲が狭すぎると、実習生は材料、方法、工具、品質、プロセスについて適切な理解を欠くことになる可能性があると同氏は警告する。\n市内中心部のフォージョーから少し離れたところに、ハサミメーカーのアーネスト ライトがあります。 1902 年以来操業しており、かつては 100 以上の工房から刃物製造業を誇っていた市内にわずか 2 軒しか残っていないはさみメーカーのうちの 1 つです。\n現在はアーネスト・ライトと町の反対側に住むウィリアム・ホワイトリーだけが残っている。\nアーネスト ライトはその長い歴史を誇りに思っていますが、その最新の製造技術はハサミやハサミの市場にニッチ市場を生み出すのに役立ちました。\n同社はシェフィールド大学と協力して、新製品開発のプロセスをより迅速かつ低コストにするために 3D 金属印刷を導入しました。現在では、従来の方法で製造される高精度のプロトタイプを作成できるようになりました。\n同社は 3D メタル プリントを使用して 1960 年代の「保育士用ハサミ」を復活させ、現在ではこれを使用して、主にヴィンテージのデザインに基づいた新製品を毎年作成しています。\n「今では、（テストとして）金属印刷でハサミを6組だけ作ることができます。そうすれば、何かを変えたければ、6,000組も作る必要はありません」と、同じオランダ人のジャンバート・ファノイ氏とともに2018年に同社を買収したポール・ジェイコブス氏は言う。\n航空宇宙工学の学位を取得する傍ら、過去 3 年間アーネスト ライト社でパートタイムで働いてきた研修生エリオット ナーコム氏にとって、このようなテクノロジーを扱う機会は、以前から興味を持っていた職業を学ぶ上でエキサイティングな要素を追加しました。\n「メンテナンスの面では、私たちの機械の部品の多くはもう存在しないので、CAD や 3D プリントなどの最新テクノロジーを使用して、一部を複製することができました」と、21 歳のナーコム氏は言います。\n「しかし、テクノロジーがこのワークショップで行われていることを引き継いだり、影を落としたりすることはないと思います。私たちがここで作っているものや私たちが日々行っていることの実際の生産という点では、テクノロジーがここで働く人々からそれを引き継ぐ本当の機会はありません。」\n1760 年から続くホワイトリー社でも、2024 年の所有者変更後、3D プリンティングによって事業が活性化しました。ホワイトリー家の 11 代目であるサリー ウォードさんと夫のジェレミーさんは退職し、事業を製造会社ケイミッチに売却しました。\nマネージングディレクターのマーク・ホワイト氏は、再生チタンなどの新素材の使用を検討しているが、ホワイトリーのハサミの背後にある職人技を維持するために、さらなるテクノロジーの導入に慎重なアプローチをとっている。\n「現時点では、より多くのテクノロジーに投資して人々を失業させるのではなく、ハサミ製造業者の見習いを募集したいと考えています」とホワイト氏は言う。\n「私たちがやろうとしているのは、マシンに何かをロードしてボタンを押すことではありません。」\nシェフィールド市内中心部の外科用器具メーカーであるプラッツ＆ニスベット社では、現在、プロセスには第 1 段階で CNC が含まれています。この段階では、ソフトウェア プログラムが機械にコンポーネントの切断を指示します。その後、手作業で取り付けられ、仕上げられます。\nまた、各器具にはレーザータグが付けられているため、最終的にどの病院に運ばれたとしても、Platts & Nisbett まで遡ることができます。\nしかし、テクノロジーの台頭により多くの人々の興味がその方向に移ったため、次世代の工芸人材の採用は簡単ではありませんでした。\nビジネス開発マネージャーのジュリー・トップハム氏は、「ボタンを押したい人はたくさんいるだろう。コンピューター以外で手を使って仕事をするのが好きな人も増えてくるだろう」と語る。\nビジネスのさらなるテクノロジー\n- 6 月 12 日発行\n- 6 月 5 日発行\n- 6 月 9 日発行",

    "bodyOriginal": "'I made £100,000 of TikTok sales in one day': The business of live shopping\n- Published\nDaisy Kelly's business was inspired by a personal problem - for years she'd been pulling out her eyelashes.\nShe hid her habit with lash extensions, but when beauty salons closed during Covid Daisy decided to create a serum to help her eyelashes grow back.\nShe started Glow For It from her mother's kitchen table in 2020 while she was a student and now her business generates £6m a year in sales.\nMore than 40% of Daisy's sales come from TikTok Shop UK and increasingly from livestreams.\n\"I think live shopping gives people that connection and interaction that we're all craving... We actually generated over £100,000 revenue in one 12 hour TikTok live,\" says Daisy, 27.\n\"It's categorically changed the trajectory of my business.\"\nDaisy's business goes live from a studio for a minimum of six hours a day with different presenters interacting with shoppers, from showing off products to answering their questions.\n\"It's like having 500 people in your shop,\" she says.\nThere are a host of platforms and marketplaces now offering livestreams connecting sellers and customers, from Instagram Live, YouTube Shopping, to eBay and Amazon Live. They're all different.\nLive shopping, it seems, is becoming part of everyday consumer behaviour for many.\nAccording to new research from retail agency Savvy Marketing, 30% of shoppers surveyed said they'd bought something from a live shopping event.\n\"The big retailers have got to grab hold of this,\" says Catherine Shuttleworth, CEO of Savvy. \"It's grown from nothing to a huge thing really quickly. If you haven't got a strategy for live selling, you're going to miss out.\"\nTikTok Shop says its UK sales grew by more than 30% year-on-year in June, with live shopping the fastest-growing format.\nIt says it now has more than 6,000 livestreams taking place every day.\nAt an event in the centuries old Covent Garden market, it hosted 20 small businesses with stalls who were also selling live to customers all over the UK.\nWith nothing more than a smartphone, a lighting kit and a fridge full of fresh meat, halal butcher Manny Malik from Wolverhampton had around two hundred people tuning into his session.\n\"Last week we did a TikTok live for three hours and we sold £8,000 worth of meat,\" he says.\nIt would normally take him three to four days to sell this amount in his family shop, Malik Butchers.\nThey're now opening a second store in Stoke. TikTok, he says, is helping to drive his expansion.\nBut there are fees.\nTikTok Shop UK keeps up to 9p from every £1 sold on the platform, as its standard commission.\nAs a comparison, eBay's marketplace business sellers typically pay between 6.9p and 14.9p depending on the category. Businesses selling on the dedicated live selling format, eBay Live, pay a combined fee of up to 8.42p including payment processing.\n\"It's a lot,\" says Manny.\n\"For us in the meat game, there aren't huge margins. However, it's opened up a new platform. We didn't have these sales prior to TikTok. We're not losing money, we've got enough profitability in there,\" he adds.\nBuket Sevik, 34, founded her jewellery brand Adorina in February after quitting her 9-5 job as a business manager. Her new business went from 50 orders a month to 500 orders a week since she started live selling on TikTok UK shop in May.\nShe's gone from working from her dining table to live streaming from a small unit, where orders are now being packed.\n\"It's crazy,\" she laughs.\nDemand is so high, she's trying to hire someone to help.\nBut for Buket, the best thing about livestreaming is the flexibility.\n\"I can go live whenever I want... which means it works absolutely perfectly for me as a mum. I can put my daughter to sleep and I can just hit go live and do some sales.\"\nSavvy's latest survey of shoppers also found that 66% of Gen Y and Gen Z shoppers said seeing products sell out or go viral made them more likely to buy.\nThat's something that worries the free debt advice service, Money Wellness, which warns live shopping events are \"a recipe for overspending\", says external relations manager Rebecca Lamb.\n\"Every time you snap up a bargain before it sells out, your brain gets a dopamine hit - the same rush you get from gambling,\" she says.\n\"And because a lot offer one tap payment, there's no card, no basket and no total. Often you've spent money before your brain has caught up,\" she says.\nHow to avoid overspending on live shopping\n- Published4 April 2025",
    "bodyJa": "「1 日で TikTok で 10 万ポンドの売り上げを上げました」: ライブ ショッピングのビジネス\n- 公開されました\nデイジー ケリーのビジネスは、彼女が何年もまつ毛を抜いていた個人的な問題からインスピレーションを得たものでした。\n彼女はまつげエクステでその癖を隠していましたが、新型コロナウイルス感染症の影響で美容院が休業になったため、デイジーはまつげが生えてくるのを助ける美容液を作ることにしました。\n彼女は学生だった 2020 年に母親のキッチンテーブルから Glow For It を始め、現在、彼女のビジネスは年間 600 万ポンドの売上を上げています。\nデイジーの売上の 40% 以上は TikTok Shop UK からのものであり、ライブストリームからのものも増えています。\n「ライブ ショッピングは、私たちが切望しているつながりや交流を人々に提供すると思います。実際、12 時間の TikTok ライブで 10 万ポンド以上の収益を生み出しました」とデイジー (27 歳) は言います。\n「それは私のビジネスの軌道を決定的に変えました。」\nデイジーのビジネスはスタジオから 1 日最低 6 時間ライブで行われ、さまざまなプレゼンターが商品の紹介から質問に答えるまで、買い物客と対話します。\n「店に 500 人がいるようなものです」と彼女は言います。\n現在、Instagram Live、YouTube ショッピング、eBay、Amazon Live に至るまで、売り手と顧客をつなぐライブストリームを提供するプラットフォームやマーケットプレイスが多数存在します。それらはすべて異なります。\nライブ ショッピングは、多くの人にとって日常の消費者行動の一部になりつつあるようです。\n小売代理店サビー マーケティングの最新調査によると、調査対象となった買い物客の 30% が、ライブ ショッピング イベントで何かを購入したことがあると回答しました。\n「大手小売業者はこれをしっかりと掴まなければなりません」とサヴィーのCEO、キャサリン・シャトルワースは言う。 「何もないところから、本当にあっという間に巨大なものに成長しました。ライブ販売の戦略を持っていなければ、チャンスを逃すことになります。」\nTikTok Shopは、6月の英国での売上が前年比30％以上増加し、ライブショッピングが最も急成長しているフォーマットだと発表した。\n現在では毎日 6,000 回以上のライブストリームが行われているという。\n何世紀もの歴史を持つコベントガーデン市場でのイベントでは、20 の中小企業が出店し、英国中の顧客に生販売を行っていました。\nウルヴァーハンプトンのハラール肉屋マニー・マリクさんは、スマートフォン、照明キット、そして新鮮な肉が詰まった冷蔵庫だけを持って、約 200 人の人々を彼のセッションに視聴させました。\n「先週、私たちはTikTokライブを3時間行い、8,000ポンド相当の肉を売りました」と彼は言う。\n彼の家族の店であるマリク・ブッチャーズでこの量を売るには通常 3 ～ 4 日かかります。\n彼らは現在、ストークに2店舗目をオープンしています。 TikTok が事業拡大の原動力になっている、と彼は言う。\nただし手数料がかかります。\nTikTok Shop UK は、プラットフォーム上で販売される 1 ポンドごとに最大 9 ペンスを標準手数料として徴収します。\n比較として、eBay のマーケットプレイス ビジネスの販売者は通常、カテゴリーに応じて 6.9 ペンスから 14.9 ペンスの間で支払います。専用のライブ販売フォーマットである eBay Live で販売する企業は、支払い処理を含めて最大 8.42 ペンスの合計手数料を支払います。\n「それはたくさんあります」とマニーは言います。\n「ミートゲームに携わる私たちにとって、大きな利益はありません。しかし、新しいプラットフォームが開かれました。TikTok以前にはこのような売上はありませんでした。私たちは損失を出していません。十分な収益性があります。」と彼は付け加えた。\n34歳のブケット・セヴィクさんは、ビジネスマネージャーとして9時5時の仕事を辞めた後、2月にジュエリーブランド「アドリナ」を設立した。 5 月に TikTok UK ショップでライブ販売を開始して以来、彼女の新しいビジネスは月に 50 件の注文から週に 500 件の注文に増加しました。\n彼女はダイニング テーブルで仕事をすることから、小さなユニットでライブ ストリーミングを行うようになり、現在はそこで注文が詰め込まれています。\n「クレイジーだよ」と彼女は笑う。\n需要が非常に高いため、彼女は手伝ってくれる人を雇おうとしています。\nしかし、Buket 氏にとって、ライブストリーミングの最も優れている点は柔軟性です。\n「いつでも好きなときにライブに参加できる…つまり、母親としては完璧に機能します。娘を寝かしつけることができるので、ライブ配信を押して販売を行うことができます。」\nサビーの買い物客に対する最新の調査では、Y世代とZ世代の買い物客の66％が、商品が売り切れたり、話題になったりするのを見ると購入する可能性が高まると答えていることも判明した。\nこれは、無料の借金相談サービスであるマネーウェルネスにとって懸念されることであり、ライブショッピングイベントは「浪費の原因」であると警告している、と対外関係マネージャーのレベッカ・ラム氏は言う。\n「売り切れる前にバーゲン品を手に入れるたびに、脳はドーパミンの分泌を促します。これはギャンブルで得られる興奮と同じです」と彼女は言います。\n「そして、ワンタップ支払いを提供しているところが多いので、カードもバスケットも合計金額もありません。頭が追いつく前にお金を使ってしまうことがよくあります」と彼女は言う。\nライブショッピングでの使いすぎを避ける方法\n- 2025 年 4 月 4 日発行",

    "id": "trump-imposing-50-tariffs-on-certain-can-341d7d4c",
    "title": "Trump imposing 50% tariffs on certain Canadian goods over alleged trade discrimination",
    "titleJa": "トランプ大統領、貿易差別疑惑でカナダの特定製品に50％の関税を課す",
    "summaryJa": "トランプ政権高官らは月曜、複数の米国製品や産業に対する貿易差別疑惑に対抗し、米国がカナダの幅広い製品に50％の追加関税を課していると明らかにした。ドナルド・トランプ大統領は月曜、米国が不当な扱いを受けていると主張する自動車、アルコール、乳製品などの個別分野への対応として、カナダからのさまざまな輸入品に高額関税を課す３つの宣言に署名したと当局者らは記者団との電話会談で述べた。",
    "bodyOriginal": "The U.S. is imposing additional 50% tariffs on a range of Canadian goods in response to alleged trade discrimination against multiple U.S. products and industries, senior Trump administration officials said Monday.\nPresident Donald Trump signed three proclamations Monday targeting different sets of Canadian imports with the steep tariffs in response to separate areas — motor vehicles, alcohol and dairy — where the U.S. says it has been treated unfairly, the officials said in a call with reporters.\nThe tariffs, which fall under the rarely used Section 338 of the Tariff Act of 1930, are set to take effect 30 days after the signings, according to the officials.\nEach proclamation slaps tariffs on different Canadian products, \"ranging from wine to hockey sticks to cement,\" an official on the call said.\nThe new tariffs \"apply to all covered goods,\" regardless of whether they are otherwise covered under the existing free trade agreement between the U.S. and Canada, the official said.\n\"Canada has to be held accountable for this continued discrimination,\" the official said.\nOntario Premier Doug Ford said on X later Monday afternoon that Canada \"should respond tariff for tariff, dollar for dollar\" if the new U.S. import duties proceed.\nThe Canadian Embassy in Washington, did not immediately respond to CNBC's request for comment on the new U.S. trade actions.\nCanada's status as the U.S.'s long-time close ally and trade partner has eroded amid Trump's tariff-heavy agenda and vocal displeasure with the nations' trilateral trade pact including Mexico, among other sources of tension.\nThe U.S. and Canada engaged in escalating trade fight last year, as Trump slapped heavy tariffs on Canadian goods and Ottawa retaliated.\nEarlier this month, the Trump administration said it would not renew that trade agreement, known as USMCA, opting instead to cast a shadow over the treaty's future by triggering a series of annual reviews.\nLast week, Trump tore into Canada over the wildfires blazing through northwestern Ontario, which led to major air pollution issues across large areas of the U.S. mainland.\nClaiming the issue has harmed the U.S. to the tune of billions of dollars, Trump wrote on Truth Social that those costs \"must of necessity be added to the TARIFFS Canada is currently paying.\"\nOne of the senior officials on Monday specified that the newly announced 50% tariffs on Canadian goods are not related to the wildfires — but added that Trump \"has asked for options on that.\"\nSection 338 gives the president the power to impose tariffs of up to 50% on the goods of countries found to be discriminating against the U.S.\nThe obscure tariff-setting authority has \"gone unused for decades,\" John Veroneau and Catherine Gibson of law firm Covington and Burling LLP wrote in a 2016 article. They found no public record relating to Section 338 since 1949.",
    "bodyJa": "トランプ政権高官らは月曜、複数の米国製品や産業に対する貿易差別疑惑に対抗し、米国がカナダの幅広い製品に50％の追加関税を課していると明らかにした。\nドナルド・トランプ大統領は月曜、米国が不当な扱いを受けていると主張する自動車、アルコール、乳製品などの個別分野への対応として、カナダからのさまざまな輸入品に高額関税を課す３つの宣言に署名したと当局者らは記者団との電話会談で述べた。\n当局者らによると、この関税はほとんど使用されていない1930年の関税法第338条に該当し、署名から30日後に発効する予定だという。\n電話会議に参加した当局者によると、各宣言は「ワインからホッケースティック、セメントに至るまで」さまざまなカナダ製品に関税を課すことになる。\n同当局者は、新たな関税は、米国とカナダ間の既存の自由貿易協定の対象となるかどうかに関係なく、「対象となるすべての品目に適用される」と述べた。\n「カナダは、この継続的な差別に対して責任を負わなければならない」と当局者は述べた。\nオンタリオ州のダグ・フォード首相は月曜午後遅くのテレビ番組「X」で、米国の新たな輸入関税が進めばカナダは「関税には関税、ドルにはドルで対応すべきだ」と述べた。\nワシントンのカナダ大使館は、米国の新たな通商措置に関するCNBCのコメント要請にすぐには応じなかった。\n米国の長年の緊密な同盟国で貿易相手国としてのカナダの地位は、トランプ大統領の関税重視の政策や、メキシコを含む三国間貿易協定に対する不満の声など、緊張の原因の中で損なわれている。\n米国とカナダは昨年、トランプ大統領がカナダ製品に高額関税を課し、オタワが報復するなど貿易摩擦が激化した。\n今月初め、トランプ政権はUSMCAとして知られる貿易協定を更新せず、代わりに一連の年次見直しを開始することで協定の将来に影を落とすことを選択したと発表した。\nトランプ大統領は先週、オンタリオ州北西部で発生した山火事をめぐってカナダに侵攻し、米国本土の広い地域で大規模な大気汚染問題が発生した。\nトランプ大統領は、この問題が米国に数十億ドル規模の損害を与えたと主張し、こうした費用は「カナダが現在支払っている関税に必然的に追加される必要がある」とトゥルース・ソーシャルに書いた。\n高官の一人は月曜日、新たに発表されたカナダ製品に対する50％の関税は山火事とは関係ないと明言したが、トランプ大統領は「それに関する選択肢を求めてきた」とも付け加えた。\n第338条は、米国に対して差別的行為を行っていると判明した国の商品に最大50％の関税を課す権限を大統領に与えている。\n法律事務所コヴィントン・アンド・バーリングLLPのジョン・ベロノー氏とキャサリン・ギブソン氏は、このあいまいな関税設定権限は「何十年も使われていなかった」と2016年の記事で書いている。彼らは1949年以来、第338条に関連する公的記録を発見しなかった。",

    "title": "The 20-somethings betting big on tech stocks",
    "titleJa": "ハイテク株に大きく賭けている20代",
    "summaryJa": "ハイテク株に大きく賭けている20代- 公開されました",
    "bodyOriginal": "The 20-somethings betting big on tech stocks\n- Published\nIn her teens, Michelle Huynh, the eldest daughter of migrant parents in Australia, made a promise to her family that she would become a millionaire by the time she turned 30.\nThe 26-year-old describes it as \"a somewhat silly promise\" inspired by the sacrifices her non-English-speaking parents made to raise the family.\nBut she is trying to make that dream come true by investing her savings in the stock market.\n\"Times are so different and investing has become a necessity,\" says Huynh, who works in sales for a tech firm. \"It feels like our purchasing power is shrinking. This is the only way to combat that.\"\nThis year, the technology-driven surge in stock markets has edged her closer to that goal.\nWith more than a third of her investments in tech stocks, by the middle of July that part of her savings had jumped this year by 50% - a rise of A$31,000 (£16,100; $21,666).\nBut those gains have now eased to about A$22,000 as the sector is going through what she calls a \"wild moment\".\nHuynh says she's prepared for the volatility, viewing those investments as a long-term bet.\nThe rise in tech stocks, led by firms riding the artificial intelligence (AI) boom, has attracted large numbers of ordinary investors, many of them in their 20s and early 30s, even as some analysts warn that the fervour around AI may be overblown.\nRetail investors have been caught up in the excitement, which has been fuelled by social media and marketing efforts to draw non-professionals, says Glenn Tan from advisory firm Providend.\nHuge swings - both ways\nThe tech-heavy Nasdaq in the US is up by about 10% this year, while Japan's Nikkei 225 has risen by more than 20%.\nBut many tech stocks have seen big swings - both up and down.\nThat volatility is most apparent in South Korea. Seoul's Kospi index, which includes tech heavyweights like SK Hynix and Samsung Electronics, has jumped by more than 50% since January.\nThe rally has attracted an army of retail investors, known locally as \"ants\", which has helped fuel volatile trading.\n\"I could maybe count with my hands the number of people who aren't investing today,\" South Korean investor U Chan Lee says. \"Even stay-at-home mothers, like my mum, who has never been interested in the stock market, are now interested.\"\nBut the Kospi has seen some dramatic moves. Since hitting a record high of more than 9,000 points in June it has plunged to around 6,500.\nTrading on the benchmark index has been halted seven times this year under a mechanism called the circuit breaker, designed to calm panic selling after it fell by 8%.\nThose slides have raised concerns over people who have borrowed money to invest in stocks, leading to South Korean authorities taking action to curb the practice.\nLee, 30, sold many of his shares last year when the Kospi surged, concerned the market was becoming \"too overheated\". Since then, he has shifted to buying stocks when they fall and selling them when they rise a few days later.\nThe FTSE 100 has hit a record high. Is now the time to start investing?\n- Published11 January\nThe swings reflect the hazards of investing in tech, some analysts warn.\nAs governments and companies pour hundreds of billions of dollars into developing AI, sceptics are asking whether the technology will be profitable enough to justify such huge investments.\nPeople often make bets on \"optimistic outcomes\" or \"the most visible winners\" that are not based on a business's profitability, analyst Lale Akoner from investment firm eToro says.\nRetail investors often view drops in shares as buying opportunities, treating each sell-off as a \"test of conviction\", she says, but they need to be aware of \"how painful valuation resets can be\".\nChasing gains\nJacqueline Choi, from South Korea, says she missed out on bigger gains by not investing more ahead of the Kospi's rally, and was forced to sell Hyundai Motor and Samsung Electronics shares when she needed money.\n\"Why didn't I go in and buy those SK Hynix stocks or extra Samsung stocks with all of my savings?\" the 28-year-old now wonders.\nEarlier this month, computer chipmaker SK Hynix debuted in New York, raising $26.5bn to become the largest ever US listing by a foreign firm.\nSome of Choi's friends have used thousands of dollars of their savings to invest in stocks.\n\"I should really invest more, knowing that investing can earn you so much more than your everyday job,\" she says.\nSingaporean business student Shyan Lim is a firm believer in AI-related shares, putting about three-quarters of his savings into tech stocks.\nThe 24-year-old says there have been plenty of \"uneasy\" days when his investments plunged by as much as 10%, but he is willing to take his chances.\nOverall, his bets have worked so far. In October, he invested 23,000 Singapore dollars (£13,185; $17,845) in chipmakers Intel and Micron. Those shares are now worth about 100,000 Singapore dollars.\n\"It feels like I'm one step closer to retirement,\" Lim says. \"While I'm still young I think I can take the risk. I probably won't take such positions when I'm older.\"\nWith more than half of his investments in tech, George Lee, who recently graduated, says he is well aware of the lack of resources and other disadvantages that ordinary traders can face.\n\"Investing doesn't just come down to luck, though it does play a part,\" Lee says.\n\"As long as the fundamentals of a company don't change, I'm ready for the swings since I have time to let my shares run.\"\nNot just down to luck\nBut not everyone is willing to bet it all on tech.\nSingaporean student Ayush Deb says the sector accounts for only about a third of his investments. The 23-year-old says even that has been difficult for him, recalling how in June his memory chip-focused investments fell by more than 10% in just one day.\nThe same day, people on investment forums started discussing \"who got burned\".\n\"I've ridden the highs and lows of tech stocks but the sector is quite hard to read,\" says Deb, who has invested since his late teens. \"I try to cut out a lot of the noise in this industry and focus on making informed picks.\"\nDeb says he felt a sense of \"FOMO\" - fear of missing out - when he was unable to buy SpaceX stocks when Elon Musk's space and AI company listed in June.\nBut despite surging to $225 at one point, the shares have since dropped below their $135 stock market listing price.\nThat's as its potential for profitability has been questioned by some analysts.\nDespite the buzz surrounding SpaceX, Singaporean investor Lim says he avoids newly listed stocks to give himself more time to study a company's operations.\nHe would do the same with Anthropic and OpenAI, as the leading AI developers eye $1 trillion stock market debuts, Lim adds.\nIn Sydney, Michelle Huynh, who creates her own finance-related social media content, says investing can be daunting for people entering the workforce because such skills are not widely taught in schools.\nShe added that staying on top of the news is an \"underrated skill\" and has recently turned to energy and metal stocks based on what she has read, believing they will benefit from heavy investment in chip manufacturing.\n\"I think many young people are afraid of investing - and validly so. It can feel like gambling if you're not aware of what's going on.\"",
    "bodyJa": "ハイテク株に大きく賭けている20代\n- 公開されました\nオーストラリア移民の両親の長女であるミシェル・ハインさんは、10代の頃、「30歳になるまでに億万長者になる」と家族に約束した。\n26歳の彼女は、英語を話さない両親が家族を養うために払った犠牲に触発された、それを「ちょっとばかげた約束」だったと説明する。\nしかし彼女は、貯金を株式市場に投資することでその夢を実現しようとしている。\n「時代は大きく変わり、投資は必要不可欠なものになりました」とハイテク企業で営業職を務めるフイン氏は言う。 「私たちの購買力は縮小しているように感じます。これに対抗する唯一の方法です。」\n今年、テクノロジー主導の株式市場の急騰により、彼女はその目標に近づいた。\n彼女の投資の 3 分の 1 以上がハイテク株であったため、7 月中旬までに彼女の貯蓄の一部は今年 50% 増加し、3 万 1,000 オーストラリアドル (1 万 6,100 ポンド、2 万 1,666 ドル) 増加しました。\nしかし、このセクターが彼女の言うところの「最悪の時期」を迎えているため、その上昇幅は現在約2万2000豪ドルまで落ち込んでいる。\nフイン氏は、こうした投資は長期的な賭けだと考えており、ボラティリティに対しては準備ができていると語る。\n人工知能（AI）ブームに乗った企業主導のハイテク株の上昇は、AIをめぐる熱狂が行き過ぎの可能性があると警告するアナリストもいるにもかかわらず、多くの一般投資家（その多くは20代から30代前半）を惹きつけている。\n顧問会社プロビデンドのグレン・タン氏によると、個人投資家はソーシャルメディアや非専門家を惹きつけるマーケティング活動によって煽られたこの興奮に巻き込まれているという。\n大きなスイング - 双方向\nハイテク株の多い米国のナスダックは今年約10％上昇し、日本の日経平均株価は20％以上上昇した。\nしかし、ハイテク株の多くは上昇も下降も大きく変動している。\nその不安定さは韓国で最も顕著だ。 SKハイニックスやサムスン電子などのハイテク企業を含むソウルのコスピ指数は1月以来50％以上上昇した。\nこの集会には地元で「アリ」として知られる個人投資家の集団が集まり、不安定な取引を加速させた。\n「今日、投資をしていない人の数は手で数えられるかもしれない」と韓国の投資家ウー・チャン・リー氏は言う。 「私の母のように、これまで株式市場に興味がなかった専業主婦も、今では興味を持つようになりました。」\nしかし、コスピにはいくつかの劇的な動きが見られた。 6月に9,000ポイント以上の過去最高を記録して以来、6,500ポイント程度まで下落した。\nベンチマーク指数の取引は、8％下落後のパニック売りを鎮めるためのサーキットブレーカーと呼ばれるメカニズムに基づき、今年7回停止された。\nこれらのスライドは、株式投資のためにお金を借りた人々に対する懸念を引き起こし、韓国当局がこの行為を抑制するための措置を講じることにつながった。\n30歳のリー氏は昨年、コスピが急騰した際、市場が「過熱しすぎている」と懸念し、保有株の多くを売却した。それ以来、株が下がったら買い、数日後に上がったら売るというスタイルに移行した。\nFTSE100は過去最高値を更新した。今が投資を始める時期ですか？\n- 1 月 11 日公開\nこの変動はハイテク投資の危険性を反映していると一部のアナリストは警告している。\n政府や企業がAIの開発に数千億ドルをつぎ込む中、懐疑論者たちは、そのテクノロジーがそのような巨額の投資を正当化するほど十分な利益をもたらすのか疑問を抱いている。\n投資会社イートロのアナリスト、ラーレ・アコナー氏によると、人々は企業の収益性に基づいていない「楽観的な結果」や「最も目に見える勝者」に賭けることが多いという。\n個人投資家は株価下落を買いの機会と捉え、それぞれの下落を「信念を試すテスト」として扱うことが多いが、「評価額のリセットがどれほど苦痛であるか」を認識する必要がある、と彼女は言う。\n利益を追求する\n韓国のジャクリーン・チョイさんは、コスピの上昇に先立って追加投資しなかったため、より大きな利益を逃し、資金が必要になったときに現代自動車とサムスン電子の株を売らざるを得なくなったと語った。\n「どうして貯金をはたいてSKハイニックス株や追加のサムスン株を買わなかったのでしょう？」 28歳の彼は今不思議に思っている。\n今月初め、コンピューターチップメーカーのSKハイニックスがニューヨークでデビューし、265億ドルを調達し、外国企業による米国上場としては史上最大となった。\nチョイさんの友人の中には、数千ドルの貯金を使って株式に投資している人もいる。\n「投資は日常の仕事よりはるかに多くの収入を得ることができると知っているので、本当にもっと投資すべきです」と彼女は言います。\nシンガポールのビジネス学生シャアン・リムさんはAI関連株を強く信じており、貯蓄の約4分の3をハイテク株につぎ込んでいる。\n24歳の彼は、投資額が10％も急落するなど「不安な」日々が何度もあったが、チャンスをつかむつもりだと語った。\n全体として、これまでのところ彼の賭けはうまくいっている。 10月、同氏はチップメーカーのインテルとマイクロンに2万3000シンガポールドル（1万3185ポンド、1万7845ドル）を投資した。これらの株は現在約10万シンガポールドルの価値がある。\n「引退に一歩近づいたような気がします」とリムは言う。 「まだ若いうちはリスクを負えると思う。年をとったらおそらくそのようなポジションには就かないだろう」\n最近卒業したばかりのジョージ・リー氏は、投資の半分以上をテクノロジーに投資しており、リソースの不足や一般のトレーダーが直面する可能性のあるその他の不利な点をよく知っていると語る。\n「投資は運だけで決まるわけではありませんが、運も影響します」とリー氏は言う。\n「企業のファンダメンタルズが変わらない限り、株を動かす時間はあるので、変動に対しては準備ができています。」\n運だけではない\nしかし、誰もがテクノロジーにすべてを賭けようとしているわけではありません。\nシンガポール人の学生アユシュ・デブさんは、この分野への投資は投資額の約3分の1にすぎないと語る。 23歳の彼は、6月にメモリチップに重点を置いた投資がわずか1日で10％以上下落したことを思い出しながら、それすら困難だったと語る。\n同じ日、投資フォーラムの人々は「誰が火傷を負ったのか」について議論し始めた。\n「ハイテク株の高値も安値も乗りこなしてきたが、このセクターは非常に読みにくい」と10代後半から投資してきたデブは言う。 「私はこの業界の多くのノイズを排除し、情報に基づいた選択をすることに集中しようとしています。」\nデブ氏は、イーロン・マスク氏の宇宙・AI企業が6月に上場した際にスペースX株を買えなかったとき、「FOMO」（チャンスを逃すことへの恐怖）の感覚を感じたという。\nしかし、株価は一時225ドルまで急騰したものの、その後は株式市場公開価格の135ドルを下回っている。\n一部のアナリストは収益性の可能性に疑問を抱いているためだ。\nスペースXをめぐる話題にもかかわらず、シンガポール人の投資家リム氏は、企業の経営を研究する時間を増やすために新規上場株を避けていると語る。\n主要なAI開発者が1兆ドルの株式市場デビューに注目しているため、彼はAnthropicとOpenAIでも同じことをするだろうとリム氏は付け加えた。\nシドニーで金融関連のソーシャルメディアコンテンツを独自に作成しているミシェル・ハインさんは、投資は学校でそのようなスキルが広く教えられていないため、これから社会に出ようとする人々にとって困難になる可能性があると語る。\n同氏は、ニュースを常に把握し続けることは「過小評価されているスキル」であり、最近は、読んだ情報に基づいて、チップ製造への多額の投資から恩恵を受けると信じて、エネルギー株と金属株に目を向けていると付け加えた。\n「多くの若者は投資を恐れていると思いますが、それは当然のことです。何が起こっているのかを理解していないと、ギャンブルのように感じるかもしれません。」",

    "id": "the-fda-made-a-big-reversal-in-its-cyclo-3af940ec",
    "title": "The FDA made a big reversal in its cyclosporiasis probe, but it still thinks iceberg lettuce is to blame",
    "titleJa": "FDAは嚢胞子症の調査で大きな逆転を果たしたが、依然としてアイスバーグレタスが原因であると考えている",
    "summaryJa": "食品医薬品局が嚢胞子症調査の重要な部分について撤回したことは米国で混乱を引き起こしているが、同局は月曜、この発生に関する主な結論は変更していないと発表した。同庁は日曜日、メキシコのテイラー・ファームズから供給されたアイスバーグ・レタスのサンプルがシクロスポラ原虫を保有していることを示す検査が偽陽性であったと発表した。しかし、これは同社が供給したレタスの特定の1つの出荷にのみ適用され、政府機関は、それが1,600人以上、そしておそらく他の数千人に病気を引き起こした車両であるとは考えていません。",
    "bodyOriginal": "The Food and Drug Administration's reversal on a key piece of its cyclosporiasis investigation has sparked confusion in the U.S., but the agency said Monday that it has not changed its main conclusions about the outbreak.\nThe agency said Sunday a test that indicated a sample of iceberg lettuce supplied by Taylor Farms de Mexico carried the cyclospora parasite was a false positive. However, that only applies to one specific shipment of lettuce supplied by the company, which the agency does not believe was the vehicle that sickened more than 1,600 people and potentially thousands of others.\nIn a Monday clarification, the agency said its false positive does not change its prior conclusion that the outbreak is linked to shredded iceberg lettuce from central Mexico supplied by Taylor Farms, which was also served at some Taco Bell locations. The agency is still advising Americans not to eat recalled iceberg lettuce.\n\"FDA's traceback investigation and outbreak data continue to converge on shredded iceberg lettuce from Taylor Farms locations in central Mexico,\" it said in a statement. \"FDA will continue to work with federal and state partners to investigate this multistate outbreak and ensure products implicated in this outbreak have been removed from the market.\"\nInvestigators are continuing to examine what exactly caused the outbreak, which can lead to symptoms similar to a bad stomach bug for days or even weeks. CNBC has reached out to the FDA for details on the next phase of the investigation, including whether additional ingredients or suppliers are under scrutiny and whether the agency expects to issue further guidance. The agency has not yet responded.\nThe false positive test comes as the developing investigation creates uncertainty for both consumers and the food industry. While the FDA has said not to eat iceberg lettuce from Taylor Farms, some diners have stayed away from salads altogether as the number of cases rises.\n\"Unfortunately, this latest development may add further confusion to what has already been a complex situation for consumers,\" said Frank Yiannas, former deputy commissioner of food policy and response at the FDA.\nThough industry analysts do not expect the outbreak to have a long-term impact on Taco Bell or other restaurant chains, it could at least temporarily hit sales, based on foot traffic data, and cause a one-to-two quarter hit for companies linked to it. Foot traffic at Taco Bell sank roughly 19% on Friday compared to the day-of-the-week average so far this year, according to data from research firm Placer.ai.\nWhat the FDA's false positive means\nIn foodborne outbreak investigations, a false positive can happen when an initial screening signal isn't reproduced during confirmation testing. Some doctors have pointed out that cyclospora is particularly challenging to recreate in the lab.\nBut it has not caused a shift in how public officials view the root of the outbreak.\nThe Department of Health and Human Services in Michigan, where the outbreak has seen explosive growth, says it continues to recommend that people purchase whole heads of lettuce rather than pre-washed, bagged or pre-mixed salad kits.\nThe agency added that based on interviews with more than 2,000 infected patients, many of them did not report eating lettuce at a restaurant, though they frequently said they ate the leafy green in some setting.\nTaylor Farms said Monday morning it will continue its voluntary recall of implicated iceberg lettuce from central Mexico, and Taco Bell has already started to remove the suspected lettuce from restaurants in affected states.\nThe ripple effects go beyond those companies.\nWalmart said Monday that it proactively removed four bagged salad kit products, which are under its Marketside brand and supplied by Taylor Farms, from stores across 27 states even though it said there was no indication that its products are part of the outbreak.\n\"There have been no confirmed illnesses associated with these products at this time,\" the company said in a statement. \"We are working closely with our supplier and took immediate steps to remove the products from sale.\"\nFormer FDA Commissioner Dr. Scott Gottlieb suggested to CNBC that the test result does not clear Taylor Farms of its link to the outbreak. The Friday recall was for a product that was imported several weeks ago and was separate from the lettuce that tested positive with the FDA, he said.\nHe also noted that because cyclospora has an incubation period of up to two weeks and lettuce has a short shelf life, it is important to test multiple shipments, even if they originated from the same farm.\nWhile the outbreak may be sourced to a single vendor for now, it's possible the contamination has already spread wider, according to Dr. Norman Beatty, an associate professor of medicine at the University of Florida College of Medicine.\n\"We may find that this current outbreak may have led to additional outbreaks because of the nature of this parasite,\" Beatty told CNBC. \"The reason why this is important for this current outbreak is because there's over 30 states where this has been isolated, and there could be other smaller outbreaks occurring in other regions.\"\nRestaurant fallout\nFor restaurants, uncertainty is proving as challenging as the outbreak itself. Salad-focused chains and other operators that rely heavily on fresh produce are left without knowing whether any other ingredients are still a potential risk.\nTaco Bell told CNBC in a Saturday statement that it had voluntarily removed all suspected lettuce from its locations within 72 hours of beginning the process and adjusted its supply chain accordingly. The company added that it is \"confident\" that consumers can eat safely at its locations.\n\"Clearly, this is a nationwide industry-wide issue, not a Taco Bell-specific issue,\" the company said. \"We hope that other members of the industry are taking the same degree of immediate action and accountability for the consumer as we have.\"\nTaco Bell isn't the only restaurant seeing its business slow, according to Placer.ai. Other restaurant chains that sell lettuce, including Chopt, Panera Bread and Chipotle, also saw declines in traffic Friday, the firm said.\nAs headlines about the outbreak swirled last week, the industry's top advocacy group stressed it is taking food safety seriously.\n\"The Food Code requires that every restaurant must have a manager that is food safety certified on every shift,\" said National Restaurant Association CEO Michelle Korsmo in a post on LinkedIn.\n\"We'll continue to support public health officials as they investigate the outbreak and ensure our members have the information they need to evaluate their food safety decisions,\" she added.\nAnd despite the false positive result, Taylor Farms and Taco Bell parent Yum Brands are still navigating the reputational fallout of an outbreak that prompted product removals and widespread headlines. Even so, restaurant analysts previously told CNBC they did not expect a long-term financial hit for the companies linked to the outbreak.\nShares of Yum Brands are down nearly 9% in the last five days.",
    "bodyJa": "食品医薬品局が嚢胞子症調査の重要な部分について撤回したことは米国で混乱を引き起こしているが、同局は月曜、この発生に関する主な結論は変更していないと発表した。\n同庁は日曜日、メキシコのテイラー・ファームズから供給されたアイスバーグ・レタスのサンプルがシクロスポラ原虫を保有していることを示す検査が偽陽性であったと発表した。しかし、これは同社が供給したレタスの特定の1つの出荷にのみ適用され、政府機関は、それが1,600人以上、そしておそらく他の数千人に病気を引き起こした車両であるとは考えていません。\n同庁は月曜の釈明の中で、偽陽性は今回の感染拡大がテイラー・ファームズが供給するメキシコ中部産の細切りアイスバーグレタスに関連しているというこれまでの結論を変えるものではないと述べ、タコベルの一部店舗でも提供されていたと述べた。同庁は依然として米国人に対し、リコール対象のアイスバーグレタスを食べないよう勧告している。\n「FDAの追跡調査と発生データは、メキシコ中部にあるテイラー・ファームズの細切りアイスバーグ・レタスに引き続き集中している」と声明で述べた。 「FDAは引き続き連邦および州のパートナーと協力して、この複数の州での流行を調査し、この流行に関与した製品が市場から確実に排除されるよう努める。」\n捜査当局は、発生の正確な原因の調査を続けており、この発生により、数日間、場合によっては数週間にわたってひどい腹痛に似た症状が引き起こされる可能性がある。 CNBCは、追加の成分や供給業者が精査されているかどうか、またFDAがさらなる指針を発表する予定があるかどうかなど、調査の次の段階の詳細についてFDAに問い合わせた。代理店はまだ返答していない。\n偽陽性検査は、発展中の調査が消費者と食品業界の両方に不確実性をもたらす中で発生しました。 FDAはテイラー・ファームのアイスバーグレタスを食べないよう言っているが、感染者数の増加に伴いサラダをまったく食べない客もいる。\n「残念ながら、この最新の展開は、消費者にとってすでに複雑な状況にさらなる混乱をもたらす可能性がある」とFDAの食品政策・対応担当副長官フランク・イアナス氏は述べた。\n業界アナリストらは感染拡大がタコベルや他のレストランチェーンに長期的な影響を与えるとは予想していないが、客足データに基づくと少なくとも一時的に売上に打撃を与え、感染に関連する企業は1～2四半期の打撃を受ける可能性がある。調査会社Placer.aiのデータによると、金曜日のタコベルの客足は、今年これまでの曜日平均と比べて約19％減少した。\nFDA の誤検知が意味するもの\n食中毒の発生調査では、確認検査中に最初のスクリーニングシグナルが再現されない場合、偽陽性が発生する可能性があります。一部の医師は、シクロスポラを研究室で再現するのは特に難しいと指摘しています。\nしかし、それは政府関係者の感染拡大の根源に対する見方に変化をもたらしたわけではない。\n流行が爆発的に拡大しているミシガン州保健福祉省は、事前に洗ったり、袋詰めしたり、あらかじめ混ぜ合わせたサラダキットではなく、丸ごとのレタスを購入することを引き続き推奨していると述べている。\n同庁は、2,000人以上の感染者への聞き取りに基づいて、患者の多くはレストランでレタスを食べたと報告していないが、何らかの状況で葉物野菜を食べたと頻繁に述べていると付け加えた。\nテイラー・ファームズは月曜朝、メキシコ中部から関与の疑いのあるアイスバーグレタスの自主回収を継続すると発表し、タコベルはすでに影響を受けた州のレストランから疑わしいレタスの撤去を開始している。\nその波及効果はそれらの企業を超えて広がります。\nウォルマートは月曜日、同社の製品が感染拡大に関与している兆候はないとしながらも、テイラー・ファームズが供給するマーケットサイド・ブランドの袋入りサラダキット製品4品を27州の店舗から積極的に撤去したと発表した。\n同社は声明で「現時点でこれらの製品に関連する病気は確認されていない」と述べた。 「当社はサプライヤーと緊密に連携しており、製品の販売を中止するために直ちに措置を講じました。」\n元FDA長官のスコット・ゴットリーブ博士はCNBCに対し、検査結果によってテイラー・ファームと感染拡大との関連性が明らかになるわけではないと示唆した。同氏によると、金曜日のリコールは数週間前に輸入された製品に関するもので、FDAの検査で陽性反応が出たレタスとは別のものだったという。\n同氏はまた、シクロスポラの潜伏期間は最長2週間で、レタスの賞味期限は短いため、たとえ同じ農場から来たものであっても、複数の出荷品をテストすることが重要であると述べた。\nフロリダ大学医学部准教授のノーマン・ビーティ博士によると、今のところ発生源は単一の業者かもしれないが、汚染はすでに広範囲に広がっている可能性があるという。\nビーティ氏はCNBCに対し、「今回の感染拡大が、この寄生虫の性質によりさらなる感染拡大につながった可能性がある」と語った。 「今回の感染拡大にとってこれが重要な理由は、30以上の州で感染が隔離されており、他の地域でも小規模な感染拡大が発生する可能性があるためです。」\nレストランのフォールアウト\nレストランにとって、不確実性は流行そのものと同じくらい困難であることが判明しています。サラダを中心としたチェーン店や生鮮食品に大きく依存しているその他の経営者は、他の食材が依然として潜在的なリスクであるかどうかが分からないままになっています。\nタコベルは土曜日の声明でCNBCに対し、作業開始から72時間以内に疑わしいレタスを自社店舗から自主的に撤去し、それに応じてサプライチェーンを調整したと述べた。同社は、消費者がその店舗で安全に食事をできることに「自信を持っている」と付け加えた。\n「明らかに、これは業界全体の問題であり、タコベル特有の問題ではない」と同社は述べた。 「業界の他のメンバーも、私たちと同じ程度の即時行動と消費者に対する説明責任を果たしてくれることを願っています。」\nPlacer.aiによると、業績が低迷しているレストランはタコベルだけではないという。同社によると、チョプト、パネラ・ブレッド、チポトレなど、レタスを販売する他のレストラン・チェーンでも来店客が金曜日に減少したという。\n先週、感染拡大に関する見出しが飛び交う中、業界トップの擁護団体は食品の安全を真剣に受け止めていると強調した。\n全米レストラン協会の最高経営責任者（CEO）ミシェル・コルモ氏はLinkedInへの投稿で、「食品基準では、すべてのレストランに食品安全認定を受けたマネージャーをシフトごとに配置することが求められている」と述べた。\n「私たちは公衆衛生当局が発生状況を調査し、食品安全に関する決定を評価するために必要な情報を会員が確実に得られるよう、引き続き支援していきます」と彼女は付け加えた。\nそして、偽陽性の結果にもかかわらず、テイラー・ファームズとタコベルの親会社ヤム・ブランズは依然として、製品の削除や大々的な見出しを引き起こした流行による風評被害を乗り越えている。それでも、レストランアナリストらは以前CNBCに対し、感染拡大に関連した企業が長期的な財務的打撃を受けるとは予想していないと語った。\nヤム・ブランズの株価は過去５日間で９％近く下落した。",

    "title": "Paramount and Warner Bros. merger hit with temporary restraining order",
