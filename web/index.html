    "id": "are-you-a-parent-missing-out-on-27-a-wee-acd7dc38",
    "title": "Are you a parent missing out on £27 a week? Here's how to check",
    "titleJa": "あなたは週 27 ポンドを逃している親ですか?確認方法は次のとおりです",
    "summaryJa": "あなたは週 27 ポンドを逃している親ですか?確認方法は次のとおりです- 公開されました",
    "bodyOriginal": "Are you a parent missing out on £27 a week? Here's how to check\n- Published\nThousands more parents could receive £27 a week by remembering some paperwork shortly after their baby is born.\nChild benefit is an allowance that helps with the cost of bringing up children. It is currently worth £27.05 a week for the first child, and £17.90 a week for each subsequent child.\nOfficial data shows that parents of nearly a third of children eligible for child benefit do not make a claim before their baby's first birthday.\nPayments can only be backdated for three months, meaning some families could be missing out on hundreds of pounds in the fog of new parenthood.\nThe annual publication of the most popular baby names could serve as a reminder to some parents that there are other pieces of official paperwork to complete.\nIn order to receive child benefit, which is paid every four weeks, one parent should make a claim, external. That parent will also get National Insurance credits towards their state pension.\nTo claim, you need:\nYour child's birth or adoption certificate\nYour bank details\nThe National Insurance number for you and your partner, if you have one\nChild Benefit can be claimed 48 hours after the baby's birth is registered but can only be backdated for up to three months from the date HM Revenue and Customs (HMRC) receives the claim.\nMore than 6.8 million parents received child benefit in the year to August 2025, according to HMRC data, external.\nBut only 69% of them claimed the support before their baby's first birthday, meaning thousands of families may not getting what they are entitled to receive.\nThe tax authority said that many of them may have chosen not to claim, owing to restrictions on high-earning parents receiving the benefit.\nUnder the High Income Child Benefit Charge, external, payments start to reduce if one parent earns £60,000 a year. They stop entirely when one of you earns £80,000.\nThere were 585,396 babies were born in England and Wales last year, according to the Office for National Statistics - which has said that, in 2025, Olivia held the top spot for the 10th year in a row for girls' baby names and Muhammad topped the list for boys' names for the third year running.\nIn Scotland, Freya replaced Olivia as the most popular name for girls, according to data from National Records of Scotland, while Noah held the top spot for boys.",
    "bodyJa": "あなたは週 27 ポンドを逃している親ですか?確認方法は次のとおりです\n- 公開されました\n赤ちゃんが生まれた直後にいくつかの事務手続きを覚えておけば、さらに何千人もの親が週に27ポンドを受け取ることができる。\n児童手当は、子どもの養育費を補助する手当です。現在、最初の子供には週27.05ポンド、2人目以降の子供には週17.90ポンドの価値があります。\n公式データによると、児童手当の受給資格のある子どもの 3 分の 1 近くの親は、赤ちゃんの 1 歳の誕生日までに請求を行っていません。\n支払いは 3 か月間しか遡ることができないため、一部の家族は新しい子育ての霧の中で数百ポンドを逃す可能性があります。\n最も人気のある赤ちゃんの名前が毎年発表されることは、一部の親たちに、完了すべき公式書類が他にもあることを思い出させるのに役立つ可能性がある。\n4 週間ごとに支払われる児童手当を受け取るには、どちらかの親が外部に請求を行う必要があります。その親は、国民年金に加えて国民保険のクレジットも受け取ることになります。\n請求するには、次のものが必要です。\nお子様の出生証明書または養子縁組証明書\n銀行の詳細情報\nあなたとあなたのパートナーの国民保険番号（お持ちの場合）\n児童手当は、赤ちゃんの出生が登録されてから 48 時間後に請求できますが、歳入関税局 (HMRC) が請求を受け取った日から最長 3 か月までしか遡ることができません。\nHMRC社外データによると、2025年8月までの1年間に680万人以上の親が児童手当を受け取った。\nしかし、赤ちゃんの1歳の誕生日前に支援を申請したのはわずか69％であり、何千もの家族が受け取る資格のあるものを受け取っていない可能性があることを意味する。\n税務当局は、高所得者の親の給付金受け取りには制限があるため、多くの保護者が請求しないことを選択した可能性があると述べた。\n高所得児童給付費の下では、一方の親の年収が 60,000 ポンドの場合、外部の支払い額が減額され始めます。どちらかが8万ポンドを稼ぐと、完全に停止します。\n国家統計局によると、昨年イングランドとウェールズで生まれた赤ちゃんの数は58万5,396人で、2025年の女の子の赤ちゃんの名前では「オリビア」が10年連続でトップの座を維持し、男の子の名前では「ムハンマド」が3年連続でトップとなったという。\nスコットランド国立記録のデータによると、スコットランドではフレイヤがオリビアに代わって女の子に最も人気のある名前となり、一方男の子ではノアがトップの座を維持した。",

    "id": "my-fitness-tracker-knew-i-was-pregnant-b-89900785",
    "title": "My fitness tracker knew I was pregnant before I did",
    "titleJa": "私のフィットネストラッカーは私が妊娠していることを私が妊娠する前に知っていました",
    "summaryJa": "私のフィットネストラッカーは私が妊娠していることを私が妊娠する前に知っていました- 公開されました",
    "bodyOriginal": "My fitness tracker knew I was pregnant before I did\n- Published\nRavika was celebrating her birthday on holiday with her husband when she got an unusual alert from her fitness tracker.\nHer Oura ring flagged that her health score was poor. Her heart rate had gone up, her body temperature was elevated and her heart rate variability (HRV) had dropped. Yet Ravika felt completely fine.\nWhen the stats hadn't improved a week later, the 34-year-old solicitor from the West Midlands did some research online and found a community of women who all said their fitness trackers had been giving them signs they were pregnant, based on the data the trackers had collected. It was another week before Ravika had a positive pregnancy test.\nBut following some cramping and a notification on her phone telling her that her body appeared to be under significant strain, she went to the doctor and was told she'd need to return 10 days later for further testing to find out if the pregnancy was healthy.\nThe wait was agonising - and led to her anxiously checking her fitness tracker stats, waking up at 4am every night \"just to refresh my app to see if my stats were still low, if my temperature was still elevated. I was holding on to hope that it was a viable pregnancy\".\nThe stats, she said, became an \"obsession\" - but \"for me it really did feel like a life or death situation\".\nFor many women, the first sign that they might be pregnant is a period that doesn't arrive when expected. This is around the same time it's possible to take a pregnancy test. With the exception of some tests that claim to be able to detect a pregnancy early, most aren't able to spot the change in hormones until the first day of a missed period.\nBut Ravika is one of hundreds of women who are reporting online that they are seeing the signs earlier than this, through the data on their fitness trackers.\nFitness trackers - including smart rings, smart watches and chest-mounted trackers - have surged in popularity in the UK. According to YouGov research, 36% of British adults in January 2026 owned and used a fitness tracker - nearly twice the proportion in July 2019.\nFinnish-US company Oura has the highest sales in the smart ring market, which also includes India-based Ultrahuman, and Hong Kong-based RingConn.\nPredicting miscarriages as well as pregnancies\nOne of the key signs of pregnancy is a change to body temperature - which means trackers that can monitor body temperature are popular with those trying to conceive.\nIn a typical cycle, a woman's body temperature will be elevated until just before her period comes, when it drops sharply. In early pregnancy, body temperature usually stays high. If a fitness tracker measures body temperature, it can pick up on this early symptom.\nAs well as her stats, Ravika started reading Reddit posts from women who said their Oura ring had predicted not only their pregnancy but their miscarriage as well, through the ring's \"major signs\" notification.\nSofia, 32, had been one of them. She lost two pregnancies, both of which she spotted in the data from her Oura ring, before becoming pregnant a third time with her now five-month-old baby son.\nThe first time she became pregnant early last year, she kept checking her app every morning.\n\"When I would wake up to see the [temperature] line progressing, and then I saw in the app one morning that my temperature had dropped - and that's how I knew, something's weird,\" she said.\n\"When I did have the miscarriage, I kind of was already mentally prepared because of the data I saw.\"\nThe same thing happened again three months later, and Sofia and her husband decided to take a break from trying to conceive - but it was during this break that she got a notification of \"minor signs of strain\" from her ring, and noticed her temperature was elevated again. She took a test, and it was positive.\nThough this pregnancy was healthy, Sofia felt anxious throughout those early weeks and found herself repeatedly checking her data.\n\"I was like, 'Oh my God, is this going to happen again?', and I remember I would wake up at four or five in the morning and just check my app to see if my temperature had dipped,\" she said.\n\"I was so conscious of that piece of data to the point where, when I reached seven or eight weeks [pregnant], I had to take my ring off and didn't wear it for all of the first trimester.\"\nRising anxiety\nDr Stuart Lavery, consultant of reproductive medicine at University College Hospital in London, said: \"People are understandably using this technology to try to get a greater understanding, and to try and pick up things as early as possible because it has such a profound impact on your life if you're planning a pregnancy.\"\nHowever, \"we might be running before we can walk,\" he cautioned.\n\"We probably need a lot more data on the reliability, we need a lot more research… otherwise what happens is your levels of anxiety will just skyrocket,\" he said.\n\"I have no doubt that more people will be using technology, an app-based approach or a wearable-based approach, to try and pick up these things. But I think it should come with quite a big health warning about how much we can rely on them for accuracy.\"\nWhen asked about the anxiety women reported feeling early in their pregnancy as a result of checking their ring data, Dr Chris Curry, Oura's clinical director of women's health, told BBC News: \"With or without biometric tracking, pregnancy can be an uncertain time where many women, particularly those pregnant for the first time, are in the dark about the range of what's normal.\"\nShe added that if women feel overwhelmed, the company \"encourages members to take a break from the app experience, whilst Oura Ring continues to collect data and gather insights\", adding: \"The ring is a support tool, not a replacement for your care team.\"\nRavika sadly did miscarry. She's hoping to start trying to conceive again soon - and when she does, her experience has made her rethink wearing her tracker again.\n\"I didn't really see myself as being an anxious person, but… I think going forward if it came to a point where I had an inkling that I was pregnant and my stats were low, as soon as that positive pregnancy test was there, I do think it would be the best thing for me to take the ring off.\"\nRelated topics\n- Published6 December 2025\n- Published29 January 2025\n- Published17 September 2024",
    "bodyJa": "私のフィットネストラッカーは私が妊娠していることを私が妊娠する前に知っていました\n- 公開されました\nラヴィカさんは休暇中に夫と誕生日を祝っていましたが、フィットネストラッカーから異常なアラートを受け取りました。\n彼女のオウラリングは、彼女の健康スコアが低いことを示していました。彼女の心拍数は上昇し、体温は上昇し、心拍数変動 (HRV) は低下しました。それでも、ラヴィカはまったく大丈夫だと感じた。\n1週間経っても統計が改善されなかったとき、ウェスト・ミッドランズの34歳の弁護士はオンラインで調査を行ったところ、フィットネス・トラッカーが収集したデータに基づいて、フィットネス・トラッカーが妊娠の兆候を示していたと全員が主張する女性のコミュニティを見つけた。ラヴィカさんの妊娠検査薬が陽性反応を示すまでにはさらに1週間かかった。\nしかし、少しけいれんがあり、体に大きな負担がかかっているようだと携帯電話に通知があったため、医師の診察を受けたところ、妊娠が健康であるかどうかを確認するため、さらに検査を受けるために10日後に来院する必要があると言われました。\n待つのは苦痛で、彼女は毎晩午前4時に起きて、心配そうにフィットネストラッカーの統計をチェックするようになった。「アプリを更新して、統計がまだ低いかどうか、体温がまだ高いかどうかを確認するためだった。私は妊娠が可能であることを祈り続けていた」。\n彼女によれば、その統計は「強迫観念」になったが、「私にとってそれは本当に生死にかかわる状況のように感じられた」という。\n多くの女性にとって、妊娠の可能性を示す最初の兆候は、予定通りに生理が来ないことです。妊娠検査薬が受けられるのもこの頃です。妊娠を早期に発見できると主張する一部の検査を除いて、ほとんどの検査は、生理が遅れた初日までホルモンの変化を見つけることができません。\nしかし、ラヴィカさんは、フィットネストラッカーのデータを通じて、これよりも早く兆候が見られるとオンラインで報告している何百人もの女性のうちの1人です。\nスマートリング、スマートウォッチ、胸に取り付けるトラッカーなどのフィットネストラッカーの人気が英国で急増しています。 YouGov の調査によると、2026 年 1 月時点で英国の成人の 36% がフィットネス トラッカーを所有および使用していました。これは、2019 年 7 月の割合のほぼ 2 倍です。\nフィンランドと米国の企業である Oura は、インドに拠点を置く Ultrahuman や香港に拠点を置く RingConn も含まれるスマート リング市場で最大の売上高を誇っています。\n妊娠だけでなく流産も予測する\n妊娠の重要な兆候の 1 つは体温の変化です。つまり、体温を監視できるトラッカーが妊娠を望んでいる人々に人気があることを意味します。\n一般的な周期では、女性の体温は生理が来る直前まで上昇しますが、その後急激に下がります。妊娠初期は通常、体温が高い状態が続きます。フィットネストラッカーで体温を測定すると、この初期症状を検出できる可能性があります。\nラヴィカさんは統計情報だけでなく、Oura リングの「重大な兆候」通知を通じて、Oura リングが妊娠だけでなく流産も予言していたという女性たちの Reddit の投稿を読み始めた。\n32歳のソフィアもその1人だった。彼女は2度の妊娠を失ったが、そのどちらもオウラリングのデータで発見されたが、3度目の妊娠で現在生後5カ月の息子を妊娠している。\n昨年初めに初めて妊娠したとき、彼女は毎朝アプリをチェックし続けました。\n「朝起きて[体温]の線が進んでいるのを見て、ある朝アプリで体温が下がっているのを見たとき、何かがおかしいと気づいたのです」と彼女は語った。\n「実際に流産したとき、目にしたデータのおかげで、私はすでに心の準備ができていました。」\n3か月後、同じことが再び起こり、ソフィアと夫は妊活を休止することに決めたが、その休止中に指輪から「軽い緊張の兆候」の通知を受け、体温が再び上昇していることに気づいた。彼女は検査を受けたところ、陽性反応が出た。\n今回の妊娠は順調でしたが、ソフィアさんは初期の数週間を通じて不安を感じ、データを繰り返しチェックしていることに気づきました。\n「『なんてことだ、またこんなことが起こるの？』と思いました。朝の4時か5時に起きて、アプリをチェックして体温が下がったかどうかを確認していたのを覚えています」と彼女は語った。\n「私はそのデータを非常に意識していたので、（妊娠）7、8週目に達したとき、指輪を外さなければならず、最初の学期の間ずっと指輪を着けていませんでした。」\n高まる不安\nロンドンのユニバーシティ・カレッジ病院の生殖医療コンサルタントであるスチュアート・ラベリー博士は、「妊娠を計画している場合、妊娠を計画している場合、このテクノロジーは人生に非常に大きな影響を与えるため、人々がこのテクノロジーをより深く理解しようとして、できるだけ早く問題を解決しようとするために利用しているのは当然です。」と述べた。\nしかし、「私たちは歩く前に走ってしまうかもしれない」と彼は警告した。\n「おそらく、信頼性に関してさらに多くのデータが必要であり、さらに多くの研究が必要です…そうしないと、何が起こるかというと、不安のレベルが急上昇するだけです」と彼は言いました。\n「より多くの人がテクノロジー、アプリベースのアプローチ、またはウェアラブルベースのアプローチを利用して、これらのものを手に入れようとすることは間違いありません。しかし、それは、正確さに関して私たちがどれだけ信頼できるかについて、かなり大きな健康上の警告を伴うべきだと思います。」\nオウラの女性健康臨床部長であるクリス・カリー博士は、指輪のデータをチェックした結果、妊娠初期に女性が感じたと報告された不安について尋ねられたところ、BBCニュースに次のように語った。「生体追跡の有無にかかわらず、妊娠中は不確実な時期となり、多くの女性、特に初めて妊娠する女性にとって、何が正常なのかが分からない状態です。」\n彼女は、女性が圧倒されていると感じた場合、同社は「Oura Ring がデータ収集と洞察の収集を続ける一方で、会員にはアプリ体験から休憩するよう奨励している」と付け加え、「リングはサポートツールであり、ケアチームの代わりではない」と付け加えた。\nラヴィカさんは残念ながら流産してしまいました。彼女は、すぐに再び妊娠を始めたいと考えています。そして、実際に妊娠したとき、彼女の経験が彼女にトラッカーの着用をもう一度考え直させました。\n「私は自分が心配性の人間であるとはあまり思っていませんでしたが…今後、もし妊娠していると感じていて統計値が低かった場合、妊娠検査薬で陽性反応が出たらすぐに指輪を外すのが私にとって最善のことだと思います。」\n関連トピック\n- 2025 年 12 月 6 日公開\n- 2025 年 1 月 29 日発行\n- 2024 年 9 月 17 日公開",

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getCategories() {
  const cats = new Set(ARTICLES.map((a) => a.category));
  return ["すべて", ...cats];
}

function getArticleById(id) {
  return ARTICLES.find((a) => a.id === id);
}

function getArticlesByCategory(category) {
  if (!category || category === "すべて") return ARTICLES;
  return ARTICLES.filter((a) => a.category === category);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function paragraphs(text) {
  return text.split("\n\n").filter(Boolean);
}


let activeCategory = "すべて";

function navigate(hash) {
  if (hash) location.hash = hash;
  else {
    history.pushState(null, "", location.pathname + location.search);
    location.hash = "";
  }
  render();
  window.scrollTo(0, 0);
}

function updateMobileBar(show) {
  const bar = document.getElementById("mobile-back-bar");
  document.body.classList.toggle("has-mobile-bar", show);
  if (bar) bar.classList.toggle("hidden", !show);
}

function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("article/")) {
    return { page: "article", id: decodeURIComponent(h.slice(8)) };
  }
  return { page: "home" };
}

function renderHome() {
  document.title = "BizNews JP | ビジネスニュース和訳";
  updateMobileBar(false);
  const main = document.getElementById("app");
  main.className = "main-content";
  main.innerHTML = `
    <section>
      <h1 class="page-title">ビジネスニュース</h1>
      <p class="page-desc">世界の主要メディアから厳選。要約と全文和訳付き。</p>
    </section>
    <div class="category-bar" id="category-bar" role="tablist" aria-label="カテゴリ"></div>
    <div id="articles-container"></div>
    <div class="info-box">
      <strong>記事の読み方：</strong>
      各記事を開くと、まず全文の要約（日本語）が表示されます。その下に和訳全文を掲載しています。原文は折りたたみで確認できます。
    </div>`;
  renderCategories();
  renderArticles();
}

function renderCategories() {
  const bar = document.getElementById("category-bar");
  if (!bar) return;
  const categories = getCategories();
  bar.innerHTML = categories
    .map(
      (cat) =>
        `<button type="button" class="cat-btn${cat === activeCategory ? " active" : ""}" data-category="${escapeHtml(cat)}" role="tab">${escapeHtml(cat)}</button>`
    )
    .join("");
  bar.querySelectorAll(".cat-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      renderCategories();
      renderArticles();
    });
  });
}

function renderArticles() {
  const container = document.getElementById("articles-container");
  if (!container) return;
  const filtered = getArticlesByCategory(activeCategory);
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0">該当する記事がありません。</p>';
    return;
  }
  const [featured, ...rest] = filtered;
  let html = "";
  if (featured) {
    html += `
      <a href="#article/${encodeURIComponent(featured.id)}" class="featured-card" style="margin-bottom:0.75rem;display:block">
        <div class="featured-img-wrap">
          <img src="${featured.imageUrl}" alt="${escapeHtml(featured.titleJa)}" loading="lazy" />
          <div class="featured-overlay"></div>
          <div class="featured-overlay-text">
            <span class="badge">${escapeHtml(featured.category)}</span>
            <h2 class="featured-title">${escapeHtml(featured.titleJa)}</h2>
          </div>
        </div>
        <div class="card-body">
          <p class="card-summary">${escapeHtml(featured.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(featured.source)}</span><span>·</span>
            <span>${formatDate(featured.publishedAt)}</span><span>·</span>
            <span>${featured.readTime}分で読める</span>
          </div>
        </div>
      </a>`;
  }
  if (rest.length) {
    html += '<div class="articles-list">' + rest.map((a) => `
      <a href="#article/${encodeURIComponent(a.id)}" class="article-card">
        <div class="card-thumb"><img src="${a.imageUrl}" alt="${escapeHtml(a.titleJa)}" loading="lazy" /></div>
        <div class="card-content">
          <span class="badge badge-light">${escapeHtml(a.category)}</span>
          <h3 class="card-title">${escapeHtml(a.titleJa)}</h3>
          <p class="card-summary" style="-webkit-line-clamp:2;margin-top:0.25rem">${escapeHtml(a.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(a.source)}</span><span>·</span>
            <span>${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </a>`).join("") + "</div>";
  }
  container.innerHTML = html;
}

function renderArticlePage(id) {
  const article = getArticleById(id);
  const main = document.getElementById("app");
  main.className = "main-content article-detail";
  if (!article) {
    document.title = "記事が見つかりません | BizNews JP";
    updateMobileBar(false);
    main.innerHTML = `
      <div class="not-found">
        <h1>記事が見つかりません</h1>
        <p>お探しの記事は存在しないか、削除された可能性があります。</p>
        <a href="#" class="btn-primary" onclick="navigate('');return false;">トップに戻る</a>
      </div>`;
    return;
  }
  updateMobileBar(true);
  document.title = article.titleJa + " | BizNews JP";
  const parasJa = paragraphs(article.bodyJa).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  const parasEn = paragraphs(article.bodyOriginal).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  main.innerHTML = `
    <a href="#" class="back-link" onclick="navigate('');return false;">← 記事一覧に戻る</a>
    <div class="article-hero"><img src="${article.imageUrl}" alt="${escapeHtml(article.titleJa)}" /></div>
    <header class="article-header">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;margin-bottom:0.75rem">
        <span class="badge">${escapeHtml(article.category)}</span>
        <span style="font-size:0.75rem;color:#94a3b8">${escapeHtml(article.source)}</span>
      </div>
      <h1 class="article-h1">${escapeHtml(article.titleJa)}</h1>
      <p class="article-title-en">${escapeHtml(article.title)}</p>
      <div class="card-meta">
        <time datetime="${article.publishedAt}">${formatDate(article.publishedAt)}</time>
        <span>·</span><span>約${article.readTime}分で読める</span>
      </div>
    </header>
    <section>
      <div class="section-heading"><div class="section-bar"></div><h2>要約</h2></div>
      <div class="summary-box"><p>${escapeHtml(article.summaryJa)}</p></div>
    </section>
    <section>
      <div class="section-heading"><div class="section-bar gray"></div><h2>和訳全文</h2></div>
      <div class="translation-box">${parasJa}</div>
    </section>
    <section>
      <button type="button" class="toggle-btn" id="toggle-original" aria-expanded="false">
        <span>原文（英語）を表示する</span><span class="arrow">▼</span>
      </button>
      <div class="original-box hidden" id="original-box">${parasEn}</div>
    </section>
    <p class="source-line">出典：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.source)}</a></p>`;
  const toggleBtn = document.getElementById("toggle-original");
  const originalBox = document.getElementById("original-box");
  toggleBtn.addEventListener("click", () => {
    const isHidden = originalBox.classList.toggle("hidden");
    const isOpen = !isHidden;
    toggleBtn.classList.toggle("open", isOpen);
    toggleBtn.setAttribute("aria-expanded", String(isOpen));
    toggleBtn.querySelector("span").textContent = isOpen ? "原文（英語）を隠す" : "原文（英語）を表示する";
  });
}

function render() {
  const route = getRoute();
  if (route.page === "article") renderArticlePage(route.id);
  else renderHome();
}

window.addEventListener("hashchange", render);
window.addEventListener("popstate", render);
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.getElementById("mobile-back-btn");
  if (backBtn) backBtn.addEventListener("click", () => navigate(""));
  render();
});

  </script>
