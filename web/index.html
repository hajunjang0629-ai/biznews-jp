    "id": "most-bus-fares-in-england-to-be-capped-a-07f93c84",
    "title": "Most bus fares in England to be capped at £2 from January",
    "titleJa": "イングランドのほとんどのバス料金は1月から2ポンドに上限が設定される",
    "summaryJa": "イングランドのほとんどのバス料金は1月から2ポンドに上限が設定される- 公開されました",
    "bodyOriginal": "Most bus fares in England to be capped at £2 from January\n- Published\nThe bus fare cap in England will revert to £2 from January, new prime minister Andy Burnham has announced.\nThe government says the policy, which is expected to cost more than £500m, will \"help with the cost of living and give people the breathing space they need\".\nThe previous Conservative government capped single bus fares in England at £2 in January 2023. It was initially only due to last three months, but was extended.\nAs Mayor of Greater Manchester, Andy Burnham brought in a £2 cap in September 2022, at that point funded by money from central government.\nIn January 2025, the England-wide bus fare cap rose to £3 under Sir Keir Starmer's Labour government, although Liverpool and Manchester are examples of city regions where fares have been held at £2.\nThe original fare subsidy scheme applied in England, outside of London, with bus operators taking part on a voluntary basis. The £2 cap was initially meant both as a cost of living measure and to encourage people back on buses in the wake of the pandemic.\nBurnham said affordable transport links were an essential.\n\"No one should be priced out of those and left behind,\" he said.\n\"Lower fares will help people get to where they need to – giving them breathing space to help with the cost of living.\"\nThe Office for National Statistics said it played a role in reducing inflation in 2023, and it appeared popular.\nAn evaluation of the first ten months - not published until 2025 - found that the scheme did contribute 5% of the 13% rise in bus usage during that period. Lower-income passengers felt the most financial benefit.\nHowever it did not score highly when it comes to value for money. How much money people saved varied depending how much fares in their local area cost before the cap.\nIn those first ten months, £210m was spent on the scheme, less than the £245m budget.\nSir Keir's government allocated £150m to fund its £3 cap for 2025.\nThe Burnham government points out going back to a £2 cap should particularly help passengers in rural and coastal areas, where single fares can be higher.\nThe new cap will take effect from 1 January 2027 for fares on participating buses outside of London.\nShadow Chancellor Mel Stride said the government has not actually specified where the money will come from to fund the bus fare cap extension.\n\"That is a worrying sign, we need to have a government which is on top of the public finances, not one that is making lots of spending commitments without explaining where the money is going to come from,\" Stride told BBC Breakfast.\nIn its announcement, the government said £454 million will be reallocated from the Department for Energy Security and Net Zero.\nIt says this will be used in addition to funds already earmarked by the Department for Transport for buses.\nIt is the second day in a row that the new prime minister has announced cost saving measures, following Tuesday's VAT cut on household electricity bills later this year.\nBut his plan to pay for the policy by scrapping Sir Keir's digital ID scheme led to an early row over whether the plan was properly funded.\nIn his first cabinet meeting on Tuesday, Burnham promised to lead a \"cost of living government\", telling ministers that he wanted to give people a \"sense that help is coming\" on costs.\nRelated topics\n- Published28 October 2024\n- Published29 October 2024\n- Published9 hours ago",
    "bodyJa": "イングランドのほとんどのバス料金は1月から2ポンドに上限が設定される\n- 公開されました\n英国のバス料金の上限は1月から2ポンドに戻るとアンディ・バーナム新首相が発表した。\n政府は、この政策には5億ポンド以上の費用がかかると見込まれており、「生活費を助け、人々に必要な息抜きのスペースを与える」としている。\n前保守党政権は2023年1月にイングランドでの片道バス運賃の上限を2ポンドに定めた。当初は残り3カ月間のみの予定だったが、延長された。\nグレーター・マンチェスター市長として、アンディ・バーナムは 2022 年 9 月に 2 ポンドの上限を設け、その時点では中央政府からの資金で賄われました。\n2025年1月、キア・スターマー卿の労働党政権のもと、イングランド全土のバス運賃の上限は3ポンドに引き上げられたが、リバプールとマンチェスターは運賃が2ポンドに据え置かれている都市部の例である。\n当初の運賃補助制度はロンドン以外のイギリスで適用され、バス事業者が自主的に参加した。 2ポンドの上限は当初、生活費対策とパンデミックを受けて人々がバスに戻ることを奨励することを目的としていた。\nバーナム氏は、手頃な価格の交通機関が不可欠だと述べた。\n「誰もそのようなものを犠牲にして置き去りにされるべきではない」と彼は語った。\n「運賃の引き下げは、人々が必要な場所に行くのに役立ち、生活費を助けるための余裕を与えます。」\n国家統計局は、それが2023年のインフレ抑制に役割を果たし、人気があるようだと述べた。\n最初の 10 か月の評価 (2025 年まで公表されませんでした) では、この制度がその期間のバス利用の 13% 増加のうち 5% に寄与したことが判明しました。経済的メリットを最も感じたのは低所得層の乗客だった。\nただし、コストパフォーマンスに関してはあまり高くありませんでした。人々がどれだけ節約できたかは、上限が設定される前の地元地域の運賃に応じて異なります。\n最初の 10 か月間でこの計画には 2 億 1,000 万ポンドが費やされ、予算の 2 億 4,500 万ポンドを下回りました。\nキア卿の政府は、2025年の上限3ポンドの資金として1億5,000万ポンドを割り当てた。\nバーナム政府は、2ポンドの上限に戻すことは、片道運賃が高くなる可能性がある地方や沿岸地域の乗客を特に助けるはずだと指摘している。\n新しい上限は、ロンドン郊外の参加バスの運賃に対して 2027 年 1 月 1 日から発効します。\n影の首相メル・ストライド氏は、政府はバス料金の上限延長の資金源を実際には特定していないと述べた。\nストライド氏はBBCブレックファストに対し、「これは憂慮すべき兆候だ。財政をしっかりと管理する政府が必要であり、資金の出所を説明せずに多額の支出を約束する政府ではない」と語った。\n政府は発表の中で、エネルギー安全保障・ネットゼロ省から4億5,400万ポンドが再配分されると述べた。\nこの資金は、運輸省がすでにバスのために割り当てている資金に加えて使用される予定だという。\n火曜日に今年後半に家庭向け電気料金の付加価値税が引き下げられたことを受け、新首相がコスト削減策を発表するのは２日連続となる。\nしかし、キア卿のデジタルID制度を廃止することで保険料を支払うという同氏の計画は、その計画に適切な資金が提供されたかどうかをめぐって初期の論争につながった。\nバーナム氏は火曜日の最初の閣議で、「生活費政府」を率いることを約束し、国民に生活費に関して「助けが来ているという感覚」を与えたいと閣僚に語った。\n関連トピック\n- 2024 年 10 月 28 日公開\n- 2024 年 10 月 29 日発行\n- 9 時間前に公開",

    "id": "wall-street-can-wait-why-one-u-s-biotech-8fd3b924",
    "title": "Wall Street can wait: Why one U.S. biotech firm is listing in Hong Kong first",
    "titleJa": "ウォール街は待ってもいい：なぜ米国のバイオテクノロジー企業が最初に香港に上場するのか",
    "summaryJa": "アリババや百度などの中国企業は何年もの間、資本市場の深さとバリュエーションの高さを理由に、株式を上場するために米国に向かった。現在、あるアメリカのバイオテクノロジー企業はその逆のことに賭けている。サンディエゴに本拠を置く再生・遺伝子医薬品開発会社アクシオム・バイオサイエンシズは、2027年に香港で株式を公開し、その後2029年に米国で二次上場する計画だ。同社は、この「逆張り」の動きにより、バイオテクノロジーに焦点を当てた洗練された投資家に門戸を開くとともに、アジア全域の臨床・商業パートナーとの距離を近づけるとしている。",
    "bodyOriginal": "For years, Chinese companies such as Alibaba and Baidu headed to the U.S. to list their shares, citing its deeper capital markets and higher valuations. Now, one American biotech firm is betting on doing the opposite.\nAxiom Biosciences, a San Diego-based developer of regenerative and genetic medicines, plans to go public in Hong Kong in 2027, followed by a secondary U.S. listing in 2029. The company says the \"contrarian\" move will open the door to sophisticated, biotech-focused investors while bringing it closer to clinical and commercial partners across Asia.\n\"Some of the most important science in the world is being built in the United States, but the way it gets funded hasn't kept pace,\" said Remo Moomiaie-Qajar, founder and CEO of Axiom.\nThe Hong Kong exchange's stricter listing standards compared to the U.S. point to a mature biotech ecosystem, Moomiaie-Qajar told CNBC, while noting that recent biopharma listings in the city have outperformed those on the Nasdaq.\nPublic markets offer an alternative way to raise money as biotech firms face a tougher fundraising environment, he said. While clinical trials become more expensive as they progress, the pool of venture investors willing and able to write large checks gets smaller – especially for companies that did not secure major backers early on, he added.\nChinese biotech firms have flocked to the city's bourse amid a government push and as innovative drugmakers' financing needs grow. The Hang Seng Biotech Index in Hong Kong has climbed more than 75% since a low in January 2025, surpassing the roughly 40%-50% gains in the ICE Biotechnology Index and the Nasdaq Biotechnology Index, tracking U.S.-listed firms during the same period, according to LSEG data.\n\"The U.S. remains the deepest and most institutionalized biotech capital pool in the world,\" said Danny Xiang, founding partner at the life science-focused private equity firm Fontus Capital. \"That depth is precisely why the most fundable, globally competitive assets still raise and list in the U.S.,\" and why it's rare for a purely American biotech firm to choose Hong Kong as its primary venue, he said.\nWhat's changed, however, is Hong Kong's growing appeal as one of the world's largest biotech fundraising hubs, helped by reforms introduced last year that streamlined the IPO process, Xiang said. Since 2018, 86 companies have listed in the city raising more than $17.8 billion, according to Hong Kong Exchanges and Clearing.\nGlobal biotech firms are increasingly drawn to the city's expanding biopharma investor base and its proximity to Chinese pharmaceutical partners, which could help speed up clinical trials and lower costs.\nStill, Xiang said, local investors tend to favor companies with a clear China connection, backing assets where they see opportunities to co-develop, manufacture or sell products with Chinese partners.\nGeorge Wu, a Hong Kong-based partner at law firm DLA Piper, said the Hong Kong biotech sector's lower valuations, relative to the Nasdaq, have also attracted more international investors seeking upside potential.\nThe U.S. is also on track for its strongest run of biotech IPOs in years, with both Parabilis Medicines, a clinical-stage cancer drug developer, and Kailera Therapeutics, an obesity-drug maker, soaring around 60% on their debuts earlier this year, after raising more than $600 million each. The SPDR S&P Biotech ETF (XBI) rallied 76% over the trailing year as of Tuesday.\nInventing vs. scaling\nBiotechnology has been a long-term priority for Beijing, which has spent decades funding basic research, reforming drug regulation, and attracting experienced scientists and executives trained abroad, including in the U.S., back to China.\nLower labor and manufacturing costs, a deep pool of science graduates, access to large datasets, targeted uses of AI in areas such as drug design, and China's vast population – with many patients concentrated at major hospitals that can aid clinical-trial recruitment – have helped China advance in biologics, genomics and drug development, experts say.\nHowever, a survey by the Cure Innovation Index in June found that despite leading in clinical development and supply chains, China still lags the U.S. in the quality, commercial reach and cutting-edge strength of its biomedical science.\n\"The U.S. leads '0-to-1',\" in breakthroughs in foundational science and novel biology, Xiang said, while China increasingly leads \"1-to-100,\" meaning fast, capital-efficient implementation to reach patients.\nAxiom is co-developing a therapy with South Korea-based biopharma firm Medinno for newborns with severe brain injuries linked to high death rates. The therapy has received two U.S. Federal Drug Administration designations for rare pediatric diseases, and a Phase 1 trial involving nine newborns in South Korea has been completed.\nAxiom also plans to study the treatment as a possible therapy for adults who have suffered strokes.\n\"Because there are no regenerative therapies for these brain injuries, it's imperative that we move through clinical trials as rapidly as possible. And I think Asia is the right place to do that,\" Moomiaie-Qajar told CNBC.\nChina closing in\nIn December, a bipartisan U.S. legislative commission warned that China was beginning to outpace the U.S. in some areas of biopharmaceutical innovation, building on \"advantages gained from non-market practices and brute force economics\" – a term used by some in Washington to describe China's state-led push for leadership in strategic industries.\nThe commission urged coordinated action across the public and private sectors to retain – and in some areas regain – U.S. biotechnology leadership.\nOn Tuesday, President Donald Trump said generic drugs imported into the U.S. will face a 100% tariff from August 2028, with the rate doubling to 200% a year later.\nMoomiaie-Qajar said the company is monitoring geopolitical developments, but the move doesn't change its intention to list in Hong Kong, as it focuses on next-generation specialty products rather than generic drugs and seeks investors who understand the risks and development timelines involved.\nNasdaq and the New York Stock Exchange allow biotech firms to apply for a listing before they generate revenue or begin human testing. Hong Kong also allows pre-revenue listings, but requires at least 12 months of research and development and a core product past the concept stage.\n\"A U.S. IPO is generally faster for a company that qualifies, and Hong Kong's review times have stretched as applications piled up,\" Xiang said.\n— CNBC's Evelyn Cheng contributed to this report.",
    "bodyJa": "アリババや百度などの中国企業は何年もの間、資本市場の深さとバリュエーションの高さを理由に、株式を上場するために米国に向かった。現在、あるアメリカのバイオテクノロジー企業はその逆のことに賭けている。\nサンディエゴに本拠を置く再生・遺伝子医薬品開発会社アクシオム・バイオサイエンシズは、2027年に香港で株式を公開し、その後2029年に米国で二次上場する計画だ。同社は、この「逆張り」の動きにより、バイオテクノロジーに焦点を当てた洗練された投資家に門戸を開くとともに、アジア全域の臨床・商業パートナーとの距離を近づけるとしている。\n「世界で最も重要な科学の一部は米国で構築されているが、資金調達の方法が追いついていない」とアクシオムの創設者兼最高経営責任者（CEO）のレモ・ムーミアイ・カジャール氏は語る。\nムーミアイ・カジャール氏はCNBCに対し、香港取引所の米国に比べて厳しい上場基準はバイオテクノロジーのエコシステムが成熟していることを示しており、香港の最近のバイオ医薬品上場のパフォーマンスがナスダックの上場を上回っていると指摘した。\n同氏は、バイオテクノロジー企業がより厳しい資金調達環境に直面している中、公開市場は資金調達の代替手段を提供していると述べた。臨床試験は進行するにつれて費用が高くなるが、多額の小切手を振り出す意欲と能力のあるベンチャー投資家の集団は少なくなり、特に初期に大規模な支援者を確保できなかった企業にとってはそうだと同氏は付け加えた。\n政府の圧力や革新的な製薬会社の資金ニーズの高まりを受けて、中国のバイオテクノロジー企業が市の証券取引所に群がっている。 LSEGのデータによると、香港のハンセン・バイオテクノロジー指数は2025年1月の安値から75％以上上昇し、同時期の米国上場企業に追随するICEバイオテクノロジー指数とナスダック・バイオテクノロジー指数の約40～50％の上昇を上回っている。\n「米国は依然として世界で最も深く、最も制度化されたバイオテクノロジー資本プールである」とライフサイエンスに焦点を当てたプライベートエクイティ会社フォンタス・キャピタルの創設パートナー、ダニー・シャン氏は語る。 「その深さこそが、最も資金力があり世界的に競争力のある資産が依然として米国で資金調達し上場している理由であり、純然たる米国のバイオテクノロジー企業が主要拠点として香港を選択することが珍しい理由である」と同氏は述べた。\nしかし変わったのは、昨年導入されたIPOプロセスを合理化する改革のおかげで、世界最大のバイオテクノロジー資金調達拠点の一つとしての香港の魅力が高まっていることだ、とXiang氏は語った。香港取引所と清算局によると、2018年以来、86社が香港で上場し、178億ドル以上を調達した。\n世界的なバイオテクノロジー企業は、同市のバイオ医薬品投資家層の拡大と、臨床試験の迅速化とコスト削減に役立つ可能性がある中国の製薬パートナーとの近さにますます惹かれている。\nそれでも、現地の投資家は中国とのつながりが明確な企業を好む傾向があり、中国のパートナーと製品を共同開発、製造、販売する機会があると考えた資産を支援する傾向があるとシャン氏は語った。\n香港を拠点とする法律事務所DLAパイパーのパートナー、ジョージ・ウー氏は、香港のバイオテクノロジーセクターのバリュエーションがナスダックと比較して低いことも、上昇の可能性を求めるより多くの海外投資家を惹きつけていると述べた。\n米国ではまた、ここ数年で最も強力なバイオテクノロジーのIPOが順調に進んでおり、臨床段階のがん治療薬開発会社であるパラビリス・メディシンズと肥満治療薬メーカーであるカイレラ・セラピューティクスの両社は、それぞれ6億ドル以上を調達し、今年初めの上場時から約60％急騰している。 SPDR S&P バイオテックETF（XBI）は火曜日の時点で前年同期比で76％上昇した。\n発明と拡張\n中国政府にとってバイオテクノロジーは長期的な優先事項であり、中国政府は基礎研究に資金を提供し、医薬品規制を改革し、米国を含む海外で訓練を受けた経験豊富な科学者や幹部を中国に呼び戻してきた。\n人件費と製造コストの低下、理系卒業生の豊富さ、大規模なデータセットへのアクセス、創薬などの分野でのAIの的を絞った利用法、そして臨床試験の募集を支援できる大病院に多くの患者が集中する中国の膨大な人口が、中国の生物製剤、ゲノミクス、医薬品開発の進歩に貢献している、と専門家らは言う。\nしかし、キュア・イノベーション・インデックスによる6月の調査では、中国は臨床開発とサプライチェーンでリードしているにもかかわらず、生物医学科学の質、商業的リーチ、最先端の強みにおいて依然として米国に遅れをとっていることが判明した。\n翔氏は、「米国は基礎科学と新規生物学の画期的な進歩において『0対1』をリードしているが、中国はますます『1対100』をリードしており、これは患者に届けるための迅速かつ資本効率の高い実施を意味する」と述べた。\nアクシオムは、高い死亡率に関連する重度の脳損傷を負った新生児向けの治療法を、韓国に本拠を置くバイオ医薬品会社メディノと共同開発している。この治療法は、米国連邦医薬品局から希少小児疾患に対する指定を2件受けており、韓国では新生児9人を対象とした第1相試験が完了している。\nアクシオムはまた、脳卒中を患った成人に対する可能な治療法としてこの治療法を研究する予定だ。\n「これらの脳損傷には再生療法がないため、できるだけ早く臨床試験を進めることが不可欠です。そして、アジアはそれを行うのに適した場所だと思います」とムーミアイ・カジャール氏はCNBCに語った。\n中国が迫ってくる\n12月、超党派の米国立法委員会は、中国が「非市場慣行と強引な経済学から得た優位性」に基づいて、バイオ医薬品イノベーションの一部の分野で米国を上回り始めていると警告した。この用語は、戦略的産業における中国の国家主導の推進を表現するためにワシントンの一部で使われている用語である。\n同委員会は、米国のバイオテクノロジーのリーダーシップを維持し、一部の分野では取り戻すために官民セクター全体での協調行動を促した。\n火曜日、ドナルド・トランプ大統領は、米国に輸入されるジェネリック医薬品には2028年8月から100％の関税が課され、1年後には関税率が2倍の200％になると述べた。\nムーミアイ・カジャール氏は、同社は地政学的な展開を注視しているが、ジェネリック医薬品ではなく次世代の特殊製品に焦点を当て、関連するリスクと開発スケジュールを理解する投資家を求めているため、この動きは香港で上場するという同社の意図を変えるものではないと述べた。\nナスダックとニューヨーク証券取引所は、バイオテクノロジー企業が収益を上げる前や人体実験を開始する前に上場申請を認めている。香港でも収益前の上場が認められていますが、少なくとも 12 か月の研究開発とコンセプト段階を過ぎたコア製品が必要です。\n「資格を満たしている企業であれば、米国でのIPOは通常より早いが、香港では申請が積み重なることで審査時間が延びている」とXiang氏は述べた。\n— CNBC の Evelyn Cheng がこのレポートに寄稿しました。",

  {
    "id": "trump-s-push-for-american-made-ai-chips-19cb0f04",
    "title": "Trump's push for American-made AI chips hits TSMC's margins",
    "titleJa": "トランプ大統領の米国製AIチップ推進でTSMCの利益に打撃",
    "summaryJa": "ドナルド・トランプ大統領から先端半導体を米国で製造するよう圧力を受けているため、世界有数の半導体メーカーであるTSMCではコストが上昇し、利益率が圧迫されている。トランプ氏が2025年に政権に復帰した後、大統領は米国で製品を製造していない企業に関税を課すと繰り返し脅してきた。",
    "bodyOriginal": "Pressure from President Donald Trump to manufacture advanced semiconductors in the U.S. is increasing costs and squeezing margins at TSMC, the world's leading chipmaker.\nFollowing Trump's return to power in 2025, the president has repeatedly threatened tariffs on companies that don't make their products in America.\nSince then, TSMC has announced a total of $200 billion in commitments to the country, including last week's unveiling of a $100 billion investment into advanced semiconductor manufacturing and packaging facilities in the U.S.\nWhile buoyed by the AI boom — TSMC's market cap has risen more than 100% in the past 12 months — blockbuster earnings this quarter were hit by overseas expansion, the company said.\nGross margin increased ahead of guidance, but that was offset by dilution from overseas fabs, CFO Wendell Huang said on an earnings call. Margins will be further diluted over the next \"several years\" as overseas fab projects \"ramp-up\", he added.\n\"President Trump's leadership is driving companies to invest in American manufacturing,\" said Commerce Secretary Howard Lutnick in a statement.\n\"TSMC's announcement of an additional $100 billion investment following our historic deal on trade and investment with Taiwan will create tens of thousands of American jobs and bring advanced semiconductor manufacturing back to America.\"\nWhile other Asian chipmakers, including SK Hynix, are developing U.S. facilities, TSMC has made by far the largest commitment. Its aggressive U.S. expansion exposes it to higher production costs, creating a potential headwind for margins.\nPolitical pressure\nTSMC on Thursday reported a 77.4% jump in second-quarter profit year on year, soaring past estimates and marking another record-breaking quarter for the world's largest contract-chipmaker.\nIt's also expanding aggressively in the U.S., as the company continues to see a \"multi-year demand mega trend\" from its customers, TSMC's Huang told CNBC.\nPolitical pressure is another key driver of that overseas expansion.\n\"Trillions of dollars in investments by TSMC and other semiconductor companies are a result of President Trump's trade and economic policy, from a historic trade deal with Taiwan to renegotiated CHIPS program investments,\" a White House spokesperson told CNBC.\nBuilding in the U.S. is considerably more expensive.\n\"Broadly, we estimate TSMC's US chips to cost 20-50% more than those produced in Taiwan, depending on subsidy timing, tax credit recognition and other cost fluctuations,\" Phelix Lee, senior equity analyst at Morningstar, told CNBC. Lee added he expected customers to bear more of the higher costs of production.\nTSMC is set to raise prices for both advanced and mature chip production by up to 10% in 2027, Nikkei reported on Tuesday. TSMC told CNBC it doesn't comment on pricing.\n\"What helps TSMC is lack of any material competition,\" Gaurav Gupta, VP analyst at Gartner, told CNBC.\nBecause of TSMC's dominance in the leading-edge node market, \"a large part of the increased costs would have to be absorbed by its clients, who are looking to diversify or have mandates from the U.S government to purchase local chips,\" Gupta said.\nMargins\nThe company forecasts the gross margin dilution from the ramp-up of overseas fabs in the next several years to be 2% to 3% in the early stages, widening to 3% to 4% in the latter stages, Huang said.\n\"This is a margin difference TSMC can afford because of its very high overall margins,\" said Gil Luria, head of technology research at D.A. Davidson. TSMC's second-quarter gross margin was 67.7%, up slightly from 66.2% in the first quarter.\nWhile Trump has doubled down on calls for homegrown manufacturing, \"customers have increasingly sought geographical diversification after Covid disrupted the global supply chain,\" said Morningstar's Lee.\n\"Customers are bracing for geopolitical, logistical, and other disruptions to the supply chain,\" he added. \"We expect made-in-US pressure to persist beyond Trump, although it is less clear how carrot-and-stick will be distributed.\"",
    "bodyJa": "ドナルド・トランプ大統領から先端半導体を米国で製造するよう圧力を受けているため、世界有数の半導体メーカーであるTSMCではコストが上昇し、利益率が圧迫されている。\nトランプ氏が2025年に政権に復帰した後、大統領は米国で製品を製造していない企業に関税を課すと繰り返し脅してきた。\nそれ以来、TSMCは、先週発表された米国の先進的な半導体製造およびパッケージング施設への1000億ドルの投資を含め、同国への総額2000億ドルの約束を発表した。\nTSMCの時価総額は過去12カ月で100％以上上昇したAIブームに支えられた一方、今四半期の大ヒット収益は海外展開の影響を受けたと同社は述べた。\n粗利益率はガイダンスを前に増加したが、海外工場からの希薄化によって相殺されたとCFOのウェンデル・ファン氏は決算会見で述べた。海外のファブプロジェクトが「増加」するにつれ、今後「数年間」で利益率はさらに薄れるだろうと同氏は付け加えた。\nハワード・ラトニック商務長官は声明で、「トランプ大統領のリーダーシップにより、企業は米国の製造業に投資するよう促されている」と述べた。\n「台湾との貿易・投資に関する歴史的な合意に続くTSMCの追加1000億ドル投資の発表は、米国に数万人の雇用を創出し、先進的な半導体製造を米国に取り戻すだろう。」\nSKハイニックスを含む他のアジアのチップメーカーが米国の施設を開発している中、TSMCはこれまでで最大のコミットメントを行っている。同社は米国での積極的な事業拡大により生産コストの上昇にさらされており、利益率にとって潜在的な逆風となっている。\n政治的圧力\nTSMCは木曜日、第2四半期の利益が前年同期比77.4％増加したと報告し、過去の予想を大幅に上回り、世界最大の受託チップメーカーにとって新たな記録更新となる四半期となった。\nTSMCのフアン氏はCNBCに対し、同社は顧客からの「複数年にわたる需要の巨大トレンド」を継続的に見ており、米国でも積極的に拡大していると語った。\n政治的圧力も海外進出のもう一つの主要な推進要因となっている。\nホワイトハウス報道官はＣＮＢＣに対し、「ＴＳＭＣやその他の半導体企業による数兆ドル規模の投資は、台湾との歴史的な通商協定から再交渉されたＣＨＩＰＳプログラムへの投資に至るまで、トランプ大統領の通商経済政策の結果である」と語った。\n米国での建築はかなり高価です。\nモーニングスターのシニア株式アナリスト、フェリックス・リー氏はＣＮＢＣに対し、「補助金のタイミングや税額控除の承認、その他のコスト変動に応じて、ＴＳＭＣの米国製チップのコストは台湾製のチップよりも２０─５０％高いと大まかに見積もっている」と語った。 Lee氏は、顧客がより高い生産コストをより多く負担することを期待していると付け加えた。\nTSMCは、先進チップと成熟チップの両方の生産価格を2027年に最大10％引き上げる予定であると日経新聞が火曜日に報じた。 TSMCはCNBCに対し、価格についてはコメントしないと語った。\n「TSMCにとって有利なのは、重大な競争がないことだ」とガートナーの副アナリスト、ガウラフ・グプタ氏はCNBCに語った。\n最先端ノード市場におけるTSMCの優位性のため、「増加したコストの大部分は、多角化を検討しているクライアント、または米国政府から現地チップの購入を義務付けられているクライアントによって吸収されなければならない」とグプタ氏は述べた。\n余白\n同社は、今後数年間の海外工場の増加による粗利の希薄化は、初期段階では2～3％、後期には3～4％に拡大すると予測している、とフアン氏は述べた。\n「TSMCは全体的なマージンが非常に高いため、これは許容できるマージンの差だ」とD.A.の技術研究責任者のギル・ルリア氏は述べた。デビッドソン。 TSMCの第2四半期の粗利益率は67.7％で、第1四半期の66.2％から若干上昇した。\nトランプ大統領は自国製製造の要求を倍増させているが、「新型コロナウイルスの影響で世界のサプライチェーンが混乱した後、顧客は地理的多様化をますます求めている」とモーニングスターのリー氏は述べた。\n「顧客は地政学的、物流、その他のサプライチェーンの混乱に備えている」と同氏は付け加えた。 「アメとムチがどのように分配されるかはあまり明らかではないが、米国内での圧力はトランプ大統領を超えて続くと予想している。」",

    "id": "tehran-s-hormuz-threat-risks-global-fall-902ecc17",
    "title": "Tehran's Hormuz threat risks global fallout, Rubio warns as U.S. strikes Iran for 11th straight night",
    "titleJa": "米国が11夜連続でイランを攻撃する中、テヘランのホルムズの脅威は世界的な影響の危険性があるとルビオ氏が警告",
    "summaryJa": "マルコ・ルビオ米国務長官は水曜日、イランがホルムズ海峡合意を遵守していないと非難する一方、米国は中東における「外交に全力を尽くしている」と繰り返した。同氏のコメントは、米中央軍が「ホルムズ海峡で商船を脅かすイランの能力を低下させ続ける」ことを目指して、11夜連続でイランの目標を攻撃している中で出された。",
    "bodyOriginal": "U.S. Secretary of State Marco Rubio on Wednesday accused Iran of not honoring the Strait of Hormuz deal, while reiterating that Washington was \"committed to diplomacy\" in the Middle East.\nHis comments come as U.S. Central Command hit Iranian targets for an 11th straight night, as it seeks to \"continue degrading Iran's ability to threaten commercial shipping in the Strait of Hormuz.\"\nCentcom said it had hit military operations centers, drone storage facilities, and military logistics infrastructure.\nSpeaking at the ASEAN Foreign Ministers' meeting in the Philippines, Rubio said that \"the problem we're having right now is that they're not serious about talks. If they're serious, we're serious. If they're not, then we will do what is necessary to protect our interest and also the interest of our allies.\"\nHe added that a key sticking point between Teheran and Washington was that Iran \"demands the right\" to control traffic in the Strait of Hormuz, a right it does not have under international law.\n\"If we create a precedent in the Middle East, where a nation state can decide that they are going to control an international waterway, charge a toll, and if you don't pay them, blow up your ships, we have created a very dangerous precedent, which will repeat itself in other parts of the world, including in this region,\" Rubio warned.\nRubio appeared to make a veiled reference to China, saying that \"of all the regions in the world, the one I don't need to teach about the importance of freedom of navigation in international waterways, it is this region.\"\nThe U.S. Navy has in the past conducted \"freedom of navigation\" operations around disputed islands in the South China Sea, where several Southeast Asian countries have competing claims with China, whose \"nine-dash line\" claims almost all of the sea as its waters.\nThat is despite a 2016 ruling by the Permanent Court of Arbitration that said that China's claims has no basis under international law. China has refused to recognize that outcome.\nU.S. and Iran had signed an interim memorandum of understanding on June 17 that halted military operations, called for the reopening of Hormuz and established a 60-day window for negotiating a permanent agreement, including terms covering Iran's nuclear program. But the document left the future management of the Strait of Hormuz unresolved.\nIran interpreted the text as recognizing a role for Tehran in managing traffic through the strait and potentially charging for maritime services after an initial 60-day period, but the U.S. maintained that the waterway must remain open without compulsory Iranian fees or restrictions.\nIran and Oman — which also border the Hormuz Strait — said in a joint June 23 statement that \"All arrangements related to the Strait of Hormuz must fully respect the sovereignty and sovereign rights of the two Coastal States of the Strait.\"\nThe strikes on Iran are \"consequences\" for Tehran not keeping their word, he said, adding \"If these consequences did not exist, then today we would be living in a world where the significant percentage of the energy supply of this region and 20% of the energy supply of the world is being held hostage by a nation state.\"",
    "bodyJa": "マルコ・ルビオ米国務長官は水曜日、イランがホルムズ海峡合意を遵守していないと非難する一方、米国は中東における「外交に全力を尽くしている」と繰り返した。\n同氏のコメントは、米中央軍が「ホルムズ海峡で商船を脅かすイランの能力を低下させ続ける」ことを目指して、11夜連続でイランの目標を攻撃している中で出された。\nセントコムは、軍事作戦センター、ドローン保管施設、軍事物流インフラが被害を受けたと発表した。\nルビオ氏はフィリピンで開催されたＡＳＥＡＮ外相会議で、「われわれが現在抱えている問題は、彼らが協議に真剣でないことだ。彼らが真剣であれば、われわれも真剣だ。もし彼らがそうでないのであれば、われわれはわれわれの利益と同盟国の利益を守るために必要なことを行う」と述べた。\n同氏は、テヘランと米国の間の主要な対立点は、イランがホルムズ海峡の交通を規制する「権利を要求している」ことであり、この権利は国際法上イランにはない、と付け加えた。\n「中東で国家が国際水路を管理し、通行料を請求し、支払わなければ船を爆破するという決定を下すことができるという前例を作ってしまえば、我々は非常に危険な前例を作ったことになり、この地域を含む世界の他の地域でも同じことが繰り返されることになる」とルビオ氏は警告した。\nルビオ氏は、秘密裏に中国に言及したようで、「世界のあらゆる地域の中で、国際水路における航行の自由の重要性について教える必要がないのはこの地域だ」と述べた。\n米海軍は過去に南シナ海の係争中の島々周辺で「航行の自由」作戦を実施したことがあるが、同海では東南アジアの数カ国が中国と領有権を争っており、同国の「九段線」で海のほぼ全域を自国の水域と主張している。\n中国の主張は国際法上根拠がないとの常設仲裁裁判所の2016年の判決にもかかわらずだ。中国はその結果を認めることを拒否している。\n米国とイランは6月17日、軍事作戦の停止、ホルムズの再開を求め、イランの核開発計画を含む条件を含む恒久的合意の交渉に60日間の猶予期間を設ける暫定覚書に署名していた。しかし、この文書はホルムズ海峡の将来の管理を未解決のままにした。\nイランはこの文書を、海峡の交通管理におけるテヘランの役割を認識し、最初の60日間の期間後に海上サービスに料金を請求する可能性を認めていると解釈したが、米国はイランによる強制的な料金や制限なしに水路は開通したままでなければならないと主張した。\n同じくホルムズ海峡に接するイランとオマーンは6月23日の共同声明で、「ホルムズ海峡に関連するすべての取り決めは、同海峡の沿岸2国の主権と主権を完全に尊重しなければならない」と述べた。\n同氏は、イランへの攻撃はイラン政府が約束を守らなかったことによる「結果」であると述べ、「これらの結果が存在しなかったなら、私たちは今日、この地域のエネルギー供給のかなりの割合、そして世界のエネルギー供給の20％が国民国家によって人質に取られている世界に住んでいることになるだろう」と付け加えた。",

  {
    "id": "these-japanese-ai-winners-don-t-make-chi-c8e3b88c",
    "title": "These Japanese AI winners don’t make chips. They make toilets, glass fiber and seasoning",
    "titleJa": "これら日本の AI 勝者はチップを製造しません。トイレ、ガラス繊維、調味料などを製造している",
    "summaryJa": "投資家の注目が半導体業界に集まる中、ハイテクとはまったく異なるビジネスを展開するいくつかの隠れた優良企業が、AIブームに乗って市場の勝者となっていることが判明した。TOTOは高級トイレで最もよく知られており、日東紡は繊維とガラス繊維を製造し、味の素はMSG調味料を製造している。同社のコア技術を活用してAIサプライチェーンの恩恵を受けるため、今年の株価はそれぞれ78％、63％、61％上昇した。",
    "bodyOriginal": "At a time when investor attention has been on the semiconductor industry, some hidden gems with businesses quite dissimilar to high tech have turned out to be market winners, riding the AI boom.\nToto is best known for high-end toilets, Nittobo makes textiles and glass fiber, and Ajinomoto makes MSG seasoning. Their shares have gained 78%, 63% and 61%, respectively, this year, as they make use of their core technologies to benefit from the AI supply chain.\nToto makes ceramic electrostatic chucks used in semiconductor manufacturing equipment, while Nittobo supplies advanced glass fiber used in semiconductor package substrates.\nAjinomoto makes insulating material, known as \"build-up film\" or ABF, used in semiconductor packaging for high-performance computers and data-center servers.\nAll three companies reported sharp growth in businesses tied to semiconductor demand for their full financial years ended March 31, highlighting the impact of the AI boom.\nToto: plugging away\nThe company's advanced ceramics business enjoyed higher profit margin than its housing equipment segment, thanks to demand from IoT, digital transformation, AI and data centers for advanced semiconductor equipment.\nToto, in its full year results, said it saw a decrease in sales and profits for its core 100-year-old housing equipment unit, but this was made up by increases in revenue and profits in its advanced ceramics business.\nThe segment saw a 34% increase in annual revenue and 42% jump in operating profit, almost single-handedly pulling the overall company into growth for the financial year.\nThe company's expertise in ceramics led it to manufacture electronic chucks for semiconductor manufacturing equipment in 1988.\nThese chucks hold silicon wafers in place during the etching process inside semiconductor manufacturing equipment. Toto says that their ceramics significantly contribute to improving the manufacturing yield of advanced chips.\n\"However, we do not view one segment as superior to the other. Our Advanced Ceramics Business is a high-growth area, but we endured long periods of deficits over its 40-year history before reaching this point,\" the company said to CNBC in an email.\nIt plans to grow both segments and \"maintain a balanced ratio\" for sustainable overall growth, and \"absolutely no plans\" to pivot away from its core housing equipment business, as it provides a stable foundation for the company's balance sheet, while the chip sector remains volatile.\nNittobo: looking to ride the boom\nNittobo said electronic materials were already its mainstay, as it continues to develop markets for its traditional glass-fiber business. Its T-glass product, launched in 1984, is used in printed circuit boards, and electronic components.\nThe company told CNBC that its T-glass and other electronic materials are \"the pillar\" of its growth for the next decade, and that AI semiconductor demand was changing how it allocates capital expenditure, research and development, and human resources.\nNittobo's results tell the story: the company said that strong demand related to AI servers, as well as factors such as strong sales of \"Special Glass\" pushed up sales and profits for the electronics materials business segment.\nNet sales in the electronic materials business climbed 20.4% year on year and operating profit climbed 39.7% compared to the previous financial year.\nThat segment contributed about 91% to Nittobo's net sales increase in the last financial year, according to CNBC's calculations, with the segment's profit rising by 5.5 billion yen (about $34 million), more than the company's operating profit increase of 4.4 billion yen.\nThe company said glass fiber has been used in many applications over time, including composite materials for plastic reinforcement, but now, the company sees that there is a \"very strong possibility electronic materials will remain its most important business well into the future.\"\nIn its results release, Nittobo said it \"expects to see strong demand for Special Glass used in electronic materials, particularly for servers at data centers, network equipment, and semiconductor package substrates, and will proactively strengthen its efforts to expand production capacity to meet this demand.\"\nWhile semiconductor segment becomes increasingly lucrative for the company, it is also expanding applications for its traditional glass-fiber businesses, including composite and industrial materials.\nAjinomoto: an ABF boost\nAjinomoto has found applications for its products, such as producing the ABF insulation film used in semiconductors, even as food remains its primary focus.\nAccording to Ajinomoto's website, a byproduct from the MSG manufacturing process helped the company develop technologies that eventually led to the creation of ABF.\nThe product was put on the market in 1999, and is currently used for high-performance semiconductors, including CPUs.\nAjinomoto says ABF's role has become more important as semiconductor packaging has grown more complex, and that AI, 5G and other advanced technologies will continue to drive semiconductor demand.\nThe company did not respond to CNBC's request for comment.\nAjinomoto does not break out ABF into its own segment, but said in its full year results that its \"Healthcare and Others\" segment — which include ABF — saw an increase in revenue of about 4% and business profit rising 45.1% year on year, partly due to higher revenue for electronic materials.\nThat segment, which makes up more than a third of the company's profit for this financial year, even surpassed Ajinomoto's frozen food segment in terms of revenue and profit.\n\"We foresee continued growth centered on ABFTM products in high-value-added and cutting-edge fields,\" the company said.\nThe company said it aims for a \"one-to-one balance\" between its food business and its AminoScience business, with ABF contributing to the latter.",
    "bodyJa": "投資家の注目が半導体業界に集まる中、ハイテクとはまったく異なるビジネスを展開するいくつかの隠れた優良企業が、AIブームに乗って市場の勝者となっていることが判明した。\nTOTOは高級トイレで最もよく知られており、日東紡は繊維とガラス繊維を製造し、味の素はMSG調味料を製造している。同社のコア技術を活用してAIサプライチェーンの恩恵を受けるため、今年の株価はそれぞれ78％、63％、61％上昇した。\nTOTOは半導体製造装置に使用されるセラミック静電チャックを製造し、日東紡は半導体パッケージ基板に使用される先端ガラスファイバーを供給しています。\n味の素は、高性能コンピューターやデータセンターサーバーの半導体パッケージに使用される「ビルドアップフィルム」またはABFとして知られる絶縁材料を製造しています。\n3社とも3月31日終了の通期決算で半導体需要に関連した事業が急成長したと報告し、AIブームの影響を浮き彫りにした。\nトト: プラグイン\n同社のアドバンストセラミックス事業は、IoT、デジタルトランスフォーメーション、AI、最先端半導体装置のデータセンターからの需要のおかげで、住宅設備機器部門よりも高い利益率を達成した。\nＴＯＴＯは通期決算で、創業１００年を超える主力の住宅設備機器部門が減収減益となったが、アドバンストセラミックス事業の増収増益で補ったと発表した。\nこの部門では年間収益が 34% 増加し、営業利益が 42% 増加し、ほぼ単独で会社全体を会計年度の成長に導きました。\n同社はセラミックスに関する専門知識を活かし、1988 年に半導体製造装置用の電子チャックの製造を開始しました。\nこれらのチャックは、半導体製造装置内のエッチングプロセス中にシリコンウェーハを所定の位置に保持します。 TOTO は、同社のセラミックスが先進チップの製造歩留まりの向上に大きく貢献していると述べています。\n「しかし、当社は一方のセグメントが他方より優れているとは考えていない。当社のアドバンストセラミックス事業は高成長分野だが、ここに至るまで40年の歴史の中で長期間の赤字に耐えてきた」と同社はCNBCに電子メールで述べた。\n同社は両セグメントを成長させ、持続可能な全体的な成長に向けて「バランスの取れた比率を維持」する計画であり、チップ部門が依然として不安定な一方で、同社のバランスシートの安定した基盤となる中核の住宅機器事業から軸足を移す計画は「全くない」。\n日東紡：ブームに乗りたい\n日東紡は、従来のガラス繊維事業の市場開拓を継続しており、電子材料はすでに同社の主力であると述べた。 1984 年に発売された同社の T ガラス製品は、プリント基板や電子部品に使用されています。\n同社はCNBCに対し、Tガラスやその他の電子材料が今後10年間の成長の「柱」であり、AI半導体の需要により設備投資、研究開発、人材の配分方法が変化していると語った。\n日東紡の業績は、AIサーバー関連の需要が堅調であったことや、「特殊ガラス」の販売好調などが電子材料事業部門の売上高と利益を押し上げたと発表した。\n電子材料事業の売上高は前期比20.4％増、営業利益は前期比39.7％増となりました。\nCNBCの計算によると、同部門は前会計年度の日東紡の純売上高増加に約91％貢献し、同部門の利益は55億円（約3,400万ドル）増加し、同社の営業利益の増加44億円を上回った。\n同社は、ガラス繊維は長年にわたってプラスチック強化用の複合材料を含む多くの用途に使用されてきたが、現在では「電子材料が将来にわたって最も重要な事業であり続ける可能性が非常に高い」と同社は見ていると述べた。\n日東紡は決算発表の中で、「電子材料用途の特殊ガラス、特にデータセンターのサーバーやネットワーク機器、半導体パッケージ基板などの需要が堅調に推移すると見込んでおり、この需要に応えるべく生産能力の拡大を積極的に強化していきます」と述べた。\n同社にとって半導体部門の収益性はますます高まっているが、複合材料や産業材料など、従来のガラス繊維事業の用途も拡大している。\n味の素：ABF強化\n味の素は食品を中心にしながらも、半導体に使われるABF絶縁膜の製造など、自社製品の用途を見出している。\n味の素のウェブサイトによると、MSG製造プロセスの副産物が同社の技術開発に役立ち、最終的にABFの誕生につながったという。\n1999年に発売され、現在ではCPUをはじめとする高性能半導体に採用されています。\n味の素は、半導体パッケージングがより複雑になるにつれてABFの役割がより重要になっており、AI、5G、その他の先進技術が半導体需要を引き続き促進すると述べている。\n同社はCNBCのコメント要請に応じなかった。\n味の素はABFを自社セグメントに分割していないが、通期決算では、ABFを含む「ヘルスケア・その他」セグメントは、電子材料の増収もあり、前年同期比約4％の増収、45.1％の事業利益が増加したと述べた。\n同部門は今会計年度の同社利益の3分の1以上を占め、売上高と利益の点で味の素の冷凍食品部門をも上回った。\n同社は「ABFTM製品を中心に高付加価値・最先端分野での継続的な成長が見込まれる」としている。\n同社は、食品事業とアミノサイエンス事業の「1対1のバランス」を目指しており、ABFは後者に貢献すると述べた。",

    "id": "trump-plans-steep-tariffs-on-generic-dru-3ab68eaa",
    "title": "Trump plans steep tariffs on generic drugs starting in 2028 to spur U.S. production",
    "titleJa": "トランプ大統領、米国の生産促進に向けて2028年からジェネリック医薬品に高額関税を課す計画",
    "summaryJa": "ドナルド・トランプ大統領は、米国に輸入されるジェネリック医薬品は8月1日から2年間関税ゼロとなり、その後2028年8月に100％の課税が発効し、1年後には200％に引き上げられると述べた。トランプ大統領は火曜日のソーシャルメディアへの投稿で、この段階的なスケジュールは後発医薬品メーカーに生産の国内移転を促すことを目的としていると述べ、この拡大は猶予期間内に米国に工場や施設を建設しない企業に対する「ペナルティー」だと述べた。",
    "bodyOriginal": "President Donald Trump said generic drugs imported into the U.S. will face zero tariffs for two years starting August 1, before a 100% levy takes effect in August 2028 and rises to 200% a year later.\nThe phased schedule is intended to push generic drugmakers to move production onshore, Trump said in a social media post Tuesday, describing the escalation as \"a penalty\" for companies that don't build plants and facilities in the U.S. within the grace period.\nTariffs on patented and branded drugs will remain unchanged, Trump said. The president imposed a 100% levy on patented pharmaceutical products and ingredients under Section 232 on April 2, while exempting generic drugs, biosimilars, and related ingredients. Larger drugmakers were given 120 days before the 100% tariff rate goes into effect, and smaller drugmakers, which rely on contract manufacturers, had 180 days before that rate hits.\nMore than a dozen major drugmakers, including Eli Lilly, Pfizer and Novo Nordisk, have struck deals with Trump to lower the prices of new and existing medicines. Those agreements are part of the president's \"most favored nation\" policy, which ties U.S. drug prices to cheaper ones abroad, and exempts the companies from tariffs for three years.\nTrump has used tariff threats and his most-favored-nation pricing policy to press drugmakers into charging Americans no more than patients in other high-income countries.\nThe stakes are high for India, as the country's pharmaceutical companies supply nearly 50% of all generic medicines consumed in America. The U.S. accounts for about a third of India's pharma exports, mostly cheaper versions of popular drugs, annually. Chinese firms dominate the upstream supply of active pharmaceutical ingredients, such as amoxicillin and heparin.",
    "bodyJa": "ドナルド・トランプ大統領は、米国に輸入されるジェネリック医薬品は8月1日から2年間関税ゼロとなり、その後2028年8月に100％の課税が発効し、1年後には200％に引き上げられると述べた。\nトランプ大統領は火曜日のソーシャルメディアへの投稿で、この段階的なスケジュールは後発医薬品メーカーに生産の国内移転を促すことを目的としていると述べ、この拡大は猶予期間内に米国に工場や施設を建設しない企業に対する「ペナルティー」だと述べた。\nトランプ大統領は、特許およびブランド薬に対する関税は変わらないと述べた。大統領は4月2日、第232条に基づいて特許を取得した医薬品と成分に100％の課税を課す一方、ジェネリック医薬品、バイオシミラー、および関連成分は免除した。大手製薬会社には100％関税率が発効するまでに120日の猶予が与えられ、委託製造業者に依存している小規模製薬会社にはその税率が適用されるまでに180日の猶予が与えられた。\nイーライリリー、ファイザー、ノボ・ノルディスクなど十数社の大手製薬会社は、新薬や既存薬の価格を引き下げる協定をトランプ大統領と結んだ。これらの協定は大統領の「最恵国待遇」政策の一環で、米国の薬価を海外のより安い薬価と結び付け、企業の関税を３年間免除するというものだ。\nトランプ大統領は関税脅しと最恵国価格政策を利用して製薬会社に対し、米国人に他の高所得国の患者と同じ料金を課すよう圧力をかけてきた。\nインドの製薬会社は米国で消費されるジェネリック医薬品のほぼ50％を供給しているため、インドにとっての賭けは大きい。米国はインドの毎年の医薬品輸出の約3分の1を占めており、そのほとんどは人気のある医薬品の廉価版である。アモキシシリンやヘパリンなどの医薬品原薬の上流供給は中国企業が独占している。",

    "id": "nike-to-cut-off-thousands-of-online-dist-ceca29a0",
    "title": "Nike to cut off thousands of online distributors in China, restructure digital footprint",
    "titleJa": "ナイキ、中国の数千のオンライン販売代理店を削減し、デジタルフットプリントを再構築へ",
    "summaryJa": "ナイキは、乱雑になったデジタル市場を一掃し、同地域を成長軌道に戻そうとする中、1月から中国の数千のオンライン販売店を閉鎖する計画であると同社が火曜日に発表した。来年から、ナイキのオンライン拠点は主に小売業者の公式ウェブサイトとアプリ、そして中国最大のオンライン市場およびソーシャルプラットフォームの一部である天猫、京東コム、抖音で運営する店舗に移行する。",
    "bodyOriginal": "Nike is planning to cut off thousands of online distributors in China beginning in January as the sneaker giant looks to clean up what's become a messy digital marketplace and get the region back to growth, the company said Tuesday.\nStarting next year, Nike's online footprint will shift primarily to the retailer's official website and app, and the storefronts it operates on Tmall, JD.com and Douyin, some of China's largest online marketplaces and social platforms.\nCurrently, consumers can shop Nike through all of those channels as well as thousands of other online storefronts powered by Nike's brick-and-mortar partners in the region and a network of secondary distributors. While the vast digital network has led to widespread consumer access to Nike's products, it's also created an inconsistent branding and pricing experience and hampered the company's efforts to reverse a sales decline in the region.\n\"These new flagships will serve as the single, elevated destination for Nike within these ecosystems, with clearer product presentation, stronger storytelling and more connected consumer journeys,\" Cathy Sparks, Nike's new vice president and general manager of Greater China, wrote in a letter. \"This is about strengthening the platforms where consumers already begin and end their shopping journey, making sure those experiences are direct, consistent and unmistakably Nike.\"\n\"This is not about reducing access. It is about reducing fragmentation and strengthening the consumer journey,\" she said. \"When the experience is consistent, the brand becomes stronger.\"\nNike's plans to pare back its online footprint are designed to create a better, more consistent experience for the consumer and allow it to take back pricing control online. However, there are also concerns it could lead to a material drop in revenue in a region that's already shrunk about 30% in the last five years.\nNews about Nike's plans to cut off online distributors first came to light late last month in a local Chinese media report. It prompted a note from BNP Paribas equity analyst Laurent Vasilescu, who wrote the move is reminiscent of Nike's ill-fated decision to cut off wholesalers in North America, which contributed to its collapse of market dominance in the region, as well as steep declines in sales and margins.\n\"This strategy opened up shelf space for competitors and the strategy ended poorly for Nike. We believe the same could happen if it takes the same approach in China,\" Vasilescu wrote last month, adding that BNP was sticking with its underperform rating for the company. \"We don't think Nike has a distributor problem but rather a product problem which also applies in other markets.\"\nThe change is also expected to hurt Nike's brick-and-mortar partners in the region, which have expanded their online presence in recent years to grow their own businesses.\nStill, Topsports, Nike's largest distributor in mainland China, said it supports the company's decision.\n\"Topsports has worked with Nike for 27 years based on the principle of mutual benefit and shared growth,\" Topsports CEO Yu Wu said in a statement. \"This adjustment will bring some short-term pressure to our business. But we firmly believe that, over the medium- to long-term, this direction will help promote a healthier, more orderly, and more sustainable retail ecosystem in China, while further improving consumer experience and product appeal.\"\n\"Looking ahead, we will continue to work closely with Nike, leveraging our strengths in offline retail operations, local consumer service, and deep market development across city tiers,\" Wu said. \"Through new concept sport stores and high-quality physical retail experiences, we will bring Chinese consumers richer and more meaningful sport experiences.\"",
    "bodyJa": "ナイキは、乱雑になったデジタル市場を一掃し、同地域を成長軌道に戻そうとする中、1月から中国の数千のオンライン販売店を閉鎖する計画であると同社が火曜日に発表した。\n来年から、ナイキのオンライン拠点は主に小売業者の公式ウェブサイトとアプリ、そして中国最大のオンライン市場およびソーシャルプラットフォームの一部である天猫、京東コム、抖音で運営する店舗に移行する。\n現在、消費者はこれらすべてのチャネルだけでなく、地域内のナイキの実店舗パートナーや二次流通業者のネットワークを活用した他の何千ものオンライン店頭でもナイキを購入できます。広大なデジタルネットワークにより、消費者がナイキ製品に広範囲にアクセスできるようになった一方で、一貫性のないブランディングや価格設定が生まれ、この地域での売上減少を逆転させようとする同社の取り組みも妨げられている。\nナイキの新副社長兼中華圏ゼネラルマネージャーのキャシー・スパークス氏は書簡の中で、「これらの新しい旗艦は、より明確な製品プレゼンテーション、より強力なストーリーテリング、よりつながりのある消費者行動を備え、これらのエコシステム内でナイキの単一の高みの目的地として機能する」と述べた。 「これは、消費者がショッピングの旅を開始し終了するプラットフォームを強化し、それらの体験が直接的で一貫性があり、紛れもないナイキであることを保証することです。」\n「これはアクセスを減らすことではありません。断片化を減らし、消費者の行動を強化することです」と彼女は述べた。 「体験が一貫していれば、ブランドはより強力になります。」\nナイキのオンライン展開を縮小する計画は、消費者にとってより優れた、より一貫した体験を生み出し、オンラインでの価格管理を取り戻すことを目的としている。しかし、過去5年間ですでに約30％縮小しているこの地域では、これが大幅な収入減少につながる可能性があるという懸念もある。\nナイキのオンライン販売代理店遮断計画に関するニュースは、先月末、中国の地元メディアの報道で初めて明らかになった。これを受けてBNPパリバの株式アナリスト、ローラン・ヴァシレスク氏は、この動きは北米での卸売業者を遮断するというナイキの不運な決定を彷彿とさせるとのコメントを出し、そのことが同地域での市場支配力の崩壊と売上高と利益率の急激な低下の一因となったと書いた。\nバシレスク氏は先月、「この戦略は競合他社に棚の余地を与え、ナイキにとっては不本意な結果に終わった。中国でも同じアプローチを取れば同じことが起こる可能性があるとわれわれは考えている」と書き、BNPが同社のアンダーパフォーム格付けを維持していると付け加えた。 「私たちは、ナイキが販売代理店に問題を抱えているとは考えていません。むしろ、他の市場にも当てはまる製品の問題に問題があると考えています。」\nこの変更は、自社のビジネスを成長させるために近年オンラインでの存在感を拡大しているこの地域のナイキの実店舗パートナーにも打撃を与えると予想されている。\nそれでも、中国本土におけるナイキ最大の販売代理店であるトップスポーツは、同社の決定を支持すると述べた。\nトップスポーツのユー・ウー最高経営責任者（CEO）は声明で、「トップスポーツは、相互利益と成長の共有の原則に基づいて、ナイキと27年間協力してきた」と述べた。 「この調整は、短期的には当社のビジネスにある程度の圧力をもたらすことになるでしょう。しかし、中長期的には、この方向性が中国におけるより健全で、より秩序ある、より持続可能な小売エコシステムの促進に役立つと同時に、消費者エクスペリエンスと製品の魅力をさらに向上させることができると強く信じています。」\nウー氏は「将来を見据え、オフライン小売事業、地域消費者サービス、都市層を超えた深い市場開発における当社の強みを活用し、ナイキと緊密に協力し続ける」と述べた。 「新しいコンセプトのスポーツストアと質の高い実店舗小売体験を通じて、中国の消費者により豊かで有意義なスポーツ体験を提供していきます。」",

    "id": "i-can-t-afford-to-turn-the-oven-on-7-4m-f804cab4",
    "title": "'I can't afford to turn the oven on': 7.4m households struggling to buy essentials",
    "titleJa": "「オーブンをつける余裕がない」：740万世帯が必需品の購入に苦労",
    "summaryJa": "「オーブンをつける余裕がない」：740万世帯が必需品の購入に苦労- 公開されました",
    "bodyOriginal": "'I can't afford to turn the oven on': 7.4m households struggling to buy essentials\n- Published\nFour years into the cost of living crisis, almost two-thirds of low-income families say they struggle to buy essentials such as clothes, heating and food, according to anti-poverty charity the Joseph Rowntree Foundation (JRF).\nA record 62% of low-income families were unable to afford an essential item in the past six months, the charity found - the equivalent of 7.4m households, up from 7.1 million a year ago.\nAlmost half of those surveyed had skipped a meal or cut portion sizes to save money.\nNewly appointed Prime Minister Andy Burnham has promised to set out how he will \"give people some breathing space, help with the cost of living,\" including cutting VAT on electricity bills from October.\n'I can't remember the last time I treated myself'\nElaine Yates, 77, says money worries mean she \"can't remember\" the last time she used her oven to cook a hot meal.\n\"I don't look after myself. I can't remember the last time I put the oven on. I have got an air fryer that I probably used about three weeks ago.\n\"I had two slices of toast yesterday and two Weetabix and fruit is all I've had to eat today.\"\nThe pensioner lives by herself in rural Northamptonshire after being widowed five years ago. Following 20 years as a full-time carer for her husband, her finances are \"extremely tight\", so she has felt particularly vulnerable to price rises since he passed away.\n\"It's really hard times, not just for me, but for thousands of others. My car costs me an arm and a leg. The fuel prices are rocketing up again, and I live in a village, so I need a car because I've got arthritis and I can't walk very far. I spend about £50 a week on petrol, which is more than my food bill.\"\nElaine often gives lifts to others in her village who don't have transport, only to find herself unable to shop alongside them.\n\"I've got one friend who buys clothes and I sit outside the shop because I can't afford to go in,\" she says. \"I can't remember the last time I treated myself.\"\nIn the winter, Elaine rarely turns the heating on, and when she does she keeps the thermostat at a low 13C.\n\"Any extra help with their energy bills will be welcomed by older people, who we know worry hugely about the cost of fuel and often ration their heating, putting their health at risk, to ensure they can make ends meet,\" said Caroline Abrahams, Charity Director at Age UK\nBut the charity would now like the prime minister to go further and increase the value of the Warm Home Discount, to cover all households on low incomes.\n'You're just about surviving'\nZoe Hayden, 35, is a single parent who fell into debt after being made redundant from her retail job while on maternity leave.\nZoe, who lives in North Oxford, is now debt-free and completing a plumbing apprenticeship. But she says rising costs are still a challenge when feeding a family.\n\"Over the last five years, it's been absolutely bonkers, the way that things have increased. I remember going into the shop and being like, wow, nearly everything I'm buying has increased by 50p or 75p. That's a lot of money when you're struggling.\n\"I went into the shop the other day and I spent £45 on basic stuff, not even two bags of shopping. It just means you have to make even more sacrifices. You're not living your best life, you're just about surviving.\"\nShe would also like Burnham to go beyond cheaper energy bills and look to fund free or affordable activities for children in low-income families, such as youth clubs, holiday schemes and sports camps.\nSeparate research from charity Christians Against Poverty found about 35% of adults in the UK worry about their finances every day.\nAs the VAT announcement will save households about £45 a year, \"the fear of juggling budgets that simply don't balance remains\", says Juliette Flachm, Acting Head of Policy and Public Affair.\n\"With incomes failing to keep pace with the high cost of essentials, many of the people we see are left facing impossible decisions.\"\nJRF's chief economist Chris Belfield said: \"Andy Burnham starts his time as prime minister at a time when the cost-of-living crisis has never been more widely felt.\n\"Government policy can work. We need greater intervention to control rental prices, make energy affordable and improve the adequacy of Universal Credit so everyone can afford the essentials.\"\nA government spokesperson said: \"We're determined to turn the tide on poverty after years of rising hardship. Our recent statistics show that effort is beginning to make a difference - household incomes have risen 5% in real terms, food bank usage has fallen, and food insecurity is down.\n\"Work is underway to tackle the cost-of-living pressures through measures such as increasing the National Minimum Wage, removing the two-child limit, implementing the first ever sustained above inflation increase to Universal Credit, and launching the £1bn Crisis and Resilience Fund which will act as a genuine safety net for those in financial crisis.\"\nThe figures come from the Joseph Rowntree Foundation's poverty tracker, which surveys about 4,000 people from households in the lowest 40% of incomes.\nThe charity noted that food inflation averaged 4.1% between May 2025 and May 2026, compared to 3.6% for overall inflation, which has greater impact on lower-income households because they spend more of their income on food.\nBut it also noted that the number of poorer households that couldn't afford to keep their homes warm has fallen by half a million in two years, after the government reduced average household energy bills by about £150 a year through changes to green levies and support like the warm homes discount.",
    "bodyJa": "「オーブンをつける余裕がない」：740万世帯が必需品の購入に苦労\n- 公開されました\n反貧困慈善団体ジョセフ・ラウンツリー財団（JRF）によると、生活費危機が始まって4年が経ち、低所得世帯のほぼ3分の2が衣料品、暖房器具、食料品などの必需品を買うのに苦労していると述べている。\n慈善団体の調査によると、低所得世帯の62％が過去6か月間で必需品を買う余裕がなく、過去最高を記録した。これは740万世帯に相当し、1年前の710万世帯から増加した。\n調査対象者のほぼ半数は、お金を節約するために食事を抜いたり、分量を減らしたりしていた。\n新しく任命されたアンディ・バーナム首相は、10月から電気代の付加価値税を削減することを含め、「人々に息抜きのスペースを与え、生活費を支援する」方法を打ち出すことを約束した。\n「最後に自分を治療したのがいつだったか思い出せない」\n77歳のエレイン・イェーツさんは、お金の心配で最後にオーブンを使って温かい食事を作ったのがいつだったか「思い出せない」と話す。\n「自分のことは自分でやらないんです。最後にオーブンをいつ入れたか思い出せません。エアフライヤーを持っていますが、おそらく3週間ほど前に使用したと思います。」\n「昨日はトーストを2枚食べて、ウィータビックスを2枚食べました。今日はフルーツだけです。」\n年金受給者の彼女は、5年前に夫を亡くし、ノーサンプトンシャー州の田舎で一人暮らしをしている。 20年間フルタイムで夫の介護を続けてきたため、彼女の財政は「非常に厳しい」ため、夫が亡くなってからは特に物価上昇に弱いと感じている。\n「私だけでなく、他の何千人もの人々にとっても、本当に困難な時期です。私の車は腕と足を犠牲にします。燃料価格が再び高騰しており、私は村に住んでいますが、関節炎を患っており、あまり遠くまで歩くことができないため、車が必要です。私はガソリン代に週に約50ポンドを費やしていますが、これは食費を超えています。」\nエレインは、交通手段を持たない村の人たちに車で送迎することがよくありますが、自分も一緒に買い物ができないことに気づきます。\n「洋服を買う友達が1人いるんですが、私は店に入る余裕がないので店の外に座っています」と彼女は言う。 「最後に自分を治療したのがいつだったか思い出せません。」\n冬には、エレインは暖房をほとんどオンにせず、暖房をオンにするときはサーモスタットを 13 度の低い温度に保ちます。\n「光熱費の追加援助は高齢者に歓迎されるだろう。高齢者は燃料費を非常に心配しており、家計を確実にやりくりするために暖房を配給して健康を危険にさらしていることがよくあることを私たちは知っている」とエイジUK慈善ディレクターのキャロライン・エイブラハムズは述べた。\nしかし、慈善団体は首相に対し、さらに一歩進んで、低所得の全世帯をカバーするために、「暖かい家割引」の金額を引き上げることを望んでいる。\n「君はあと少しで生き残れるだけだよ」\nゾーイ・ヘイデンさん（35歳）はシングルマザーで、産休中に小売業の仕事を解雇され、借金を抱えた。\nノース・オックスフォードに住むゾーイは現在借金がなく、配管工の見習いを終えています。しかし、家族を養う上では、コストの上昇が依然として課題であると彼女は言う。\n「過去5年間で、物事の増加の仕方はまったくおかしくなりました。店に入ったとき、すごい、私が買っているほぼすべての商品が 50 ペンスか 75 ペンス値上がりしていたのを覚えています。困っているときは大金ですよ。\n「先日お店に行ったら、買い物袋2個にも満たず、基本的なものに45ポンド使ってしまいました。それは、さらに多くの犠牲を払わなければならないということです。あなたは最高の人生を送っているわけではなく、ただ生き延びるだけなのです。」\n彼女はまた、バーナムに対し、より安価な光熱費を超えて、青少年クラブ、休暇計画、スポーツキャンプなど、低所得世帯の子供たちのための無料または手頃な価格の活動に資金を提供するよう努めてほしいと考えている。\n慈善団体「Christians Against Poverty」の別の調査によると、英国の成人の約35％が毎日自分のお金のことを心配していることがわかった。\nVATの発表により、世帯は年間約45ポンド節約されることになるが、「単純にバランスのとれない予算をやりくりする恐れは依然として残っている」と政策広報部長代理のジュリエット・フラクム氏は言う。\n「生活必需品の高価に収入が追いついていないため、私たちが目にする多くの人々は不可能な決断を迫られています。」\nJRFの首席エコノミスト、クリス・ベルフィールド氏は、「アンディ・バーナム氏は、生計費の危機がかつてないほど広く感じられている時期に首相としてのスタートを切った。\n「政府の政策は機能する可能性がある。誰もが必需品を買えるよう、レンタル価格を管理し、エネルギーを手頃な価格にし、ユニバーサルクレジットの適切性を改善するために、より大きな介入が必要です。」\n政府報道官は、「何年にもわたって苦境が増大してきた後、私たちは貧困の流れを変えようと決意している。最近の統計は、努力が成果を上げ始めていることを示している。世帯収入は実質で5％増加し、フードバンクの利用は減少し、食糧不安は減少している」と語った。\n「全国最低賃金の引き上げ、子ども2人制限の撤廃、ユニバーサル・クレジットに対する史上初の持続的なインフレ率を超える引き上げの実施、金融危機に陥った人々への真のセーフティネットとして機能する10億ポンドの危機・強靱基金の立ち上げなどの措置を通じて、生活費の圧力に対処する取り組みが進められている。」\nこの数字はジョセフ・ラウンツリー財団の貧困追跡調査から得たもので、収入の下位40％に属する世帯の約4,000人を調査している。\n同慈善団体は、2025年5月から2026年5月までの食料インフレ率が平均4.1％だったのに対し、全体のインフレ率は3.6％であったと指摘し、低所得世帯は収入の多くを食料に費やすため、その影響がより大きいと指摘した。\nしかし同報告書はまた、政府がグリーン税や暖かい住宅割引などの支援策の変更を通じて、平均家庭の光熱費を年間約150ポンド削減した結果、家を暖かく保つ余裕のない貧しい世帯の数が2年間で50万世帯減少したことも指摘した。",

    "id": "boost-youth-jobs-by-cutting-employers-na-261e3706",
    "title": "Boost youth jobs by cutting employers' national insurance, MPs urge",
    "titleJa": "雇用主の国民保険を削減することで若者の雇用を増やす、国会議員らが要請",
    "summaryJa": "雇用主の国民保険を削減することで若者の雇用を増やす、国会議員らが要請- 公開されました",
    "bodyOriginal": "Boost youth jobs by cutting employers' national insurance, MPs urge\n- Published\nEmployer national insurance (NI) contributions for all under-25s should be cut to boost job opportunities for young people, a group of MPs has urged.\nThe Work and Pensions Committee said it has heard \"overwhelming evidence\" that rising employment costs, including from employer NI, were reducing training and job vacancies, particularly for young people.\nOver one million 16 to 24-year-olds are not in education, employment, or training (known as Neet). The committee said an employer NI cut for all under-25s would tackle this \"travesty\".\nThe government said it was determined to create opportunities for young people, reform education and support people to stay and progress in work.\nThe previous government, which introduced NI increases for businesses last year, said at the time they were making the right choice to fund public services.\nIn its 2024 election manifesto, Labour said it would not raise taxes on \"working people\", specifically income tax, NI, or VAT.\nCritics have argued that the employer NI raise ultimately affects workers by limiting job opportunities.\nSome employers have argued it has become more difficult to hire young people due to higher minimum wages and increased taxes, such as employer National Insurance contributions, although the Institute for Fiscal Studies (IFS) found there is no clear evidence, external that higher minimum wages have been a \"major driver\" of young people becoming Neets.\nIn April last year, the rate that employers pay in NI contributions rose from 13.8% to 15% and the threshold at which they start paying the tax on each employee's salary fell from £9,100 per year to £5,000.\nHowever, the employment allowance, which is amount employers can claim back from their NI bill, rose from £5,000 to £10,500.\nThe committee said employer NI had hit the retail and hospitality sector, which it said tends to employ young people, particularly hard.\nIt added that there was a \"gap\" between the government's employment strategy for under-21s and their strategy for under-25s.\nThe committee said: \"While businesses pay no employer NI contributions for employees under 21 or for apprentices under 25 – unless their salary is above the £50,270 threshold – they pay 15% on annual earnings above £5,000 for non-apprentices aged 21-24, undermining government schemes to improve employment rates in this age group.\"\nCost of Neets\nThe committee also said there were \"policy contradictions\", with benefits cuts for people in training undermining the government's drive to encourage apprenticeships, describing the \"lack of coherence\" as \"inexcusable\".\nThe committee's chair Debbie Abrahams said the government needs a unified strategy on youth employment to tackle these contradictions.\n\"It'll improve policy coherence so no policy unintentionally pulls against attempts to help more young people into work,\" she said.\nThe committee welcomed early steps taken to prioritise work and training opportunities for 18 to 24-year-olds, but said the changes were needed to tackle the issue of Neets.\n\"Even a short spell as Neet in one's formative years can damage mental health, impact future career opportunities and reduce lifetime earnings,\" said Abrahams.\nFormer minister Alan Milburn found in his review into youth unemployment that the government spends 25 times as much on benefits for young people than it does on supporting them into work.\nThe interim report, published in May, also found that one in six young people were on track to become Neets in the next five years without a solution – up from one in eight today.\nThe report also estimated that Neets cost the UK around £125bn a year from a combination of benefit payments and lost economic output.\nIt said there was no one single factor causing the crisis, citing the Covid-19 pandemic, smartphones, health issues and the current jobs market, which has seen a sharp drop in the number of entry-level positions.\nA government spokesperson said: \"For too long, governments have paid for failure rather than invested in people's success.\n\"We're determined to turn that around by creating real opportunities for young people, reforming education so everyone has a clear path to a good job and providing the support people need to stay and get on in work.\"\n- Published3 November 2024\n- Published26 November 2025\n- Published29 May",
    "bodyJa": "雇用主の国民保険を削減することで若者の雇用を増やす、国会議員らが要請\n- 公開されました\n国会議員グループは、若者の雇用機会を増やすために、25歳未満のすべての若者に対する雇用主国民保険（NI）の拠出金を削減すべきだと主張した。\n労働年金委員会は、雇用主NIを含む雇用コストの上昇が、特に若者の訓練や求人を減少させているという「圧倒的な証拠」を聞いたと述べた。\n100万人以上の16歳から24歳が教育、雇用、訓練を受けていません（ニートとして知られています）。同委員会は、25歳未満全員に対する雇用主NIの削減がこの「茶番劇」に取り組むだろうと述べた。\n政府は、若者に機会を創出し、教育を改革し、人々が仕事に留まり昇進することを支援する決意であると述べた。\n昨年企業向けにNI引き上げを導入した前政権は当時、企業が公共サービスに資金を提供するのは正しい選択だと述べていた。\n労働党は2024年の選挙マニフェストで、「働く人々」への増税、特に所得税、NI、VATの増税は行わないと述べた。\n批評家は、雇用主のNIの昇給は最終的に雇用の機会を制限することで労働者に影響を与えると主張している。\n一部の雇用主は、最低賃金の引き上げと雇用主の国民保険料などの税金の引き上げにより、若者の雇用がより困難になっていると主張しているが、財政研究所（IFS）は、最低賃金の上昇が若者のニート化の「主な要因」であるという外部の明確な証拠はないことを発見した。\n昨年4月、雇用主がNI拠出金として支払う率は13.8％から15％に上昇し、各従業員の給与に対する税金の支払いを開始する基準は年間9,100ポンドから5,000ポンドに下がった。\nただし、雇用主が NI 請求書から返還請求できる金額である雇用手当は、5,000 ポンドから 10,500 ポンドに増加しました。\n同委員会は、雇用主であるNIが若者を雇用する傾向にある小売業とサービス業に特に大きな打撃を与えたと述べた。\nさらに、21歳未満に対する政府の雇用戦略と25歳未満に対する政府の戦略の間には「ギャップ」があるとも付け加えた。\n同委員会は、「企業は21歳未満の従業員や25歳未満の実習生には、給与が基準額5万270ポンドを超えない限り雇用主NI拠出金を支払わないが、21歳から24歳の非実習生には5000ポンドを超える年収の15％を支払っており、この年齢層の雇用率を向上させる政府の計画を台無しにしている」と述べた。\nニートの費用\n同委員会はまた、研修中の人々への給付金削減が政府の実習奨励の推進を損なうなど、「政策の矛盾」があるとも述べ、「一貫性の欠如」は「許しがたい」ものだと述べた。\n委員会のデビー・エイブラハムズ委員長は、政府はこれらの矛盾に対処するために若者の雇用に関する統一戦略が必要だと述べた。\n「これにより政策の一貫性が向上し、より多くの若者の就労を支援する試みに意図せず反対するような政策がなくなるだろう」と彼女は述べた。\n同委員会は、18歳から24歳の就労と訓練の機会を優先するために早期の措置を講じたことを歓迎したが、ニートの問題に取り組むためには変更が必要だと述べた。\n「形成期にニートとして短期間過ごしただけでも、精神的健康を損ない、将来のキャリアの機会に影響を与え、生涯収入を減らす可能性がある」とエイブラハムズ氏は述べた。\n元大臣アラン・ミルバーンは、若者の失業に関する調査の中で、政府が若者の就労支援よりも若者向けの給付金に25倍の費用を費やしていることを発見した。\n5月に発表された中間報告書では、若者の6人に1人が、解決策がないまま今後5年間でニートになる傾向にあり、現在の8人に1人から増加していることも判明した。\n同報告書はまた、給付金の支払いと経済生産の損失を合わせて、ニートがイギリスに年間約1,250億ポンドの損害を与えていると推定している。\n新型コロナウイルス感染症のパンデミック、スマートフォン、健康問題、そしてエントリーレベルの求人数が激減している現在の雇用市場を挙げ、危機を引き起こす単一の要因は存在しないと述べた。\n政府報道官は「あまりにも長い間、政府は国民の成功に投資するのではなく、失敗の代償を払ってきた。\n「私たちは、若者に真の機会を創出し、誰もが良い仕事に就くための明確な道を持てるように教育を改革し、人々が働き続けていくために必要なサポートを提供することで、この状況を好転させる決意をしています。」\n- 2024 年 11 月 3 日発行\n- 2025 年 11 月 26 日発行\n- 5 月 29 日発行",

    "titleJa": "AI はあなたの仕事を手助けしてくれるでしょうか、それともあなたに代わってくれるでしょうか?",
    "summaryJa": "AI はあなたの仕事を手助けしてくれるでしょうか、それともあなたに代わってくれるでしょうか?- 公開されました",
    "bodyOriginal": "Will AI help you do your job or replace you?\n- Published\nArtificial Intelligence (AI) companies are making vast claims about the ability of their tools to replace human labour.\nSome jobs will be automated, others will be \"augmented\". The bosses of the world's biggest companies are diverting vast sums into these tools, partly with the knowledge that they could save money on headcount.\n\"Flat is the new up\", we are told, in terms of the size of a company's workforce as investors ask whether jobs should be done by new recruits - or, instead, armies of \"AI Agents\", virtual workers tasked with doing specific roles, some of them relatively skilled.\nIf even half true there will be an impact on us all, across sectors and individual careers, and perhaps it will happen sooner than we think.\nNobel prize-winning economists recently warned the world “must act now”, external to ensure that AI leads to rising living standards and not large-scale job displacement, and last month London businesses warned they were struggling to find the skills they need as AI disrupts the jobs market.\nIt is early days yet, but there are already some notable patterns in the data.\nThis chart is the industry benchmark for how various models can perform the tasks previously done by humans, in this case using and developing computer software.\nThis measure showed that three years ago, large language models (LLMs) were only able to reliably complete tasks humans took seconds or minutes to do. Now they are increasingly able to complete fairly complex tasks taking an hour or so.\nNow, some of the LLMs can find problems in a cryptocurrency contract and even develop and streamline the model itself, which would take a human several hours.\nThe latest generation of models could start to entirely develop themselves in the next year or so. This is just software coding, but the same type of pattern is being seen, at an earlier stage, with financial analysis, early stage legal work, even some entry level creative industry jobs.\nWhat does that mean for jobs? The most thorough analyses out there come from the United States, using four years of data on employment outcomes by age among a range of occupations most exposed to AI (including software developers and customer contact reps) - and least exposed to AI (health workers, childcare workers, hairdressers).\nStanford University's analysis of wage and jobs data finds a hit to employment for 22 to 25-year-olds of 2.7% since ChatGPT became widespread, rising to 12.8% in the most AI-exposed sectors such as finance, software and creative industries.\nNot all economists agree, arguing that other factors such as interest rate rises can explain this.\nOnline jobs postings have also been affected since the launch of ChatGPT and other LLMs.\nThere are many other factors here, from interest rates to taxes, however there is something of note in the OECD's recent analysis of the difference in jobs posting between its slightly different measure of highly exposed sectors (eg telemarketing and legal services) and less exposed sectors (construction, cleaning and food prep).\nThe UK was hit quite notably on this measure at a time when rates were stable or being cut. It also predates last year's National Insurance rise. On most international measures, the UK's service sector concentration leaves it exposed to potential AI jobs losses.\nAI usage is measured in \"tokens\", which are small chunks of text that AI systems use to understand, analyse and generate language. On average, one token is roughly equivalent to three-quarters of an English word.\nThere have been astonishing increases in AI use in 2026, and the increase in token use has vastly outweighed the declining “per token cost”.\nThe world's top companies that are using AI had deployed \"token leaderboards\" to try to get their employees to create as much gain in productivity as possible from the most advanced models.\nTrillions, and sometimes thousands of trillions of tokens (quadrillions) have been used over the past few months primarily for “agentic use”, which is for agents that can perform tasks automatically. The problem here is that incredible bills were racked up, so much so that many of those companies have now begun to ration the use of these models.\nThis is important. It might show that there are limits to how much work could be automated. The virtual workers might be more expensive than the human ones. It depends on the task.\nOne factor to watch out for however, is that many companies, including Western ones, are diverting to much cheaper forms of AI, derived from Chinese models that are provided freely on to the market.\nSo there is much uncertainty here, but some clear trends emerging.",
    "bodyJa": "AI はあなたの仕事を手助けしてくれるでしょうか、それともあなたに代わってくれるでしょうか?\n- 公開されました\n人工知能 (AI) 企業は、自社のツールが人間の労働を代替する能力について大々的に主張しています。\n一部のジョブは自動化され、他のジョブは「拡張」されます。世界最大手の企業の経営陣は、人員削減につながるとの認識もあり、これらのツールに巨額の資金を投じている。\n投資家は、仕事を新入社員がやるべきか、それとも代わりに、特定の役割を担う仮想労働者（その一部は比較的熟練している）である「AI エージェント」の軍隊が行うべきかを問う中、企業の労働力の規模という観点から、「フラットは新人だ」と言われている。\n半分でも真実であれば、分野や個人のキャリアを超えて、私たち全員に影響が及ぶでしょうし、おそらくそれは私たちが思っているよりも早く起こるでしょう。\nノーベル賞受賞者の経済学者らは最近、AIが大規模な雇用喪失ではなく生活水準の向上につながるよう対外的に「今すぐ行動しなければならない」と世界に警告し、先月ロンドンの企業はAIが雇用市場を混乱させる中、必要なスキルを見つけるのに苦労していると警告した。\nまだ始まったばかりですが、データにはすでにいくつかの注目すべきパターンが見られます。\nこのグラフは、これまで人間が行っていたタスク (この場合はコンピューター ソフトウェアの使用と開発) をさまざまなモデルがどのように実行できるかを示す業界のベンチマークです。\nこの測定結果は、3 年前、大規模言語モデル (LLM) は人間が数秒または数分かかるタスクを確実に完了することしかできなかったことを示しています。今では、1 時間程度かかるかなり複雑なタスクを完了できるようになりました。\n現在、一部の LLM は暗号通貨コントラクトの問題を発見し、人力では数時間かかるモデル自体の開発と合理化さえも行うことができます。\n最新世代のモデルは、来年かそこらで完全に独自の開発を開始する可能性があります。これは単なるソフトウェアコーディングですが、同じタイプのパターンが、より初期の段階で、財務分析、初期段階の法務業務、さらには一部の初級レベルのクリエイティブ業界の仕事でも見られています。\nそれは仕事にとって何を意味するのでしょうか？最も徹底的な分析は米国からのもので、AIに最もさらされている職業（ソフトウェア開発者や顧客窓口担当者を含む）と最もAIにさらされていない職業（医療従事者、保育士、美容師）の年齢別の雇用結果に関する4年間のデータを使用している。\nスタンフォード大学の賃金と雇用データの分析によると、ChatGPTが普及して以来、22歳から25歳の雇用に2.7％の打撃があり、金融​​、ソフトウェア、クリエイティブ業界などAIに最もさらされているセクターでは12.8％に上昇した。\nすべてのエコノミストが同意しているわけではなく、金利上昇などの他の要因がこれを説明できると主張している。\nChatGPT やその他の LLM の開始以来、オンライン求人情報も​​影響を受けています。\nここには金利から税金まで他にも多くの要因がありますが、OECDが最近行った分析では、露出度の高い部門（電話勧誘販売や法律サービスなど）と露出度の低い部門（建設、清掃、食品の準備など）のわずかに異なる尺度間の求人数の違いについて、注目すべき点があります。\n英国は、金利が安定していたか引き下げられていた時期に、この措置でかなり顕著な打撃を受けた。これは昨年の国民保険の値上げよりも前のことだ。ほとんどの国際措置では、英国のサービス部門の集中により、潜在的な AI 雇用の損失にさらされています。\nAI の使用量は、AI システムが言語を理解、分析、生成するために使用するテキストの小さな塊である「トークン」で測定されます。平均して、1 トークンは英語の単語の約 4 分の 3 に相当します。\n2026 年には AI の使用が驚くほど増加しており、トークン使用量の増加は「トークンあたりのコスト」の低下を大幅に上回っています。\nAI を使用している世界のトップ企業は、従業員に最先端のモデルから可能な限り生産性の向上をもたらそうとするために「トークン リーダーボード」を導入していました。\n過去数か月間、主に「エージェント使用」、つまりタスクを自動的に実行できるエージェント用に、数兆、場合によっては数千兆 (京) のトークンが使用されてきました。ここでの問題は、信じられないほどの請求書が積み上げられ、多くの企業がこれらのモデルの使用を制限し始めたことです。\nこれは重要です。それは、自動化できる作業には限界があることを示しているかもしれません。仮想ワーカーは人間のワーカーよりも高価になる可能性があります。それはタスクによって異なります。\nただし、注意すべき要素の 1 つは、欧米企業を含む多くの企業が、市場に無料で提供されている中国製モデルから派生した、はるかに安価な形式の AI に転用していることです。\nしたがって、ここには多くの不確実性がありますが、いくつかの明確な傾向が現れています。",

    "id": "tokyo-urges-men-to-wear-shorts-to-work-b-45189b3b",
    "title": "Tokyo urges men to wear shorts to work, but some women say it's 'leg hair harassment'",
    "titleJa": "東京都、男性にショートパンツを着用して出勤するよう呼び掛けているが、一部の女性は「すね毛ハラスメント」だと主張",
    "summaryJa": "東京都、男性にショートパンツを着用して出勤するよう呼び掛けているが、一部の女性は「すね毛ハラスメント」だと主張- 公開されました",
    "bodyOriginal": "Tokyo urges men to wear shorts to work, but some women say it's 'leg hair harassment'\n- Published\nAs temperatures rise this summer, Japanese men are baring more leg at work than ever before.\nThe Tokyo Metropolitan Government is pushing company employees to ditch their usual suit and tie for more casual attire, featuring t-shirts, trainers - and shorts.\nTokyo Governor Yuriko Koike introduced \"Tokyo Cool Biz\" in April, hoping to expand on her signature cool down initiative which has now become a widely recognised annual summer tradition.\nAlmost four months in, the newly allowed shorts in the office policy is getting mixed reviews.\nSome commentators enjoy the relaxed rules, helping them work more comfortably. Others say the policy is unfair to women. Although not an official rule and more about etiquette, women are often still expected to wear tights when their work attire exposes their legs in a traditional Japanese office environment.\nAnd a few women describe the experience of \"leg hair harassment\" or a term coined online as \"sunehara\", referring to the discomfort of being forced to see their colleague's leg hair.\n\"We want to give people more options in the severe heat, not tell them what to wear. There should be no issue as long as the work attire is not offensive to anyone,\" Tokyo Metropolitan Government environmental official Noboru Watanabe told the BBC.\nA June survey by Gorilla Clinic found 53.5% opposed wearing shorts to work in the summer while 46.5% were in favour of the new recommendation.\nFor those against shorts in the office the main reason, for both genders, was the concern over body shape and body hair. The clinic says women significantly outnumbered men in their response, indicating that women may be more resistant to seeing a male colleague's bare legs.\nIn recent years more Japanese workers, notably those working at startups and tech companies, have started wearing casual clothes. But this year, the Tokyo government recommendation has made it more socially acceptable. Still, some men have been feeling self-conscious about their leg hair.\nAkifumi Funatsu, the director of Gorilla Clinic, says he has noticed more clients coming to the clinic not just for cosmetic reasons, but as a matter of \"social etiquette when wearing shorts\". He thinks women believe that \"men should have less leg hair\", which has prompted them to seek laser hair removal so as not to offend those around them.\nJapan temperatures soar over 40C, marking first 'cruelly hot day'\n- Published1 hour ago\nKoike first introduced the summer wardrobe shift as Japan's environment minister in 2005. She launched a national energy-saving campaign called \"Cool Biz\" to encourage company workers to opt for short-sleeve shirts.\nGovernment leaders participated in the initiative, with then Prime Minister Junichiro Koizumi often seen in public without wearing a tie or jacket, helping get the word out.\nA few years later following the Tohoku earthquake and tsunami in March 2011, the government launched \"Super Cool Biz\" which expanded the guidelines to help reduce energy use both at work and at home.\nAs with other parts of the world, Japan has been experiencing record heat in recent months while grappling with soaring energy prices driven by instability in the Middle East.\nForecasters have warned of extreme heat this summer, with the Japan Meteorological Agency trying to raise public awareness by announcing the word \"kokusho-bi\", which means \"brutally hot day\" when the mercury exceeds 40C.\nThe latest weekly data shows seven people died in Japan from heatstroke and 4,580 people were admitted to hospitals in the seven days from 6-12 July, according to the Fire and Disaster Management Agency.\nBesides staying hydrated and turning on the air conditioning, some of the most basic actions repeatedly encouraged by government officials, residents have turned to new products and gadgets to beat the heat.\nItems such as clothes with built-in fans, disposable wet-towels, UV and heat blocking umbrellas, and portable handheld fans have been popular and sold in shops nationwide.\nExperts from the Japan Academic Network for Disaster Reduction are stressing the need for heat acclimatisation as it takes several weeks for the body to adapt to high temperatures.\nThey say the key is to start preparing for hot weather and taking measures to prevent heatstroke during the country's rainy season, before the full summer heat arrives.\nJapan also faces high humidity which makes it harder for sweat to evaporate, reducing the body's ability to cool itself.",
    "bodyJa": "東京都、男性にショートパンツを着用して出勤するよう呼び掛けているが、一部の女性は「すね毛ハラスメント」だと主張\n- 公開されました\n今年の夏は気温が上昇するため、日本の男性はこれまで以上に脚を露出して仕事をしている。\n東京都は会社員に対し、普段のスーツとネクタイをやめて、Tシャツ、トレーナー、ショートパンツといったカジュアルな服装をするよう奨励している。\n東京都の小池百合子知事は、今では毎年夏の風物詩として広く認知されている彼女の特徴的なクールダウンの取り組みをさらに拡大したいと考え、4月に「東京クールビズ」を導入した。\nほぼ4か月が経ち、オフィスポリシーで新たに許可されたショートパンツは賛否両論の評価を受けている。\nコメンテーターの中には、より快適に作業できるよう、緩和されたルールを楽しんでいる人もいます。この政策は女性にとって不公平だという人もいる。公式のルールではなく、エチケットに関するものですが、伝統的な日本のオフィス環境では、脚を露出する仕事服の場合、女性は依然としてタイツを着用することが求められています。\nまた、何人かの女性は「脚の毛ハラスメント」、または同僚の脚の毛を強制的に見られる不快さを指す「スネハラ」としてオンラインで作られた用語の経験を説明しています。\n「私たちは厳しい暑さの中で人々に、何を着るべきかを教えるのではなく、より多くの選択肢を提供したいのです。作業服が誰にとっても不快なものでない限り、問題はないはずです」と東京都環境担当官の渡辺昇氏はBBCに語った。\nゴリラクリニックが6月に実施した調査では、53.5％が夏場の通勤にショートパンツを着用することに反対し、46.5％が新たな推奨に賛成していることが判明した。\nオフィスでショートパンツに反対する人の主な理由は、男女ともに体型や体毛への懸念でした。同クリニックによると、回答では女性の数が男性を大幅に上回っており、男性同僚の生足を見ることに女性のほうが抵抗がある可能性があることが示されているという。\n近年、より多くの日本人労働者、特にスタートアップ企業やテクノロジー企業で働く人々がカジュアルな服装をするようになりました。しかし今年、東京都の勧告により、社会的に受け入れられるようになった。それでも、自分のすね毛を気にしている男性もいます。\nゴリラクリニック院長の船津昭文氏は、美容上の理由だけでなく「ショートパンツを着用する際の社会的エチケット」としてクリニックを訪れる患者が増えていることに気づいたと語る。同氏は、女性は「男性はすね毛が少ないほうがよい」と考えており、そのことが周囲を不快にさせないためにレーザー脱毛を求めるのではないかと考えている。\n日本の気温が40度を超え、初の「猛暑日」を記録\n- 1 時間前に公開\n小池氏は2005年に日本の環境大臣として初めて夏の衣替えを導入した。彼女は会社員に半袖シャツを選ぶよう奨励する「クールビズ」と呼ばれる国民的省エネキャンペーンを開始した。\n政府首脳もこの取り組みに参加し、当時の小泉純一郎首相はネクタイやジャケットを着用せずに公の場に姿を現すことが多く、この取り組みの周知に協力した。\n2011年3月の東日本大震災から数年後、政府は職場と家庭の両方でのエネルギー使用量の削減を支援するためのガイドラインを拡大した「スーパークールビズ」を開始した。\n世界の他の地域と同様、日本もここ数カ月記録的な暑さに見舞われている一方、中東情勢の不安定によるエネルギー価格の高騰に悩まされている。\n気象予報士らは今年の夏の猛暑を警告しており、気象庁は水銀40度を超える「酷暑日」を意味する「酷暑日」という言葉を発表して国民の意識を高めようとしている。\n消防庁によると、最新の週間データによると、7月6日から12日までの7日間で日本国内で7人が熱中症で死亡し、4,580人が入院した。\n政府当局が繰り返し奨励している最も基本的な行動である、水分補給とエアコンのスイッチのオンに加えて、住民は暑さをしのぐために新製品や道具に目を向けている。\nファン内蔵ウェアや使い捨ておしぼり、UVカット・遮熱傘、携帯用ハンディファンなどが好評で、全国の店舗で販売されている。\n日本防災学術ネットワークの専門家らは、体が高温に適応するには数週間かかるため、暑熱順化の必要性を強調している。\n本格的な夏の暑さが到来する前に、梅雨の時期に暑さへの備えと熱中症予防対策を始めることが重要だという。\nまた、日本は湿度が高いため、汗が蒸発しにくくなり、体の冷却能力が低下します。",

    "id": "super-micro-surges-15-on-new-order-and-m-c41aabc2",
    "title": "Super Micro surges 15% on new order and margin disclosure after SpaceX announcement",
    "titleJa": "スーパーマイクロ、スペースX発表後の新規受注とマージン開示で15％急騰",
    "summaryJa": "スーパーマイクロコンピュータの株価は、サーバーメーカーが火曜日、新規注文の急増により6月四半期の利益率が以前の予想よりも高くなる見通しであると発表した後、15％上昇した。同社は、粗利益率と調整後の粗利益率は15％から17％になるはずだと述べ、経営陣が5月に示した8.2％から8.4％の範囲からさらに引き上げた。",
    "bodyOriginal": "Shares of Super Micro Computer jumped 15% after the server maker said Tuesday it now sees higher margins than previously projected for the June quarter, with a surge in new orders.\nThe company said its gross margin and adjusted gross margin should come in between 15% and 17%, a step up from the range of 8.2% to 8.4% that management provided in May.\nThe revision is \"primarily due to a favorable customer and product mix,\" Super Micro said in a preliminary business update.\nDemand for servers containing Nvidia graphics processing units that run artificial intelligence models has been surging for Super Micro, as well as rivals Dell and Hewlett Packard Enterprise. Dell stock moved up 5% in extended trading after hours on Tuesday, while HPE gained 4%.\nIn June, Super Micro CEO Charles Liang wrote on X that he was \"proud to co-build another new Gigawatt AI datacenter for @SpaceX and @XAI within a year.\" Elon Musk's SpaceX Musk's SpaceX acquired his AI venture, xAI, in an all-stock transaction in February, and is now known as SpaceXAI. SpaceX also owns and operates social network X.\nFor the June quarter, Super Micro now expects revenue to come in at the low end of its guidance range of $11.0 billion to $12.5 billion, according to Tuesday's statement. Analysts polled by LSEG were looking for $11.67 billion.\nSuper Micro said its backlog hit record levels at the end of the 2026 fiscal year, which ended on June 30. It had received over $60 billion in new orders in the fiscal fourth quarter.\n\"These new orders are expected to be delivered over future quarters,\" the company said.\nSuper Micro expects to hold an earnings call on Aug. 11.",
    "bodyJa": "スーパーマイクロコンピュータの株価は、サーバーメーカーが火曜日、新規注文の急増により6月四半期の利益率が以前の予想よりも高くなる見通しであると発表した後、15％上昇した。\n同社は、粗利益率と調整後の粗利益率は15％から17％になるはずだと述べ、経営陣が5月に示した8.2％から8.4％の範囲からさらに引き上げた。\nスーパーマイクロは予備的な事業報告の中で、今回の改定は「主に顧客と製品の組み合わせが好調だったことによる」と述べた。\n人工知能モデルを実行する Nvidia グラフィックス プロセッシング ユニットを搭載したサーバーの需要は、競合する Dell や Hewlett Packard Enterprise だけでなく、Super Micro にとっても急増しています。 Dell株は火曜日の時間外取引で5%上昇し、HPEは4%上昇した。\n6月、Super Microの最高経営責任者（CEO）Charles Liang氏はXに「1年以内に@SpaceXと@XAIのために別の新しいギガワットAIデータセンターを共同構築できることを誇りに思う」と書いた。イーロン・マスク氏のスペースX マスク氏のスペースXは2月に彼のAIベンチャーxAIを全株式取引で買収し、現在はスペースXAIとして知られている。 SpaceX はソーシャル ネットワーク X も所有し、運営しています。\n火曜日の声明によると、スーパーマイクロは現在、6月四半期の売上高がガイダンス範囲である110億ドルから125億ドルの下限になると予想している。 LSEGがまとめたアナリスト予想は116億7000万ドルだった。\nスーパーマイクロは、6月30日に終了した2026会計年度末の受注残が過去最高水準に達したと発表した。会計年度第4四半期には600億ドルを超える新規受注があった。\n同社は「これらの新規注文は今後数四半期にわたって納品される予定だ」と述べた。\nスーパーマイクロは8月11日に決算説明会を開催する予定だ。",
