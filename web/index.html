  {
    "id": "aston-martin-secures-550m-loan-deal-e264d4a9",
    "title": "Aston Martin secures £550m loan deal",
    "titleJa": "アストンマーティン、5億5000万ポンドのローン契約を締結",
    "summaryJa": "アストンマーティン、5億5000万ポンドのローン契約を締結- 公開されました",
    "bodyOriginal": "Aston Martin secures £550m loan deal\n- Published\nAston Martin has secured £550m in loans as it attempts to boost its finances.\nThe luxury car maker has been struggling in recent years and in March announced it would cut about 600 jobs, as last year's net losses leapt by a little over 50% to £493.2m.\nThe firm has blamed the effects of US tariffs and weak demand in China.\nIts half-year results are set to be published on 29 July, but on Wednesday the firm announced loans that it said would bolster its balance sheet and fund future product plans.\nHeadquartered in Gaydon, Warwickshire, most of the job cuts were thought to affect sites in the UK, where the majority of its staff are based.\nThe company has been burning through cash and at the time it announced the job cuts, Aston Martin said the move would mean annual savings of about £40m.\nThe funding announced on Wednesday, managed by HPS Investment, includes a £450m senior secured-term loan, which means it is repayable ahead of other creditors and is backed by specific assets.\nIn addition there is a £100m delayed draw term loan, meaning the funding will be available at specific points, rather than payable upfront.\nExperts have said Aston Martin has been operating in an increasingly competitive global market in recent years and was particularly susceptible to reduced demand.\nChief financial officer Doug Lafferty said in a statement: \"This new £550m debt financing significantly strengthens our liquidity, providing us with both additional resilience and further flexibility to execute our current and future product plans.\"\nGet in touch\nTell us which stories we should cover in Warwickshire\nFollow BBC Coventry & Warwickshire on BBC Sounds, Facebook, external, X, external and Instagram, external.\nRelated topics\n- Published1 March\n- Published25 February\n- Published6 October 2025",
    "bodyJa": "アストンマーティン、5億5000万ポンドのローン契約を締結\n- 公開されました\nアストンマーティンは財務強化を図るため、5億5000万ポンドの融資を確保した。\nこの高級車メーカーは近年苦戦しており、昨年の純損失が50％強増の4億9,320万ポンドに達したため、3月には約600人の人員削減を発表した。\n同社は米国の関税の影響と中国の需要低迷が原因だと主張している。\n上半期決算は7月29日に発表される予定だが、同社は水曜日、バランスシートを強化し将来の製品計画に資金を提供する融資を発表した。\nウォリックシャー州ゲイドンに本社を置く同社は、人員削減のほとんどが従業員の大半が拠点を置く英国の拠点に影響を及ぼすと考えられている。\n同社は資金を使い果たしており、人員削減を発表した時点でアストンマーティンは、この措置により年間約4,000万ポンドの節約になると述べていた。\n水曜日に発表されたHPSインベストメントが管理する資金調達には4億5000万ポンドの優先有担保タームローンが含まれており、これは他の債権者に先駆けて返済可能であり、特定の資産に裏付けられていることを意味する。\nさらに、1億ポンドの遅延ドロータームローンがあり、これは資金が前払いではなく特定の時点で利用可能になることを意味します。\n専門家らは、アストンマーティンは近年、競争が激化する世界市場で事業を展開しており、特に需要減少の影響を受けやすいと述べている。\nダグ・ラファティ最高財務責任者（ＣＦＯ）は声明で「この新たな５億５０００万ポンドの借入により当社の流動性は大幅に強化され、現在および将来の製品計画を実行するための更なる回復力とさらなる柔軟性が得られる」と述べた。\n連絡する\nウォリックシャーで取り上げるべきストーリーを教えてください\nBBC コベントリーとウォリックシャーを BBC Sounds、Facebook (外部)、X (外部)、Instagram (外部) でフォローしてください。\n関連トピック\n- 3 月 1 日に公開\n- 2 月 25 日発行\n- 2025 年 10 月 6 日発行",

    "id": "former-lloyd-s-of-london-boss-s-relation-cd4dec8f",
    "title": "Former Lloyd's of London boss's relationship breached rules, firm says",
    "titleJa": "ロイズ・オブ・ロンドンの元社長との関係は規則違反だった、と会社が発表",
    "summaryJa": "ロイズ・オブ・ロンドンの元社長との関係は規則違反だった、と会社が発表- 公開されました",
    "bodyOriginal": "Former Lloyd's of London boss's relationship breached rules, firm says\n- Published\nLloyd's of London's former boss's close relationship with another director breached compliance rules, the insurance market has said after an internal investigation.\nFormer chief executive John Neal and former corporate affairs director Rebekah Clement's relationship was \"sufficiently close... that it could be viewed as creating a perceived conflict of interest\", the firm said.\nLloyd's said the pair breached compliance rules by not disclosing their relationship but found no conclusive evidence they had a romantic relationship while at Lloyd's.\nNeal said all parties can now move on. Clement's lawyer said she is considering legal action.\n\"Rebekah is hugely disappointed with Lloyd's conduct over the course of this investigation, the nature and length of which have caused her unnecessary stress and significant reputational damage relative to its 'findings',\" Clement's lawyer added.\n\"She is not surprised that Lloyd's found no evidence of an inappropriate relationship with John Neal, nor any evidence of any failings in her promotion. She also co-operated with the investigation throughout.\n\"Yet, Lloyd's has still chosen to find against Rebekah, on the pretext of 'perception', the source of which was rumour, gossip and innuendo.\"\nNeal said: \"I am pleased, but not at all surprised, that the investigation found there was no inappropriate relationship.\n\"I would have hoped less time and resource had been spent in reaching a conclusion on the central question that was, in truth, never in doubt.\n\"I am disappointed with the other findings and do not accept them.\"\nLloyd's said on Wednesday that it first received \"certain whistleblowing reports\" in November 2023 but that it didn't act on them.\nIt said its chairman Sir Charles Roxburgh judged this to be a governance failure and informed the Financial Conduct Authority (FCA) about it in October 2025.\nLloyd's said it could not share the nature of these allegations or the identities of the people involved.\nIn November 2025, Lloyd's said Sir Charles became aware of \"new information related to an alleged personal relationship\" between Neal and Clement and \"immediately launched an expanded investigation into the matter\".\nLloyd's said its investigation was hampered by the fact that Neal and Clement had both left the company and refused to answer questions, but Lloyd's said it interviewed nearly 40 witnesses in its probe.\nIt added that it has kept the FCA informed throughout the process.\nSir Charles said on Wednesday: \"Based on the findings of this investigation, we have concluded that the conduct of the former chief executive fell significantly below the standards expected of him.\"\nHe added the investigation \"established serious failings in the governance standards and in following processes, most worryingly in the handling of whistleblowing reports. These were serious failures that should never have been allowed to happen.\"\nLloyd's history as a City institution stretches back well over 300 years, with its first recorded mention appearing in 1688.\nRelated topics\n- Published8 November 2023",
    "bodyJa": "ロイズ・オブ・ロンドンの元社長との関係は規則違反だった、と会社が発表\n- 公開されました\nロイズ・オブ・ロンドンの元社長と別の取締役との親密な関係がコンプライアンス規定に違反していたと保険市場が内部調査の結果発表した。\n同社は、元最高経営責任者ジョン・ニール氏と元企業業務部長レベッカ・クレメント氏の関係は「利益相反を生じさせているとみなされるほど十分に緊密だった」と述べた。\nロイズは、二人が関係を公表しなかったことはコンプライアンス規則に違反したが、ロイズ在籍中にロマンチックな関係があった決定的な証拠は見つからなかったと述べた。\nニール氏は、これですべての当事者が先に進むことができると述べた。クレメントさんの弁護士は、法的措置を検討していると述べた。\n「レベッカは、この捜査の過程におけるロイドの行為に非常に失望している。捜査の性質と長さが、彼女に不必要なストレスを与え、その『調査結果』に関連して重大な評判を傷つけた」とクレメントの弁護士は付け加えた。\n「彼女は、ロイズ社がジョン・ニールとの不適切な関係の証拠も、彼女の昇進に何らかの失敗があったという証拠も見つけられなかったことには驚かなかった。また、彼女は捜査にも全面的に協力した。\n「それでもロイド社は、噂、ゴシップ、ほのめかしを源とした『思い込み』を口実に、レベッカを告発することを選んだのです。」\nニールさんは「調査の結果、不適切な関係がなかったことが判明したことには満足しているが、まったく驚いてはいない」と述べた。\n「実のところ、決して疑いの余地のない中心的な問題について結論を出すのに、もっと短い時間とリソースが費やされていればよかったと思う。\n「他の調査結果には失望しており、受け入れられません。」\nロイズは水曜日、2023年11月に初めて「特定の内部告発報告」を受け取ったが、それに基づいて行動しなかったと述べた。\n同会長のチャールズ・ロクスバーグ卿はこれをガバナンスの失敗と判断し、2025年10月に金融行動監視機構（FCA）に通知したと述べた。\nロイズは、これらの申し立ての内容や関係者の身元については共有できないと述べた。\nロイズ社は、2025年11月にチャールズ卿がニールとクレメントの「個人的関係の疑いに関する新たな情報」に気づき、「ただちにこの件について拡大調査を開始した」と述べた。\nロイズは、ニール氏とクレメント氏がともに退職し、質問に答えることを拒否したという事実により捜査が妨げられたと述べたが、ロイズは捜査の過程で４０人近くの証人に聞き取りを行ったと述べた。\nプロセス全体を通してFCAに情報を提供し続けたと付け加えた。\nチャールズ卿は水曜日、「今回の調査結果に基づき、元最高経営責任者の行為は期待される基準を大幅に下回っていたと結論付けた」と述べた。\n同氏はさらに、今回の調査で「ガバナンス基準とその後のプロセスに重大な欠陥があったことが明らかになり、最も憂慮すべきは内部告発の扱いにある」と付け加えた。これらは決して許されるべきではなかった重大な失敗でした。」\n市の施設としてのロイドの歴史は 300 年以上に遡り、記録に初めて記載されたのは 1688 年です。\n関連トピック\n- 2023 年 11 月 8 日公開",

    "id": "tesla-set-to-report-second-quarter-resul-e4c997a2",
    "title": "Tesla set to report second-quarter results after the bell",
    "titleJa": "テスラ、鐘の後に第2四半期決算を発表予定",
    "summaryJa": "テスラは、車両納入台数が前年比25％増加したと報告してから3週間後、水曜日の鐘の後に第2四半期決算を発表する予定だ。LSEGが調査したアナリストの推計によると、ウォール街は次のように予想している。",
    "bodyOriginal": "Tesla is set to announce second-quarter results after the bell on Wednesday, three weeks after reporting a 25% year-over-year increase in vehicle deliveries.\nHere's what Wall Street expects, according to estimates from analysts polled by LSEG:\n- Earnings per share: 51 cents expected\n- Revenue: $25.71 billion expected\nTesla's earnings report lands in the midst of a steep decline in its stock price, which is down about 10% this month and 16% for the year. That slide has coincided with a drop in SpaceX, Elon Musk's other trillion-dollar company, which held a record market debut in June and has lost almost 40% of its value since its peak close.\nFor Tesla, the dip has come despite signs of a rebound in its core auto business. In early July, the company reported vehicle deliveries that topped 480,000, exceeding exceeding analysts' expectations.\nTesla is trying to recover from consecutive years of declining deliveries, largely due to competition from Chinese automakers, including BYD, Nio and Xiaomi, that are offering affordable but high-tech EVs in markets beyond the U.S. Some car buyers have boycotted Tesla in response to Musk's incendiary political rhetoric and work with the Trump administration.\nSoaring gas prices resulting from the U.S. war in Iran boosted Tesla sales in the first half of the year, with European car buyers purchasing more EVs.\nIn the second-quarter, Tesla started selling lower-cost versions of its Model 3 and Model Y vehicles, and made its premium driver assistance system, marketed as Full Self-Driving (Supervised) in the U.S., available in some European markets.\nBut Musk has shifted the focus of the company away from vehicle sales and toward its driverless Robotaxi service, ramping production of the company's driverless Cybercab, and remaking older factory lines in Fremont, California, to start manufacturing Optimus humanoid robots. He's promised shareholders and fans an AI-powered robot that will be able to step in as a babysitter, factory worker or world-class surgeon.\n\"I think Optimus will be our biggest product, not just Tesla's biggest product ever, but probably the biggest product ever,\" Musk said on the company's last earnings call in April.\nPaul Miller, an analyst at Forrester, told CNBC in an email that Tesla leadership has made \"plenty of big claims about autonomous mobility and physical AI over the years,\" but missed on some \"bolder bets.\"\nMusk told investors in 2019 that there would be 1 million Tesla robotaxis on the road by 2020. Last year, he said the company's autonomous ride-hailing services would cover \"probably half the population of the U.S.\" by the end of 2025. And at the World Economic Forum in Davos earlier this year, Musk said Tesla Robotaxis would be \"very, very widespread\" domestically by the end of this year, a target that remains far off.\nIn robotaxis, Tesla is way behind Alphabet's Waymo in the U.S. and Baidu's Apollo Go in China. And in the humanoid robot market, where Tesla is still developing its product, the company faces competition from companies including China's Unitree, Boston Dynamics, Agility Robotics, Apptronik and London-based startup Humanoid.\nOn Wednesday's conference call, investors will be looking for updates on robotics and driverless technology, and how Musk expects Tesla and SpaceX to work together, including on Terafab, a massive chip factory the companies plan to jointly build and run with Intel in Texas.",
    "bodyJa": "テスラは、車両納入台数が前年比25％増加したと報告してから3週間後、水曜日の鐘の後に第2四半期決算を発表する予定だ。\nLSEGが調査したアナリストの推計によると、ウォール街は次のように予想している。\n- 1 株当たり利益: 51 セントの予想\n- 収益: 257 億 1,000 万ドルの見込み\nテスラの決算報告は株価の急落の真っただ中にあり、今月は約10％、年間では約16％下落した。この下落はイーロン・マスク氏のもう一つの兆ドル企業であるスペースXの下落と同時に起きた。スペースXは6月に記録的な市場デビューを果たし、最高値終値以来その価値の約40％を失った。\nテスラにとっては、中核の自動車事業に回復の兆しがあるにもかかわらず、落ち込みが生じた。同社は7月上旬、納車台数が48万台を超え、アナリストの予想を上回ったと報告した。\nテスラは、長年にわたる納車台数の減少から回復しようとしているが、これは主に、米国外の市場で手頃な価格ながらハイテクなEVを提供しているBYD、ニオ、シャオミなどの中国自動車メーカーとの競争によるものである。一部の自動車購入者は、マスク氏の扇動的な政治的発言やトランプ政権への協力に反発して、テスラをボイコットしている。\n米国のイラン戦争によるガソリン価格の高騰により、欧州の自動車購入者がより多くのEVを購入し、今年上半期のテスラの販売が増加した。\n第2四半期にテスラは、モデル3とモデルYの低価格バージョンの販売を開始し、米国では完全自動運転（監視付き）として販売されているプレミアム運転支援システムを一部の欧州市場でも利用できるようにした。\nしかしマスク氏は同社の焦点を車両販売から無人ロボタクシーサービスに移し、無人サイバーキャブの生産を増やし、カリフォルニア州フリーモントの古い工場ラインを作り直してオプティマス人型ロボットの製造を開始した。彼は株主やファンに対し、ベビーシッター、工場労働者、あるいは世界クラスの外科医として活躍できるAI搭載ロボットを約束した。\n「オプティマスは当社の最大の製品になると思う。テスラ史上最大の製品というだけでなく、おそらく史上最大の製品になるだろう」とマスク氏は4月の最後の決算会見で語った。\nフォレスター社のアナリスト、ポール・ミラー氏はCNBCに電子メールで、テスラの経営陣は「長年にわたって自動運転モビリティと物理的AIについて多くの大きな主張」をしてきたが、いくつかの「大胆な賭け」を逃してきたと語った。\nマスク氏は2019年に投資家に対し、2020年までに100万台のテスラロボタクシーが走行するようになると語った。昨年、同社の自動運転配車サービスは「おそらく米国の人口の半分」をカバーすると述べた。そして今年初めにダボスで開催された世界経済フォーラムでマスク氏は、テスラ・ロボタクシーが今年末までに国内で「非常に普及する」だろうと述べたが、その目標は依然として遠い。\nロボタクシーの分野では、テスラは米国のアルファベットのウェイモや中国の百度のアポロゴーに大きく遅れをとっている。そして、テスラが製品開発を続けている人型ロボット市場では、同社は中国のユニツリー、ボストン・ダイナミクス、アジリティ・ロボティクス、アプトロニック、ロンドンを拠点とする新興企業ヒューマノイドなどの企業との競争に直面している。\n水曜日の電話会議で、投資家らはロボット工学や無人運転技術に関する最新情報や、テスラとスペースXがテキサス州でインテルと共同で建設・運営する予定の巨大チップ工場「テラファブ」など、テスラとスペースXがどのように協力することをマスク氏が期待しているかについての最新情報を求めているだろう。",

  {
    "id": "houthis-deploy-missiles-and-drones-to-at-044ec1db",
    "title": "Houthis deploy missiles and drones to attack ships in southern Red Sea, naval group says",
    "titleJa": "フーシ派が紅海南部の船舶を攻撃するためにミサイルと無人機を配備、海軍グループが発表",
    "summaryJa": "イエメンに駐留するイランのフーシ派同盟国は、紅海の南側のアクセスポイントを通過する船舶を攻撃する準備を完了したと、米海軍率いる海洋治安部隊が警告した。「組織に近い関係者は、フーシ派がバブ・エル・マンデブ付近にミサイルや無人機を配備するなど、船舶を攻撃する準備を完了したと述べた」と共同海事情報センター（JMIC）は火曜日の通告で船員らに伝えた。このセンターはバーレーンに本部を置き、中東の商船にセキュリティ更新プログラムを提供しています。",
    "bodyOriginal": "Iran's Houthi allies in Yemen have completed preparations to attack ships transiting the Red Sea's southern access point, a maritime security group led by the U.S. Navy has warned.\n\"Sources close to the group stated that the Houthis have completed preparations to attack shipping, including the deployment of missiles and drones positioned near Bab el-Mandeb,\" the Joint Maritime Information Center, or JMIC, told mariners in a notice Tuesday. The center, headquartered in Bahrain, provides security updates to commercial ships in the Middle East.\nThe Houthis have repeatedly threatened to close the Bab el-Mandeb Strait during the U.S.-Iran war. The strait connects the Red Sea to the Gulf Aden, the Arabian Sea and global markets.\nThe militants declared a maritime embargo against Saudi Arabia on Monday, threatening to cut off the kingdom's oil exports through the Red Sea and Bab el-Mandeb. Those exports have acted as a crucial relief valve for global oil markets as Iran attacks tankers in the Strait of Hormuz.\nRiyadh has diverted millions of barrels per day of oil through a pipeline to the Yanbu terminal on the Red Sea. Exports from that terminal through the Bab el-Mandeb surged to 3.5 million barrels per day in June compared with just 240,000 bpd in the same period last year, according to Kpler data.\nCommercial traffic has continued through the southern Red Sea and Bab el-Mandeb with no attacks in the past two days, the JMIC said Tuesday. The threat to ships in the area remains \"moderate,\" it said.\n\"No changes to commercial routing or transit patterns occurred, and vessels continued to use established lanes without disruption,\" the JMIC said.\nShip tracking firm Kpler, however, observed a 34% decline in traffic through the Bab el-Mandeb on Tuesday compared with Monday, when the Houthis declared the embargo against the Saudis.\nFour tankers with Saudi cargo turned around before reaching Bab el-Mandeb on Tuesday, according to the maritime intelligence firm Windward. The ships are carrying 3.8 million barrels of crude oil, gasoil and naphtha, the firm said.\nIran, meanwhile, has stepped up its attacks on tankers in Hormuz as it tries to force vessels to transit the strait through its territorial waters. Three crude oil, products and chemical tankers have come under attack off the coast of Oman and the United Arab Emirates this week.\nA dozen ships have been attacked in and around Hormuz since July 6, resulting in the deaths of two seafarers and more than a dozen injuries, according to the International Maritime Organization, a United Nations agency.",
    "bodyJa": "イエメンに駐留するイランのフーシ派同盟国は、紅海の南側のアクセスポイントを通過する船舶を攻撃する準備を完了したと、米海軍率いる海洋治安部隊が警告した。\n「組織に近い関係者は、フーシ派がバブ・エル・マンデブ付近にミサイルや無人機を配備するなど、船舶を攻撃する準備を完了したと述べた」と共同海事情報センター（JMIC）は火曜日の通告で船員らに伝えた。このセンターはバーレーンに本部を置き、中東の商船にセキュリティ更新プログラムを提供しています。\nフーシ派は米国とイランの戦争中にバブ・エル・マンデブ海峡を封鎖すると繰り返し脅迫してきた。この海峡は紅海とアデン湾、アラビア海、そして世界市場を結んでいます。\n武装勢力は月曜日、サウジアラビアに対する海上禁輸を宣言し、紅海とバブ・エル・マンデブを通じたサウジの石油輸出を遮断すると脅した。イランがホルムズ海峡でタンカーを攻撃する中、これらの輸出は世界の石油市場にとって重要な救援弁として機能してきた。\nリヤドは日量数百万バレルの石油をパイプラインを通じて紅海のヤンブーターミナルに輸送している。 Kplerのデータによると、バブ・エル・マンデブを通る同ターミナルからの輸出量は、前年同期の日量わずか24万バレルに対し、6月には日量350万バレルまで急増した。\nJMICは火曜日、紅海南部とバブ・エル・マンデブを通る商業交通は過去2日間攻撃を受けずに続いていると発表した。同海域の船舶に対する脅威は依然として「中程度」であると述べた。\nJMICは「商業航路や輸送パターンに変更はなく、船舶は混乱なく確立された航路を使用し続けた」と述べた。\nしかし、船舶追跡会社Kplerは、フーシ派がサウジへの通商禁止を宣言した月曜日と比較して、火曜日にはバブ・エル・マンデブを通過する交通量が34％減少したことを観測した。\n海事情報会社ウィンドワードによると、サウジアラビアの貨物を積んだタンカー４隻が火曜日、バブ・エル・マンデブに到着する前に引き返した。同社によると、これらの船は380万バレルの原油、軽油、ナフサを積んでいるという。\n一方、イランはホルムズのタンカーへの攻撃を強化し、船舶に領海海峡の通過を強制しようとしている。今週、オマーンとアラブ首長国連邦の沖合で原油、製品、ケミカルタンカー３隻が攻撃を受けた。\n国連機関である国際海事機関によると、7月6日以降、ホルムズとその周辺で十数隻の船舶が攻撃され、船員2名が死亡、十数名が負傷した。",

    "id": "amd-to-invest-up-to-5-billion-in-anthrop-e4a0bbc6",
    "title": "AMD to invest up to $5 billion in Anthropic as part of computing power deal",
    "titleJa": "AMD、コンピューティングパワー取引の一環としてAnthropicに最大50億ドル投資へ",
    "summaryJa": "Advanced Micro Devicesは水曜日、Anthropicとの戦略的提携を発表し、「将来的には」この人工知能企業に最大50億ドルを投資すると発表した。契約の一環として、アンスロピックはAMD Heliosラックスケールソリューションに2ギガワットのAMD Instinct MI450シリーズグラフィックスプロセッシングユニット（GPU）を導入するとチップメーカーは述べた。リリースによると、AI データセンターの容量を表す一般的な基準となっている電力の単位である最初のギガワットは、来年前半に導入される予定です。",
    "bodyOriginal": "Advanced Micro Devices on Wednesday announced a strategic partnership with Anthropic and said it will invest up to $5 billion in the artificial intelligence company \"in the future.\"\nAs part of the deal, the chipmaker said Anthropic will deploy 2 gigawatts of its AMD Instinct MI450 Series graphics processing units, or GPUs, in AMD Helios rack-scale solutions. The first gigawatt, a measure of power that's become a common metric for describing AI data center capacity, will be deployed in the first half of next year, according to a release.\n\"We are thrilled to deepen our partnership with Anthropic and deploy AMD Helios at gigawatt scale,\" AMD CEO Lisa Su said in a statement.\nAMD has been one of the major beneficiaries of the AI boom because it's one of the companies that makes the GPUs that can train models and run large workloads. It competes directly with Nvidia, which dominates the market, but it has inked deals with a number of high-profile players in the industry, including Anthropic's rival OpenAI.\nAs part of that arrangement, AMD issued OpenAI a warrant for up to 160 million shares of AMD common stock, equivalent to roughly 10% of the company, with vesting milestones tied to both deployment volume and AMD's share price.\nAnthropic's agreement with AMD is the latest in a string of infrastructure deals the company has announced this year as it works to increase its computing capacity. The company said in April that demand for its Claude models and products has caused \"inevitable strain\" on its infrastructure, which impacted \"reliability and performance\" for its users, especially during peak hours.\nIn May, Anthropic forged a deal with Elon Musk's SpaceX to use all of the compute capacity at his company's Colossus 1 data center in Memphis, Tennessee. Anthropic will pay SpaceX $1.25 billion per month through May 2029 as part of that deal, according to SpaceX's prospectus.\nThe company inked a multi-billion-dollar agreement with Amazon, as well as a multi-gigawatt compute agreement with Google and Broadcom, in April. Anthropic is also in preliminary talks to lease computing power from Meta, as CNBC previously reported.\nAnthropic has experienced explosive growth this year, partly because of the success of its popular AI coding assistant, Claude Code. It said in May that its run-rate revenue topped $47 billion, up from the roughly $10 billion in revenue that it generated over the entirety of last year.\nThe company closed a funding round at a $965 billion valuation that same month, and is gearing up for a potentially massive IPO that could land as soon as this year. Anthropic confidentially filed its prospectus with the Securities and Exchange Commission in June, but has yet to disclose any additional plans.",
    "bodyJa": "Advanced Micro Devicesは水曜日、Anthropicとの戦略的提携を発表し、「将来的には」この人工知能企業に最大50億ドルを投資すると発表した。\n契約の一環として、アンスロピックはAMD Heliosラックスケールソリューションに2ギガワットのAMD Instinct MI450シリーズグラフィックスプロセッシングユニット（GPU）を導入するとチップメーカーは述べた。リリースによると、AI データセンターの容量を表す一般的な基準となっている電力の単位である最初のギガワットは、来年前半に導入される予定です。\nAMD CEOのLisa Su氏は声明で、「Anthropicとのパートナーシップを深め、ギガワット規模でAMD Heliosを展開できることに興奮している」と述べた。\nAMD は、モデルをトレーニングして大規模なワークロードを実行できる GPU を製造している企業の 1 つであるため、AI ブームの大きな受益者の 1 つです。同社は市場を支配する Nvidia と直接競合しているが、Anthropic のライバルである OpenAI など、業界の多くの著名な企業と契約を結んでいる。\nその取り決めの一環として、AMDはOpenAIに対し、同社の約10％に相当する最大1億6,000万株のAMD普通株の新株予約権を発行し、権利確定マイルストーンは展開量とAMDの株価の両方に関連付けられた。\nAnthropicとAMDとの契約は、同社がコンピューティング能力の向上に向けて今年発表した一連のインフラストラクチャ契約の最新のものである。同社は4月、クロードのモデルと製品に対する需要がインフラストラクチャに「避けられない負担」を引き起こしており、特にピーク時のユーザーの「信頼性とパフォーマンス」に影響を与えていると述べた。\n5月、アンスロピックはイーロン・マスク氏のスペースXと、テネシー州メンフィスにある同社のコロッサス1データセンターのすべての計算能力を使用する契約を結んだ。 SpaceXの目論見書によると、Anthropicはその契約の一環として、2029年5月までSpaceXに月額12億5000万ドルを支払う予定だという。\n同社は4月にAmazonと数十億ドル規模の契約を結び、GoogleおよびBroadcomと数ギガワットのコンピューティング契約を結んだ。 CNBCが以前報じたように、AnthropicはMetaからコンピューティングパワーをリースするための予備交渉も行っている。\nAnthropic は今年、人気の AI コーディング アシスタントである Claude Code の成功もあり、爆発的な成長を遂げました。同社は5月、ランレート収益が470億ドルを超え、昨年全体で約100億ドルだった収益を上回ったと発表した。\n同社は同月、評価額9,650億ドルで資金調達ラウンドを終了し、早ければ今年中に実現する可能性のある大規模なIPOに向けて準備を進めている。アンスロピックは6月に証券取引委員会に目論見書を極秘に提出したが、追加の計画はまだ明らかにしていない。",

    "id": "ex-southern-water-boss-among-four-charge-bca59bc3",
    "title": "Ex-Southern Water boss among four charged over alleged plan to manipulate water tests",
    "titleJa": "水質検査操作の疑いで起訴された4人のうちの元サザン・ウォーター責任者",
    "summaryJa": "水質検査操作の疑いで起訴された4人のうちの元サザン・ウォーター責任者- 公開されました",
    "bodyOriginal": "Ex-Southern Water boss among four charged over alleged plan to manipulate water tests\n- Published\nThe former chief executive of Southern Water has been charged alongside three others over an alleged plan to manipulate water quality tests to avoid paying millions of pounds in penalties, it can now be reported.\nMatthew Wright is accused of conspiring to defraud the Environment Agency (EA) and water regulator Ofwat between 2012 and 2017 along with Philip Barker, Clive Massey and Mark Gregory, who also worked at the company.\nThe EA previously asked a judge to issue a summons against Wright and the others charging them with the offence.\nWright's solicitor said his client \"denies all wrongdoing and has co-operated fully with the Environment Agency's investigation\".\nThe summons was issued last year but Wright launched a legal challenge which was dismissed by two senior judges on Wednesday.\nWright's lawyers told the High Court in June that the EA did not have the power to issue the summons and it should be thrown out.\nBut the judges dismissed his claim and ruled restrictions previously preventing reporting of the legal challenge should be lifted.\nSeparate court listings showed the case against 60-year-old Wright, of Haslemere, Surrey, Barker, 57, of West Chiltington, West Sussex, 64-year-old Massey, of Brandhill, Shropshire, and 63-year-old Gregory, of Southampton, were scheduled to be heard at Medway Magistrates' Court on 14 July.\nThe four are accused of conspiring between 2012 and 2017 to defraud those conducting the environmental and financial regulation duties of Southern Water, including the EA and Ofwat, by \"the implementation of artificial no-flow events at wastewater treatment works\".\nThe court listings show Southern Water has separately been charged with dozens of offences of failing to comply with or contravening an environmental permit condition between 2013 and 2017 at multiple wastewater treatment works.\nWastewater treatment works can only be run with an environmental permit issued by the EA.\nTreated effluent discharge from the works is tested under an \"operator self-monitoring\" (OSM) scheme, introduced in 2009, with discharges tested annually in unannounced visits.\nThe tests are carried out by sampling teams, which operate separately from teams that run the works.\nThe results of the tests are shared with the EA and Ofwat, and can lead to penalties if the works do not comply with the terms of their permits.\nIf the discharge flow at the time of the test is insufficient to take a sample, it is not regarded as a fail, and no samples are taken for the rest of the testing period.\nRules around OSM have been tightened in the past year, including that samples must be rescheduled in the event that the flow is insufficient, with the current Labour government pledging to end the practice.\nIssuing the summons against the four men last year, District Judge Stephen Leake said the EA alleged there had been \"a deliberate plan by officers of the company to manipulate the OSM regime\".\nThis was done by \"contriving operational circumstances\" so there was no flow when it was believed the site might fail the OSM test, \"in order to avoid the consequences of the true OSM result being provided to the agency and Ofwat\".\nLawyers for Wright previously argued the EA only had the power to bring private prosecutions for environmental offences, not fraud or conspiracy.\nBut EA barristers said it had a general power to bring private prosecutions, and alternatively that allegations of conspiracy to defraud were connected to its functions.\nMassey, Gregory and Barker did not appear at the hearing in London and were not represented.\nLord Justice Popplewell, sitting with Mr Justice Hilliard, ruled on Wednesday that the EA only being able to prosecute environmental offences would \"produce unreasonable and anomalous results\".\nHe said the law \"enables the EA to prosecute for any offence of any nature in circumstances in which such a prosecution is capable of being calculated to facilitate, or conducive or incidental to, the carrying out of any of its functions\".\nIn the 48-page judgment, he said the charge against Wright involves \"very serious allegations of criminal misconduct\".\nHe said: \"What is alleged … involves carefully planned and extensive fraud and dishonesty at a high level within the company and on a large scale, including, for example, arranging for wastewater to be removed from facilities by tankers in order to create no flow results, with a view to covering up pollution and deceiving those whose function is to protect the public from such harm.\n\"The EA says that by the company's own assessment, it avoided penalties of the order of £45m, and on the EA's assessment the figure is higher.\"\nFollowing the judgment, an EA spokesperson said: \"We can confirm that we are taking criminal proceedings against Southern Water Services Limited and a number of former employees.\n\"We take our responsibility to protect the environment very seriously and will always pursue and prosecute those alleged to have committed serious offending against the environment. We welcome this important judgment.\"\nThree people have also been charged with failing to comply with or contravening an environmental permit condition.\nTerry Stephens, 68, of Waterlooville, Hampshire, is charged with one count, alleged to have taken place in 2015.\nDavid James, 60, of Worthing, West Sussex, is also charged with one count, alleged to have taken place in 2016.\nMark Butler, 47, of Hassocks, West Sussex, is charged with eight counts, alleged to have taken place between 2015 and 2024.\nGet in touch\nYour Voice",
    "bodyJa": "水質検査操作の疑いで起訴された4人のうちの元サザン・ウォーター責任者\n- 公開されました\nサザン・ウォーターの元最高経営責任者は、数百万ポンドの罰金の支払いを回避するために水質検査を操作する計画の疑いで、他の3人とともに起訴されたとの報道がなされた。\nマシュー・ライト容疑者は、同じく同社で働いていたフィリップ・バーカー氏、クライブ・マッシー氏、マーク・グレゴリー氏とともに、2012年から2017年にかけて環境庁（EA）と水道規制当局オフワトをだまし取ろうと共謀した疑いで起訴されている。\nEAは以前、裁判官に対し、ライト氏らに対し違反罪で告発する召喚状を発行するよう要請していた。\nライトさんの弁護士は、依頼人は「すべての不正行為を否定しており、環境庁の調査に全面的に協力している」と述べた。\n召喚状は昨年発行されたが、ライト氏は法的異議申し立てを開始したが、水曜日に上級判事2名によって却下された。\nライト氏の弁護士は6月に高等法院に対し、EAには召喚状を発行する権限がないため、召喚状を破棄すべきであると述べた。\nしかし、裁判官は彼の主張を却下し、これまで法的異議申し立ての報道を妨げていた制限は解除されるべきであるとの判決を下した。\n別の裁判所リストによると、サリー州ハスルミア在住のライト60歳、ウェスト・サセックス州ウェストチルティントン在住のバーカー57歳、シュロップシャー州ブランドヒル在住のマッセイ64歳、サウサンプトン在住のグレゴリー63歳に対する訴訟が、7月14日にメドウェイ治安判事裁判所で審理される予定となっている。\n4人は2012年から2017年にかけて共謀し、EAやオフワットを含むサザン・ウォーターの環境・財務規制業務を遂行する組織に対し、「廃水処理施設での人為的な流量停止イベントの実施」によって詐欺を働いた疑いで起訴されている。\n裁判所のリストによると、サザン・ウォーターは2013年から2017年にかけて、複数の下水処理施設で環境許可条件を遵守しなかったり、環境許可条件に違反したりした数十件の犯罪で個別に起訴されている。\n廃水処理事業は、EA が発行した環境許可がなければ実行できません。\n工場からの処理排水の排出は、2009 年に導入された「オペレーター自己監視」(OSM) スキームに基づいてテストされており、毎年抜き打ち訪問で排出がテストされます。\nテストはサンプリング チームによって実行されます。サンプリング チームは、作業を実行するチームとは別に運営されます。\nテストの結果は EA および Ofwat と共有され、作品が許可条件に準拠していない場合には罰則が科される可能性があります。\n試験時の吐出流量がサンプル採取に不十分な場合は不合格とみなされず、残りの試験期間中サンプルは採取されません。\nOSMに関する規則は過去1年で厳格化され、流量が不十分な場合にはサンプルのスケジュールを変更しなければならないなど、現在の労働党政権はこの慣行を廃止すると約束している。\n昨年4人に対して召喚状を発行したスティーブン・リーク地方判事は、EAは「OSM体制を操作するための会社役員による意図的な計画」があったと主張した。\nこれは「運用状況を工夫」することによって行われたため、サイトが OSM テストに不合格になる可能性があると考えられた場合には、「政府機関と Ofwat に提供される真の OSM 結果の結果を回避するために」フローは存在しませんでした。\nライト氏の弁護士らは以前、EAには環境犯罪についてのみ民間訴追する権限があり、詐欺や陰謀ではないと主張していた。\nしかし、EAの法廷弁護士らは、EAには私的訴追を起こす一般的な権限があり、あるいは詐欺の共謀疑惑はその機能に関連していると述べた。\nマッシー氏、グレゴリー氏、バーカー氏はロンドンでの公聴会に現れず、代理人も出なかった。\nポップルウェル判事は水曜日、ヒリアード判事と同席し、EAが環境犯罪のみを訴追できることは「不合理で異常な結果をもたらす」との判決を下した。\n同氏は、この法律により「EAは、その職務の遂行を容易にする、あるいは遂行に寄与する、あるいは付随する訴追が計算される状況において、いかなる性質の犯罪でも訴追することができる」と述べた。\n48ページにわたる判決文の中で同氏は、ライトに対する告発には「刑事上の違法行為に関する非常に重大な申し立て」が含まれていると述べた。\n同氏は、「申し立てられている内容には、社内の高いレベルおよび大規模な、慎重に計画された広範な詐欺と不正行為が含まれており、その中には、例えば、汚染を隠蔽し、そのような被害から国民を保護する役割を担っている人々を欺くことを目的として、排水を流さないようにタンカーで施設から廃水を除去する手配が含まれている。」\n「EAは、会社自身の評価によれば、4,500万ポンド程度の罰金を回避できたと述べているが、EAの評価ではその数字はさらに高くなっている。」\n判決を受けてEAの広報担当者は「サザン・ウォーター・サービス・リミテッドと多数の元従業員に対して刑事訴訟を起こしていることを確認できる」と述べた。\n「私たちは環境を保護する責任を非常に真剣に受け止めており、環境に対して重大な違反を犯したとされる人々を常に追求し、起訴するつもりです。私たちはこの重要な判決を歓迎します。」\n3人も環境許可条件を遵守しなかったか、環境許可条件に違反したとして起訴された。\nハンプシャー州ウォータールービル在住のテリー・スティーブンスさん（68歳）は、2015年に起きたとして1件の罪で起訴されている。\nウェストサセックス州ワージングのデイビッド・ジェームスさん（60）も、2016年に起きたとされる1件の罪で起訴されている。\nウェストサセックス州ハソックス在住のマーク・バトラー容疑者（47歳）は、2015年から2024年の間に起きたとして8件の罪で起訴されている。\n連絡する\nあなたの声",

    "id": "sen-wyden-introduces-bill-to-curb-trump-36ec51b2",
    "title": "Sen. Wyden introduces bill to curb Trump's tariff powers",
    "titleJa": "ワイデン上院議員、トランプ大統領の関税権限を抑制する法案を提出",
    "summaryJa": "オレゴン州民主党のロン・ワイデン上院議員は水曜日、輸入関税を設定するための法定手段の一部を削除し、残っているものに対する議会の発言権を高めることで、ドナルド・トランプ大統領の広範な関税権限を抑制する法案を提出した。ワイデン氏は、約1世紀前に制定された通商法が発動されたことがほとんどないことを理由に、幅広いカナダ製品に50％の報復関税を発表したトランプ大統領を非難した翌日に新法案を発表した。",
    "bodyOriginal": "Sen. Ron Wyden, D-Ore., on Wednesday introduced a bill that would rein in President Donald Trump's broad tariff powers by eliminating some of his statutory tools to set import duties and giving Congress a greater say over the ones that remain.\nWyden unveiled the new legislation a day after slamming Trump for announcing 50% retaliatory tariffs on a wide range of Canadian goods, citing a near-century-old trade law that has rarely, if ever, been invoked.\n\"Donald Trump has abused every trade authority at his disposal, and he is now excavating a law from the Great Depression to once again impose vast, unilateral tariffs on products from one of our closest allies and trading partners,\" Wyden, the top Democrat on the Senate Finance Committee, said in a statement.\n\"This is yet another shakedown that will raise the cost-of-living for Americans, their families, and small businesses across the country,\" Wyden said, adding that he would put forward a bill to \"put Congress back in the driver's seat.\"\nThe bill likely faces long odds of passage in Congress, where Republicans hold majorities in both chambers. Even if it did get through, Trump could veto the bill.\nThe U.S. Constitution gives Congress the power to impose tariffs, but the legislative branch over time has granted the president significant powers to impose duties on foreign goods. Wyden's bill, dubbed the \"Congressional Trade Powers Reform Act of 2026,\" aims to reverse that trend.\nIt would require Trump to get Congressional approval for proposed tariffs brought under three authorities, known as Sections 301, 201 and 232.\nSection 301 of the Trade Act of 1974 empowers the executive branch to impose tariffs in response to foreign trade practices deemed unfair to the U.S.\nUnder Section 201 of the same law, the president can impose tariffs if the U.S. International Trade Commission finds that surging imports are seriously threatening a domestic industry.\nSection 232 of the Trade Expansion Act of 1962 lets the president impose tariffs on national security grounds.\nWyden's bill would also eliminate two tariff authorities that the Senator says are \"outdated.\"\nThey are: Section 122 of the 1974 trade law, which gives the president tariff powers in matters involving international payments problems; and Section 338 of the Tariff Act of 1930, under which the president can impose tariffs up to 50% on the goods of countries found to be discriminating against the U.S.\nThe bill would establish a Congressional \"Joint Committee on Tariffs and Trade\" to which the president would be required to submit his tariff proposals. The committee would comprise five members each from the Senate Finance Committee and the House Ways and Means Committee.\nThe committee would have up to 30 days to review the president's proposal and decide whether to recommend it to Congress for a vote on a joint resolution within a certain timeframe.\nIt would also increase oversight of the Office of the U.S. Trade Representative by making it a separate agency outside of the Executive Office of the President, and by establishing an inspector general within it.\nThe White House did not immediately respond to CNBC's request for comment on Wyden's bill.",
    "bodyJa": "オレゴン州民主党のロン・ワイデン上院議員は水曜日、輸入関税を設定するための法定手段の一部を削除し、残っているものに対する議会の発言権を高めることで、ドナルド・トランプ大統領の広範な関税権限を抑制する法案を提出した。\nワイデン氏は、約1世紀前に制定された通商法が発動されたことがほとんどないことを理由に、幅広いカナダ製品に50％の報復関税を発表したトランプ大統領を非難した翌日に新法案を発表した。\n上院財政委員会民主党トップのワイデン氏は声明で、「ドナルド・トランプ氏は自由に使えるあらゆる通商当局を乱用しており、現在、大恐慌時代の法律を掘り起こして、我々の最も緊密な同盟国や貿易相手国からの製品に再び巨額で一方的な関税を課している」と述べた。\nワイデン氏は「これはアメリカ国民とその家族、全米の中小企業の生活費を引き上げる新たな再編だ」と述べ、「議会を運転席に戻す」法案を提出するつもりだと付け加えた。\n共和党が上下両院で過半数を握る議会でこの法案が可決されるまでには長い見込みがある。たとえ可決されたとしても、トランプ氏は法案に拒否権を発動する可能性がある。\n米国憲法は議会に​​関税を課す権限を与えているが、立法府は時間の経過とともに大統領に外国製品に関税を課す大きな権限を与えてきた。 「2026年議会通商権限改革法」と呼ばれるワイデン氏の法案は、こうした傾向を逆転させることを目的としている。\nトランプ大統領は、第301条、第201条、第232条として知られる3つの当局に基づいて提案された関税について議会の承認を得る必要がある。\n1974 年通商法第 301 条は、米国にとって不公平とみなされる外国貿易慣行に応じて行政府に関税を課す権限を与えています。\n同法第201条に基づき、米国際貿易委員会が輸入急増が国内産業に深刻な脅威を与えていると判断した場合、大統領は関税を課すことができる。\n1962 年の貿易拡大法第 232 条により、大統領は国家安全保障を理由に関税を課すことができます。\nワイデン氏の法案はまた、上院議員が「時代遅れ」と主張する２つの関税当局を廃止することになる。\nそれは、1974 年の通商法第 122 条であり、国際決済問題に関わる問題について大統領に関税権限を与えている。 1930年関税法第338条では、大統領は米国に対して差別的であると判明した国の商品に最大50％の関税を課すことができる。\nこの法案は議会に「関税と貿易に関する合同委員会」を設置し、大統領はそこに関税案を提出する必要がある。委員会は上院財政委員会と下院歳入委員会からそれぞれ５人の委員で構成される。\n委員会は大統領の提案を検討し、一定の期限内に共同決議案の採決を議会に勧告するかどうかを決定するのに最大３０日の猶予が与えられる。\nまた、米国通商代表部を大統領府の外に独立した機関とし、その中に監察総監を設置することで、同事務所の監視を強化することになる。\nホワイトハウスはワイデン氏の法案に関するCNBCのコメント要請にすぐには応じなかった。",

    "title": "Samsung ups prices as it launches new foldable smartphones ahead of expected Apple debut",
    "titleJa": "サムスン、予想されるアップルのデビューに先立って新しい折りたたみスマートフォンを発売し、価格を引き上げる",
    "summaryJa": "サムスンは水曜日、Appleが市場に参入する可能性に先立って、自社が開拓した製品カテゴリーでリーダーシップを維持することを目指して、最新の折りたたみ式スマートフォンを発売した。韓国のテクノロジー巨人は、ロンドンのイベントでGalaxy Z8シリーズを発表した。 3 つのデバイスとその価格は次のとおりです。",
    "bodyOriginal": "Samsung on Wednesday launched its latest foldable smartphones as it looks to maintain its leadership in a product category that it pioneered, ahead of Apple potentially entering the market.\nThe South Korean tech giant unveiled its Galaxy Z8 Series at an event in London. The three devices and their prices are:\n- Galaxy Z Fold8 Ultra ($2,099)\n- Galaxy Z Fold8 ($1,899)\n- Galaxy Z Flip8 ($1,199)\nSamsung's foldable products have usually consisted of two devices — the Fold brand which opens like a book and the Flip device which opens like a traditional flip phone.\nHowever, Samsung now has three products with the \"Ultra\" being its highest-spec smartphone of the series and one that resembles its predecessor, the Galaxy Z Fold7.\n\"2026 is a huge year for foldables with the near certainty that Apple will be unleashing a foldable iPhone iPhone later in the year,\" Ben Wood, chief analyst and chief marketing officer at CCS Insight, told CNBC.\n\"Therefore, this is a critical launch for Samsung who were the market makers in this category, because Apple joining any category immediately gives it another level of legitimacy.\"\nVarious reports have indicated that Apple is expected to launch its first foldable iPhone this year, adding more competition to the market that Samsung has dominated since it launched its first foldable in 2019.\nPrice jump\nSamsung's latest products are also more expensive than their predecessors, which was largely expected. This is due to rising component costs, in particular memory chips, which have seen prices skyrocket due to high demand from the AI industry and a shortage of supply.\nThose same memory chips go into smartphones. The Z Fold8 Ultra is $100 more than its equivalent predecessor, the Z Fold7. The Galaxy Z Flip8 is also $100 more than the Z Flip7.\nCCS Insight's Wood said he was surprised there wasn't a bigger increase in price, which implies that Samsung may not be passing all of the cost rises to consumers.\n\"That underlines the fact that Samsung is keen to maintain a competitive price point,\" Wood said.\nThe more than $2,000 price tag on the Ultra will be a \"talking point,\" Wood added.\nNew product in the Fold series\nThe Galaxy Z Fold8 is a new style of device. While it opens like a book and is smaller than the \"Ultra,\" Samsung said that the smartphone is designed to ensure a better viewing experience for content due to its 4:3 screen ratio.\n\"It is little surprise that we have seen Samsung deliver a different form factor for its Fold portfolio, because it has been widely rumoured that Apple is looking to have a wide screen foldable for the forthcoming iPhone and it is something that Samsung and others are keen to get ahead of,\" Wood said.\nThe Galaxy Z Fold8 Ultra and the Fold8 both run on Qualcomm's Snapdragon 8 Elite Gen 5.\nThere are some differences between the two devices. The Ultra has a more advanced camera with three different lenses as well as a bigger battery.\nThere is a $200 difference between the Fold8 and Fold8 Ultra which, which may not be that large at the high-end of the market where buyers are willing to pay more. It does mean that Samsung will have to provide its customers with a clear reason to buy the Fold8 over the Ultra model.\n\"The lower specification on the Z Fold8 means Samsung will have to have a very strong sales proposition for this device so consumers can understand why they would choose this device over the Z Fold8 Ultra, which is only $200 more,\" Wood said.",
    "bodyJa": "サムスンは水曜日、Appleが市場に参入する可能性に先立って、自社が開拓した製品カテゴリーでリーダーシップを維持することを目指して、最新の折りたたみ式スマートフォンを発売した。\n韓国のテクノロジー巨人は、ロンドンのイベントでGalaxy Z8シリーズを発表した。 3 つのデバイスとその価格は次のとおりです。\n- Galaxy Z Fold8 Ultra ($2,099)\n- Galaxy Z Fold8 ($1,899)\n- Galaxy Z Flip8 ($1,199)\nサムスンの折りたたみ式製品は通常、本のように開く Fold ブランドと、従来の折りたたみ式携帯電話のように開く Flip デバイスの 2 つのデバイスで構成されています。\nただし、サムスンは現在、シリーズ最高スペックのスマートフォンである「Ultra」と、その前任者であるGalaxy Z Fold7に似た製品の3つの製品を持っています。\nCCS Insightのチーフアナリスト兼最高マーケティング責任者のベン・ウッド氏はCNBCに対し、「2026年は折りたたみ式iPhoneにとって大きな年であり、Appleが年内に折りたたみ式iPhoneを発売することはほぼ確実だ」と語った。\n「したがって、このカテゴリーのマーケットメーカーであったサムスンにとって、これは重要な発表となる。なぜなら、Appleがどのカテゴリーに参加しても、すぐに別のレベルの正当性が与えられるからである。」\nさまざまな報道によると、Appleは今年初の折りたたみ式iPhoneを発売する予定で、2019年に最初の折りたたみ式iPhoneを発売して以来サムスンが独占してきた市場への競争がさらに激化することになる。\n価格の高騰\nサムスンの最新製品は以前の製品よりも高価だが、これは大方の予想通りだった。これは部品コストの上昇、特にメモリチップの価格がAI業界からの高い需要と供給不足により価格が高騰しているためだ。\nそれらと同じメモリチップがスマートフォンにも搭載されています。 Z Fold8 Ultra は、同等の前モデルである Z Fold7 よりも 100 ドル高くなっています。 Galaxy Z Flip8もZ Flip7より100ドル高い。\nCCS Insightのウッド氏は、これ以上の値上げがなかったのには驚いたと述べ、これはサムスンが値上げのすべてを消費者に転嫁していない可能性を示唆していると述べた。\n「これは、サムスンが競争力のある価格帯を維持することに熱心であるという事実を強調している」とウッド氏は語った。\nウルトラの2,000ドルを超える価格は「話題」になるだろうとウッド氏は付け加えた。\nFoldシリーズの新商品\nGalaxy Z Fold8は新しいスタイルのデバイスです。本のように開き、「Ultra」より小さいが、画面比率が4:3であるため、コンテンツの視聴体験が向上するように設計されているとサムスンは述べた。\n「サムスンがフォールドポートフォリオに異なるフォームファクタを提供するのを見たのは、それほど驚くべきことではない。なぜなら、アップルが次期iPhoneにワイドスクリーンの折りたたみ式を検討しているという噂が広く流れており、サムスンや他の企業はそれを先取りしたいと考えているからだ」とウッド氏は語った。\nGalaxy Z Fold8 UltraとFold8はどちらもQualcommのSnapdragon 8 Elite Gen 5で動作します。\n2 つのデバイスにはいくつかの違いがあります。 Ultra には、3 つの異なるレンズを備えたより高度なカメラと、より大きなバッテリーが搭載されています。\nFold8 と Fold8 Ultra の間には 200 ドルの差がありますが、購入者がより多くの金額を払っても構わないと考えているハイエンド市場では、この差はそれほど大きくないかもしれません。それは、SamsungがUltraモデルではなくFold8を購入する明確な理由を顧客に提供する必要があることを意味する。\n「Z Fold8のスペックが低いということは、消費者がたった200ドル高いZ Fold8 Ultraではなくこのデバイスを選ぶ理由を理解できるように、サムスンはこのデバイスに対して非常に強力な販売提案をする必要があることを意味する」とウッド氏は述べた。",

    "title": "I travel four hours on a bus per day - the bus fare cap will save me £500 a year",
    "titleJa": "私は 1 日あたり 4 時間バスで移動します。バス料金の上限により、年間 500 ポンド節約できます。",
    "summaryJa": "私は 1 日あたり 4 時間バスで移動します。バス料金の上限により、年間 500 ポンド節約できます。- 公開されました",
    "bodyOriginal": "I travel four hours on a bus per day - the bus fare cap will save me £500 a year\n- Published\nFor Sarah Bodger the cost of travelling to work is \"crippling\".\nThe wool shop owner says she travels about four hours from Bedworth in Warwickshire to Leamington Spa and back, six days a week.\nThe journey also involves catching two buses each way.\nSarah says she endures the long travel time as she loves running her shop. \"It makes me happy,\" she says.\nBut the cost of getting there comes to £58 per week, or more than £3,000 per year, she says.\nThat will change when a newly-announced cap on most single bus fares comes into force in England in January, which Sarah says will enable her to save £500 a year.\nAfter announcing the scheme, Prime Minister Andy Burnham said no-one should be \"priced out\" or \"left behind\" when it comes to affordable transport links.\n\"It's going to make a huge difference to me,\" Sarah tells the BBC.\nBut what do others think of the new announcement?\nMost bus fares in England to be capped at £2 from January\n- Published1 hour ago\nNo immediate change to income tax allowance, says Burnham\n- Published3 hours ago\nLike Sarah, another who thinks it will improve his quality of life is Charlie in Bristol.\nThe 24-year-old, who lives on the city's outskirts, said capping bus fares would mean he'd be more likely to travel into the city centre on weekends.\nHowever Holly Haines, who lives in a rural part of Hereford near the England-Wales border, said the cap would have no impact on her bus travel as the service she uses is provided by a Welsh company.\nShe said that despite the current £3 bus cap in England, a single on her bus costs at least £4.20, despite the journey being \"entirely in England\".\n\"Whilst I would love for other people to benefit from the £2 capped fare... I find it hard that I will not be able to benefit from it,\" she said.\nSeb Pelisse, meanwhile, said while the bus fare cap would be positive news for those who don't drive, it would make little difference to his own finances.\nThe 33 year old, who lives in Surrey, told BBC Your Voice that he uses his car to get around where he lives, and commutes on the train to London for work.\nHe said the bus fare cap is \"a great measure for anyone not driving\", but added that fixing the train fares would \"help many more\".\n\"Working in London I would expect the price of the train to go down because the commute is horrendously expensive nowadays,\" he said.\nThe new cap will take effect from 1 January 2027 for fares on participating buses outside of London.\nThe scheme is expected to cost more than £500m, which Burnham said would be paid for by \"reprioritising\" government funds.\nBut Shadow Chancellor Mel Stride said the government had not actually specified where the money would come from.\nIn its announcement, the government said £454 million will be reallocated from the Department for Energy Security and Net Zero (DESN). DESN said this will be used in addition to funds already earmarked by the Department for Transport for buses.\nIn January 2025, an England-wide bus fare cap rose to £3 under Sir Keir Starmer's Labour government, although Liverpool and Manchester are examples of city regions where fares have been held at £2.\nWhile a lower fare cap is welcome, the Campaign for Better Transport said rural areas were still suffering from fewer bus routes and services, adding that such areas had been more affected by council cut backs in the last decade than urban zones.\nAdditional reporting by Adam Clarkson.\nGet in touch\nYour Voice: What story do you want BBC News to cover?",
    "bodyJa": "私は 1 日あたり 4 時間バスで移動します。バス料金の上限により、年間 500 ポンド節約できます。\n- 公開されました\nサラ・ボジャーさんにとって、通勤の交通費は「壊滅的」です。\n羊毛店のオーナーは、週に 6 日、ウォリックシャーのベッドワースからレミントン スパまで約 4 時間かけて往復していると語ります。\n旅には片道2台のバスに乗る必要もあります。\nサラさんは、お店を経営するのが大好きなので、長い移動時間も耐えられると語ります。 「それは私を幸せにします」と彼女は言います。\nしかし、そこに行くのにかかる費用は週に58ポンド、年間では3,000ポンド以上になると彼女は言う。\n新たに発表されたほとんどの片道バス料金の上限が1月にイギリスで施行されると状況は変わるだろう。サラさんによれば、これにより年間500ポンドの節約が可能になるという。\nこの計画の発表後、アンディ・バーナム首相は、手頃な価格の交通機関に関しては、誰も「値段を付けられたり」「取り残されたり」すべきではないと述べた。\n「それは私にとって大きな変化をもたらすでしょう」とサラはBBCに語った。\nしかし、他の人はこの新しい発表についてどう思いますか?\nイングランドのほとんどのバス料金は1月から2ポンドに上限が設定される\n- 1 時間前に公開\nバーナム氏、所得税控除は即時変更なしと語る\n- 3 時間前に公開\nサラと同じように、それが生活の質を向上させると考えているもう一人は、ブリストルのチャーリーです。\n市郊外に住んでいるこの24歳の男性は、バス料金に上限が設けられれば、週末に市内中心部に旅行する可能性が高くなるだろうと語った。\nしかし、イングランドとウェールズ国境近くのヘレフォードの片田舎に住むホリー・ヘインズさんは、彼女が利用しているサービスはウェールズの会社が提供しているため、この上限は彼女のバス旅行に影響はないと語った。\n現在のイギリスのバスの上限は3ポンドだが、「完全にイギリス国内」の旅であるにもかかわらず、バスの片乗り料金は少なくとも4.20ポンドかかると彼女は語った。\n「他の人たちにも2ポンドの上限運賃の恩恵を受けてもらいたいと思っていますが…私がその恩恵を受けられないのはつらいです」と彼女は語った。\n一方、セブ・ペリッセ氏は、バス料金の上限は車を運転しない人にとっては明るいニュースだが、自分の財政にはほとんど変わらないと述べた。\nサリー州に住む33歳の彼はBBC Your Voiceに対し、住んでいる地域の移動には車を使い、仕事では電車でロンドンまで通勤していると語った。\n同氏は、バス料金の上限は「車を運転しない人にとっては素晴らしい措置」だと述べたが、電車の料金を固定すれば「さらに多くの人が助かる」と付け加えた。\n「ロンドンで働いていると、最近の通勤料金は恐ろしく高いので、電車の料金は下がると思う」と彼は言う。\n新しい上限は、ロンドン郊外の参加バスの運賃に対して 2027 年 1 月 1 日から発効します。\nこの計画には5億ポンド以上の費用がかかると見込まれており、バーナム氏は政府資金の「優先順位を再検討する」ことで賄われると述べた。\nしかし、影の首相メル・ストライド氏は、政府は資金の出所を実際には特定していないと述べた。\n政府は発表の中で、エネルギー安全保障・ネットゼロ省（DESN）から4億5,400万ポンドが再配分されると述べた。 DESNによると、この資金は運輸省がすでにバスに割り当てている資金に加えて使用される予定だという。\n2025年1月、キア・スターマー卿の労働党政権下でイングランド全土のバス運賃の上限が3ポンドに引き上げられたが、リバプールとマンチェスターは運賃が2ポンドに据え置かれている都市部の例である。\n交通改善キャンペーンは、運賃上限の引き下げは歓迎だが、地方では依然としてバス路線やバスサービスの減少に悩まされており、こうした地域は都市部よりも過去10年間の議会削減の影響が大きかったと付け加えた。\nAdam Clarkson による追加レポート。\n連絡する\nYour Voice: BBC ニュースでどのような記事を取り上げてほしいですか?",

    "bodyOriginal": "OpenAI says its AI went rogue and launched 'unprecedented' cyber-attack\n- Published\nOpenAI has revealed some of its most advanced AI models went rogue and hacked a start-up after it lost control of them during a security test.\nThe ChatGPT-maker said its agent - an AI system which can operate alone after some human instruction – was being tested in a controlled environment, but found vulnerabilities and managed to escape.\nThey targeted Hugging Face, one of the world's largest hubs for sharing AI models, gaining access to some internal company systems.\nOpenAI said the incident was \"unprecedented\", external, and it was conducting an investigation alongside Hugging Face, whose boss Clement Delangue said in a post on X it was \"mind-blowing that all of this happened autonomously\".\n\"The investigation is ongoing, and we'll share more learnings from what might be the first incident of its kind,\" Delangue added.\nInsecure sandboxes\nGina Neff, head of the Minderoo Centre for Technology and Democracy at the University of Cambridge, told BBC Radio 4's Today programme that the security tests - called sandboxes - are \"supposed to be secure environments where you can see what the models are capable of\".\n\"In this case, it looks like OpenAI didn't make a secure enough sandbox,\" she added.\nInstead, the agents created their own cyber-attack against the sandbox itself, finding a vulnerability which allowed them to escape.\nOnce outside, the AI identified Hugging Face as a likely source of the answers they were seeking in the test, and tried to gain access.\nNeil Lawrence, Professor of machine learning at Cambridge University, called it an \"impressive feat\", but cautioned it \"falls well within the known capabilities of the current generation\" of high-powered AI models.\nHe pointed out that OpenAI is looking to list itself on the stock market, and faces intense pressure from rival firm Anthropic, which has made headlines with its own powerful AI tool, Mythos.\n\"OpenAI are now playing catch-up, they are trying to demonstrate their own systems' capabilities in cyber-security.\"\n\"It shows us that OpenAI are not capable of safely deploying their own technology,\" he added.\nIn its initial disclosure of the hack on 16 July, external, Hugging Face said it was still assessing whether any customer or partner data was affected and would contact affected parties if necessary.\nIt said it has now closed the vulnerabilities highlighted by the incident and rebuilt the affected systems.\n\"Autonomous, AI-driven offensive tooling is no longer theoretical,\" it said.\n\"Defending an online platform now means treating the data and model surface as a first-class attack surface, and using AI on defence to keep pace.\n\"We will keep investing there, and keep sharing what we learn.\"\n'Sobering moment'\nThe incident has prompted fresh questions about the capabilities of advanced AI systems and whether existing safeguards are sufficient as the technology becomes more powerful.\nSpencer Starkey, an executive at cyber-security firm SonicWall, told the BBC the incident made it clear organisations needed to \"step up\" their own defences and \"treat cyber resilience as a core operational priority\".\n\"The uncomfortable truth is that too many organisations are still defending at human speed while adversaries are escalating to machine speed,\" he said.\nMeanwhile Travis Lelle, principal security engineer at cyber-security consulting firm Guidepoint Security, said the update marked a \"sobering moment in cyber-security\".\n\"This highlights a known asymmetry,\" he said.\n\"Offensive agents are unconstrained, while the best defensive tools are locked behind guardrails that cannot understand context.\"\nBut Jake Moore, global cyber-security advisor at ESET, said the announcement could also have a competitive dimension.\nHe argued OpenAI may be seeking to highlight its own AI capabilities as rival Anthropic attracts growing attention for its Claude Mythos model.\n\"It does pose the question that OpenAI are potentially chasing the marketing dream of Anthropic of late,\" he said.\nIt comes a week after Chinese AI start-up Moonshot unveiled Kimi K3 - a massive new artificial intelligence model it said could rival top US firms.\nApple sues OpenAI, its employees claiming theft of trade secrets\n- Published10 July\nWhat is Claude Mythos and what risks does it pose?\n- Published17 April\nHow to stop AI agents going rogue\n- Published26 August 2025\nSign up for our Tech Decoded newsletter to follow the world's top tech stories and trends. Outside the UK? Sign up here.",
    "bodyJa": "OpenAI、自社のAIが不正行為を行い「前例のない」サイバー攻撃を開始したと発表\n- 公開されました\nOpenAIは、同社の最も先進的なAIモデルの一部が、セキュリティテスト中に制御を失った後、不正になり、新興企業をハッキングしたことを明らかにした。\nChatGPTの作成者は、そのエージェント（人間の指示を受けて単独で動作できるAIシステム）は管理された環境でテストされていたが、脆弱性が見つかり、なんとか脱出できたと述べた。\n彼らは AI モデルを共有する世界最大のハブの 1 つである Hugging Face を標的にし、一部の社内システムへのアクセスを取得しました。\nOpenAIは、今回の事件は「前例のない」外部の出来事であり、ハギング・フェイスの上司であるクレメント・デラング氏と共同で調査を行っているとXへの投稿で「すべてが自律的に起こったことは驚くべきことだ」と述べた。\n「捜査は進行中であり、この種の最初の事件と思われる事件から得たさらなる知見を共有する予定だ」とデラング氏は付け加えた。\n安全でないサンドボックス\nケンブリッジ大学ミンデルー技術民主主義センター所長のジーナ・ネフ氏は、BBCラジオ4のトゥデイ番組で、サンドボックスと呼ばれるセキュリティテストは「モデルの機能を確認できる安全な環境であることが想定されている」と語った。\n「この場合、OpenAI は十分に安全なサンドボックスを作成していないようです」と彼女は付け加えた。\n代わりに、エージェントはサンドボックス自体に対して独自のサイバー攻撃を作成し、脱出を可能にする脆弱性を見つけました。\n外に出ると、AI はテストで求めていた答えの情報源として Hugging Face を特定し、アクセスを試みました。\nケンブリッジ大学の機械学習教授ニール・ローレンス氏は、これを「印象的な偉業」と称したが、高性能AIモデルの「現世代の既知の機能の範囲内に十分収まる」と警告した。\n同氏は、OpenAIが株式市場への上場を目指しており、独自の強力なAIツール「Mythos」で話題になったライバル企業Anthropicからの激しい圧力に直面していると指摘した。\n「OpenAIは現在、追い上げを図っており、サイバーセキュリティにおける自社システムの能力を実証しようとしている。」\n「このことは、OpenAI が独自のテクノロジーを安全に導入できないことを示しています」と彼は付け加えた。\nハギングフェイス社は、7月16日にハッキングを初めて外部に公表した際、顧客やパートナーのデータが影響を受けたかどうかをまだ評価中であり、必要に応じて影響を受ける当事者に連絡すると述べた。\n同社は現在、この事件で明らかになった脆弱性を解消し、影響を受けたシステムを再構築したと述べた。\n「自律型のAI主導の攻撃ツールはもはや理論上のものではない」と述べた。\n「現在、オンライン プラットフォームを防御するということは、データとモデルの表面を第一級の攻撃対象領域として扱い、防御に AI を使用して歩調を合わせることを意味します。\n「私たちはそこに投資し続け、学んだことを共有し続けます。」\n「身が引き締まる瞬間」\nこの事件は、高度な AI システムの機能と、テクノロジーがより強力になるにつれて既存の安全対策が十分であるかどうかについて、新たな疑問を引き起こしました。\nサイバーセキュリティ企業ソニックウォールの幹部、スペンサー・スターキー氏はBBCに対し、今回の事件により、組織は自らの防御を「強化」し、「サイバー回復力を運用の中核的な優先事項として扱う」必要があることが明らかになったと語った。\n「不快な真実は、敵が機械の速度にまでエスカレートしているにもかかわらず、あまりにも多くの組織が依然として人間の速度で防御を行っているということだ」と同氏は述べた。\n一方、サイバーセキュリティコンサルティング会社ガイドポイントセキュリティの主任セキュリティエンジニア、トラビス・レル氏は、今回のアップデートは「サイバーセキュリティにおける身の引き締まる瞬間」となったと述べた。\n「これは既知の非対称性を浮き彫りにしている」と彼は言う。\n「攻撃側のエージェントは拘束されていませんが、最良の防御ツールはガードレールの後ろに閉じ込められており、状況を理解することができません。」\nしかし、ESETのグローバルサイバーセキュリティアドバイザー、ジェイク・ムーア氏は、今回の発表には競争上の側面もある可能性があると述べた。\n同氏は、ライバルのAnthropicが同社のClaude Mythosモデルに注目を集める中、OpenAIは自社のAI能力を強調しようとしているのかもしれないと主張した。\n「OpenAIが最近のAnthropicのマーケティングの夢を潜在的に追いかけているのではないかという疑問が生じている」と同氏は述べた。\nこれは、中国のAI新興企業ムーンショットが、米国トップ企業に匹敵する可能性があると同社が発表した大規模な新しい人工知能モデル「キミK3」を発表してから1週間後に行われた。\nApple、従業員が企業秘密の窃盗を主張してOpenAIを提訴\n- 7 月 10 日発行\nクロード神話とは何ですか?また、それがもたらすリスクは何ですか?\n- 4 月 17 日公開\nAIエージェントの暴走を阻止する方法\n- 2025 年 8 月 26 日公開\nTech Decoded ニュースレターに登録して、世界のトップのテクノロジー ストーリーやトレンドをフォローしてください。英国外ですか？ここからサインアップしてください。",

    "id": "mortgage-rates-are-rising-again-but-home-53fbb9b8",
    "title": "Mortgage rates are rising again, but homebuyers are seeing some advantages",
    "titleJa": "住宅ローン金利は再び上昇しているが、住宅購入者はいくつかのメリットを感じている",
    "summaryJa": "住宅ローン金利は先週も上昇を続けたが、おそらく競争の減少と一部の値下げを利用して、住宅購入者が少しずつ市場に戻ってきた。住宅ローン銀行協会の季節調整済み指数によると、この影響で先週の住宅ローン総需要は前週比１．９％増加した。適合ローン残高が83万2,750ドル以下の30年固定金利住宅ローンの平均契約金利は、頭金20％のローンの組成手数料を含めて0.67から0.62にポイント減少し、6.65％から6.69％に上昇した。これは昨年８月以来の高水準となった。",
    "bodyOriginal": "Mortgage rates continued their climb last week, but homebuyers trickled back into the market, perhaps taking advantage of less competition and some price cuts. That helped push total mortgage demand last week 1.9% higher compared with the previous week, according to the Mortgage Bankers Association's seasonally adjusted index.\nThe average contract interest rate for 30-year fixed-rate mortgages with conforming loan balances, $832,750 or less, increased to 6.69% from 6.65%, with points decreasing to 0.62 from 0.67, including the origination fee, for loans with a 20% down payment. That was the highest rate since last August.\nAs a result, refinance demand, which is highly sensitive to weekly rate moves, fell 2% for the week and was just 7% higher than the same week one year ago. Last year at this time, the average on the 30-year fixed loan was just 15 basis points higher.\nApplications for a mortgage to purchase a home rose 6% for the week and were 0.2% higher year over year -- basically flat. Potential buyers are starting to get a little break, as the market settles into its historically slower summer months. Real estate agents in CNBC's Housing Market Survey report sellers seem to be more willing to cut prices.\n\"Growing home inventory in many markets is supporting more purchase activity,\" said Mike Fratantoni, senior vice president and chief economist at the MBA. \"Incoming data showed that inflation dropped in June, but with oil prices spiking again, that improvement seems unlikely to continue in July data, and mortgage rates are likely to remain higher as a result.\"\nMortgage rates moved even higher to start this week, matching their last high from mid-May, according to a separate survey from Mortgage News Daily. New escalations in the war with Iran overshadowed last week's cooler-than-expected inflation reports.\n\"For those who want to keep the analysis simple, fuel prices do a good enough job explaining the move. In fact, August gasoline futures also just hit their May 19th highs this week--perfectly aligning with the round trip in rates,\" wrote Matthew Graham, chief operating officer at Mortgage News Daily.",
    "bodyJa": "住宅ローン金利は先週も上昇を続けたが、おそらく競争の減少と一部の値下げを利用して、住宅購入者が少しずつ市場に戻ってきた。住宅ローン銀行協会の季節調整済み指数によると、この影響で先週の住宅ローン総需要は前週比１．９％増加した。\n適合ローン残高が83万2,750ドル以下の30年固定金利住宅ローンの平均契約金利は、頭金20％のローンの組成手数料を含めて0.67から0.62にポイント減少し、6.65％から6.69％に上昇した。これは昨年８月以来の高水準となった。\nその結果、毎週の金利変動に非常に敏感な借り換え需要は、週間では２％減少し、前年同週と比べてわずか７％増加した。昨年のこの時期、30年固定ローンの平均はわずか15ベーシスポイント高かった。\n住宅購入のための住宅ローンの申請件数は週間で６％増加、前年比では０．２％増加し、ほぼ横ばいとなった。市場が歴史的に低迷する夏に向けて落ち着き始めているため、潜在的な買い手は少し休憩し始めている。 CNBCの住宅市場調査の不動産業者は、売り手は値下げに前向きなようだと報告している。\nMBAのシニアバイスプレジデント兼チーフエコノミスト、マイク・フラタントーニ氏は、「多くの市場で住宅在庫が増加していることが、購入活動の拡大を後押ししている」と述べた。 「新たに発表されたデータによると、インフレ率は6月に低下したが、原油価格が再び急騰しているため、7月のデータでもその改善が続く可能性は低く、その結果、住宅ローン金利は高止まりする可能性が高い。」\nモーゲージ・ニュース・デイリーの別の調査によると、住宅ローン金利は今週初めからさらに上昇し、5月中旬以来の前回最高値に匹敵した。イランとの戦争の新たな激化が、予想よりも低かった先週のインフレ報告に影を落とした。\nモーゲージ・ニュース・デイリーの最高執行責任者マシュー・グラハム氏は、「分析を単純にしたい人にとっては、燃料価格はこの動きを説明するのに十分な役割を果たす。実際、8月のガソリン先物も今週、5月19日の高値を付けたばかりだ。金利の往復と完全に一致している」と述べた。",

    "id": "what-is-pickaxe-mountain-the-iranian-nuc-cb1cf5ee",
    "title": "What is Pickaxe Mountain, the Iranian nuclear facility Trump is threatening to strike?",
    "titleJa": "トランプ大統領が攻撃すると脅しているイランの核施設、ツルハシ・マウンテンとは何ですか？",
    "summaryJa": "ドナルド・トランプ大統領はイランの地下核施設「ピッケル・マウンテン」を爆撃すると脅し、米国とイランの間の緊張が高まっている。大統領のコメントにより、イランで最も安全で保護された施設の一つに改めて注目が集まった。",
    "bodyOriginal": "President Donald Trump has threatened to bomb the Iranian underground nuclear facility Pickaxe Mountain, ratcheting up tensions between the U.S. and Iran.\nThe president's comments have put renewed focus on one of Iran's most secure and protected facilities.\nIt comes as U.S. Central Command has bombed Iranian targets for 11 straight nights, including military operations centers, drone storage facilities, and military logistics infrastructure as it seeks to weaken the country's ability to control commercial shipping in the Strait of Hormuz.\nU.S. and Iran had signed an interim memorandum of understanding on June 17 that halted military operations, called for the reopening of Hormuz and established a 60-day window for negotiating a permanent agreement, including terms covering Iran's nuclear program. But the document left the future management of the Strait of Hormuz unresolved.\nHere's what we know about the latest point of tension between the U.S. and Iran.\nWhat has Trump said about Pickaxe Mountain?\nSpeaking from Washington on Tuesday, the president said that the U.S. military will soon be targeting Pickaxe Mountain — a key underground site next to an Iranian nuclear facility.\n\"We'll be hitting that area very probably pretty soon, and there's not a thing they can do about it. Normally I wouldn't say that; if I thought they could do something about it I would never say that, but we'll be hitting that area pretty soon, and very heavily,\" Trump told reporters in the White House.\nTrump issued similar threats earlier in the month on the Hugh Hewitt Show: \"We're watching [Pickaxe Mountain] closely. We see no activity there. They're not doing well with their nuclear situation. Every time we hear about it, we blow it up. So they don't like talking about it. But we'll probably give Pickaxe a shot relatively soon.\"\nIf the U.S. were to proceed with such an attack, it will be considered as \"an explosion of war in the region,\" Iran's Khatam Al-Anbiya military command said in translated comments reported by state-run broadcaster IRIB. They added that \"all the interests of America, the allies and supporters\" would then be the target of a \"powerful attack by the armed forces of the Islamic Republic of Iran.\"\nWhat to know about the nuclear facility\nLocated south of Iran's Natanz enrichment plant, Pickaxe Mountain, or Kuh-e Kolang Gaz La as it is known in Iran, began construction in 2020. At the time, Iran said the underground facility would replace a destroyed centrifuge plant at Natanz, which would have seen 6,000 nuclear centrifuges assembled per year, according to the Institute for Science and International Security (ISIS).\nThe mountain has a height of 1,608 meters above sea level, while the facility is estimated to be 100 meters deep under the mountain, per ISIS.\nSince the U.S. struck three Iranian nuclear sites in June 2025, including Natanz, Fordow and Isfahan, construction at Pickaxe Mountain has accelerated, according to satellite image analysis by the Center for Strategic and International Studies.\nCSIS determined that Iran has constructed security walls around the whole site, with tunnels to the west, east, and south.\n\"It remains unclear when Pickaxe Mountain could be operational, based only on assessments of satellite imagery,\" researchers at ISIS said in a July 14 note. \"It is also unclear if Iran still plans on installing a large-scale assembly facility, given the destruction of Iran's centrifuge program, including Iran's ability to make centrifuge components needed for an assembly plant.\"\n— CNBC's Lim Hui Jie and Emma Graham helped contribute to this report.",
    "bodyJa": "ドナルド・トランプ大統領はイランの地下核施設「ピッケル・マウンテン」を爆撃すると脅し、米国とイランの間の緊張が高まっている。\n大統領のコメントにより、イランで最も安全で保護された施設の一つに改めて注目が集まった。\nこれは、ホルムズ海峡における商業船舶を管理する国の能力を弱めることを目的として、米中央軍が軍事作戦センター、ドローン保管施設、軍事物流インフラを含むイランの標的を11夜連続で爆撃している中で起こった。\n米国とイランは6月17日、軍事作戦の停止、ホルムズの再開を求め、イランの核開発計画を含む条件を含む恒久的合意の交渉に60日間の猶予期間を設ける暫定覚書に署名していた。しかし、この文書はホルムズ海峡の将来の管理を未解決のままにした。\n米国とイランの間の最新の緊張点について私たちが知っていることは次のとおりです。\nトランプ氏はつるはし山について何と言っていますか?\n火曜日にワシントンから演説した大統領は、米軍が間もなく、イランの核施設に隣接する重要な地下施設であるツルハシ・マウンテンを標的にするだろうと述べた。\nトランプ大統領はホワイトハウスで記者団に対し、「おそらく間もなくその地域に到達するだろうが、彼らには何もできない。通常はそんなことは言わない。彼らが何かできると思ったら決してそんなことは言わないが、われわれはすぐにその地域に攻撃を加えるだろうし、非常に激しく攻撃するだろう」と述べた。\nトランプ大統領は今月初め、ヒュー・ヒューイット・ショーで同様の脅迫を行った。「我々は（ツルハシ・マウンテンを）注意深く監視している。そこでは何の活動も見られない。彼らは核問題でうまく対処していない。そのことについて聞くたびに、我々は爆破する。だから彼らはそれについて話すのを好まない。だが、おそらく我々は比較的近いうちにツルハシに一撃を与えるだろう。」\nイランのカタム・アルアンビヤ軍司令部は、国営放送ＩＲＩＢが報じたコメントの翻訳で、米国がそのような攻撃を進めた場合、それは「地域における戦争の爆発」とみなされるだろうと述べた。さらに、「米国、同盟国、支持者のすべての利益」が「イラン・イスラム共和国軍による強力な攻撃」の標的になるだろうと付け加えた。\n原子力施設について知っておくべきこと\nイランのナタンズ濃縮工場の南に位置するツルハシ山、またはイランではクエ・コラン・ガズ・ラとして知られるこの施設は、2020年に建設が始まった。当時、イランは、この地下施設はナタンツにある破壊された遠心分離機工場の代わりとなるもので、科学国際安全保障研究所（ISIS）によると、年間6,000台の核遠心分離機が組み立てられるだろうと発表した。\n山の高さは海抜1,608メートルだが、ISISによれば施設は山の地下100メートルの深さにあると推定されている。\n戦略国際​​問題研究所による衛星画像分析によると、米国が2025年6月にナタンズ、フォルドー、イスファハーンを含むイランの核施設3カ所を攻撃して以来、つるはし山の建設が加速している。\nCSISは、イランが敷地全体の周囲に防護壁を建設し、西、東、南にトンネルを設置したと判断した。\nISISの研究者らは7月14日のメモで、「衛星画像の評価のみに基づいて、つるはし山がいつ運用可能になるかは依然として不明だ」と述べた。 「また、組立工場に必要な遠心分離機部品を製造するイランの能力を含む、イランの遠心分離機計画が破壊されたことを考慮すると、イランが依然として大規模組立施設の設置を計画しているかどうかも不明である。」\n— CNBC の Lim Hui Jie と Emma Graham がこのレポートに貢献しました。",

    "id": "oil-prices-jump-4-as-rubio-says-iran-not-f22f7c51",
    "title": "Oil prices jump 4% as Rubio says Iran 'not serious' about peace talks",
    "titleJa": "ルビオ氏、イランは和平交渉に「真剣ではない」と発言、原油価格は4％上昇",
    "summaryJa": "マルコ・ルビオ国務長官が、ホルムズ海峡は依然として両国間の対立点であると述べ、米国による一晩のイランに対する11回連続攻撃を受けて、水曜朝の原油価格は4%上昇した。米東部時間午前４時過ぎ、世界の指標となるブレント原油先物７月渡しはほぼ４％高の９４．２３ドルとなった。前月の米国ウェスト・テキサス・インターミディエイト原油先物は3.8％上昇し、87.46ドルで取引された。",
    "bodyOriginal": "Oil prices were 4% higher on Wednesday morning following the 11th consecutive round of U.S. strikes against Iran overnight, as Secretary of State Marco Rubio said the Strait of Hormuz remains a sticking point between the two sides.\nShortly after 4 a.m. ET, global benchmark Brent crude futures for July delivery were almost 4% higher at $94.23. Front-month U.S. West Texas Intermediate crude futures were up 3.8% to trade at $87.46.\nAt the ASEAN Foreign Ministers' meeting in the Philippines on Wednesday, U.S. Secretary of State Marco Rubio said Washington remained committed to diplomacy, but accused Tehran of violating the two sides' agreement over the Strait of Hormuz.\n\"The problem we're having right now is that they're not serious about talks,\" he said. \"If they're serious, we're serious. If they're not, then we will do what is necessary to protect our interests and also the interests of our allies.\"\nTuesday saw the U.S. Central Command carry out its eleventh consecutive night of strikes against Iran.\nCentcom forces targeted Iranian military operations centers, maritime capabilities, aircraft hangars, drone storage facilities, and military logistics infrastructure.\nThe military unit said the strikes had been completed to \"further degrade Iran's ability to threaten commercial shipping in the Strait of Hormuz.\"\nRubio said Wednesday that the strait — a critical shipping route for oil and other vital commodities — remains a sticking point in bilateral talks, alleging that Iran \"demands the right\" to control the waterway. Allowing this to happen would set \"a very dangerous precedent\" for the world, he added.\n\"With no breakthroughs regarding Iran, the market focus returned to inflation over the last 24 hours, as Brent crude closed above $90/bbl for the first time in over a month, reviving fears about a wider stagflationary shock. And this morning we've seen a further rise above $92/bbl, so there's little sign of oil prices easing as the U.S. confirmed overnight they'd completed an 11th consecutive evening of strikes against Iran,\" Deutsche Bank's Jim Reid said in a note on Wednesday morning.\nAs energy prices continued to climb, investor bets on hawkish Federal Reserve policy measures mounted.\n\"The probability of a July hike was back up to 26% by [Tuesday's] close, the highest since last week's downside surprise in the U.S. CPI print,\" Reid wrote on Wednesday. \"It was at 45% the day before CPI and as low as 10% the day after.\"\nAs of Wednesday morning, money markets were pricing in a 24.1% chance of a rate hike from the Fed this month, and a 69% chance of at least a quarter-point hike in September, according to the CME's FedWatch tool.\nAnalysts at ING said in a note released on Wednesday morning that there were \"mounting supply risks\" in energy markets, as hopes for a temporary ceasefire between the U.S. and Iran faded.\n\"The disruptions facing the market don't end in the Middle East. In the Black Sea, Russia's CPC terminal has stopped receiving oil from Kazakhstan, with loadings suspended following ongoing attacks on tankers,\" they noted.\n\"The longer the suspension drags on, the greater the likelihood that Kazakhstan will be forced to curb upstream production. Volumes shipped from the CPC terminal are significant, with around 1.7m b/d loaded in June.\"",
    "bodyJa": "マルコ・ルビオ国務長官が、ホルムズ海峡は依然として両国間の対立点であると述べ、米国による一晩のイランに対する11回連続攻撃を受けて、水曜朝の原油価格は4%上昇した。\n米東部時間午前４時過ぎ、世界の指標となるブレント原油先物７月渡しはほぼ４％高の９４．２３ドルとなった。前月の米国ウェスト・テキサス・インターミディエイト原油先物は3.8％上昇し、87.46ドルで取引された。\n水曜日、フィリピンで開催されたASEAN外相会議で、マルコ・ルビオ米国務長官は、米国は外交に引き続きコミットしていると述べたものの、イランはホルムズ海峡をめぐる両国の合意に違反していると非難した。\n「我々が現在抱えている問題は、彼らが協議に真剣でないことだ」と同氏は語った。 「彼らが真剣であれば、私たちも真剣だ。彼らがそうでないなら、私たちの利益と同盟国の利益を守るために必要なことをするだろう。」\n火曜日、米中央軍はイランに対して11夜連続の攻撃を実施した。\nセントコム軍はイランの軍事作戦センター、海上能力、航空機格納庫、ドローン保管施設、軍事物流インフラを標的とした。\n同軍部隊は、今回の攻撃は「ホルムズ海峡の商船を脅かすイランの能力をさらに低下させる」ために完了したと述べた。\nルビオ氏は水曜日、イランがこの海峡を管理する「権利を要求している」と主張し、この海峡は石油やその他の重要な商品の重要な航路であるが、依然として二国間交渉の行き詰まり点であると述べた。このような事態を許すことは、世界にとって「非常に危険な前例」となるだろうと同氏は付け加えた。\n「イランに関して何の進展も見られず、市場の焦点は過去24時間でインフレに戻った。ブレント原油が1カ月ぶりに1バレル当たり90ドルを超えて取引を終え、より広範なスタグフレーションショックへの懸念が再燃した。そして今朝は1バレル92ドルを超えるさらなる上昇が見られ、米国が夜通し11夜連続の対イラン攻撃を完了したと確認したため、原油価格が緩和する兆しはほとんどない。」ドイツ銀行のジム・リード氏は水曜朝のメモでこう述べた。\nエネルギー価格の上昇が続く中、連邦準備制度理事会のタカ派政策への投資家の賭けは高まった。\nリード氏は水曜日、「7月利上げの確率は（火曜）終値までに26％に戻り、先週の米国CPI下方予想以来最高となった」と書いた。 「CPI前日には45％だったが、翌日には10％まで下がった。」\nＣＭＥのフェドウォッチツールによると、水曜午前の時点で、短期金融市場はＦＲＢが今月利上げする確率を２４．１％、９月に少なくとも４分の１ポイント利上げする確率を６９％織り込んでいる。\nＩＮＧのアナリストらは水曜朝に発表したメモで、米国とイランの一時停戦への期待が薄れ、エネルギー市場では「供給リスクが高まっている」と述べた。\n「市場が直面している混乱は中東で終わっていない。黒海では、ロシアのCPCターミナルがカザフスタンからの石油の受け入れを停止しており、タンカーへの継続的な攻撃を受けて積み込みが停止されている」と彼らは指摘した。\n「停止が長引けば長引くほど、カザフスタンが上流生産の抑制を強いられる可能性が高まる。CPCターミナルからの出荷量は多く、6月には日量約170万バレルが積み込まれている。」",

    "id": "food-prices-rise-at-slowest-rate-in-near-1666704d",
    "title": "Food prices rise at slowest rate in nearly two years",
    "titleJa": "食品価格の上昇率は約2年間で最も低い",
    "summaryJa": "食品価格の上昇率は約2年間で最も低い- 公開されました",
    "bodyOriginal": "Food prices rise at slowest rate in nearly two years\n- Published\nFood prices are rising at their slowest rate in nearly two years, as the cost of staples such as margarine and sugar has gone down.\nSupermarket price wars have helped drive down prices in the year to June, the industry says, as retailers work to tempt customers with summer deals.\nInflation in the UK overall has fallen to 2.6% in the year to June, down from 2.8% in the year to May, according to the Office for National Statistics (ONS), driven largely by lower fuel and food prices.\nJune's figure will be welcomed by new Prime Minister Andy Burnham and his government, but analysts warn the fall is temporary, as higher energy prices in July are expected to push inflation back up.\nLower fuel costs also pushed inflation down, with prices at the pump falling for the first time since the start of the war in the Middle East.\nClothing costs fell as well due to the summer sales, with many retailers offering larger discounts than last year.\nFalling food prices\nFood and non-alcoholic beverage inflation fell by 0.2% month-to-month, with sugar, chocolate and confectionery seeing the largest drop in price.\nMeat, particularly beef, and vegetable prices rose in June but the increase was smaller than the same time last year. Prices of oils, fats and dairy fell in June, compared to a year previously.\nFood inflation often has a lag of up to 13 months due to the supply chain, so any effects from the war in Iran could still be yet to come.\nFuel prices at the pump fell in June after the US and Iran agreed to halt military operations and allow the key Strait of Hormuz to re-open.\nBut the recent resumption of hostilities and a new jump in crude oil prices means inflation could spike again in the coming months.\nThe British Retail Consortium (BRC) said lower food inflation was driven by \"intense competition between supermarkets\".\n\"If retailers are to keep prices affordable for consumers in the long run, the Government needs to take practical steps to lower the everyday cost of doing business,\" BRC economist Harvir Dhillon said.\n\"Andy Burnham has taken immediate action to ease pressure on household budgets; he must now look to do the same for businesses.\"\nThe new prime minister has pledged to make the cost of living a priority for his government, and new Chancellor John Healey said the lower rate of inflation was \"news families want to hear\" but \"there is much more to do\".\nThe government announced on Wednesday morning that the bus fare cap in England will be brought back down to £2 in January.\nThat was after Burnham announced that VAT on domestic electricity bills would be scrapped for the rest of the year from October.\nHealey said: \"Both these changes are a win-win. They help keep inflation down, while helping people afford the essentials.\"\nInterest rate hike unlikely\nThe latest inflation figure is still above the Bank of England's target of 2%, but Suren Thiru, chief economist at the Institute of Chartered Accountants in England and Wales, said a rate increase when the Bank meets next week is unlikely.\n\"Rate-setters may want to assess the impact of any measures announced by the new Prime Minister before deciding whether to tighten policy again,\" she said.\nShe added that rising inflation will \"likely become a more notable economic headache\" for Healey, \"squeezing his fiscal headroom, raising borrowing costs, and increasing financial market volatility\".\nYael Selfin, KPMG's chief economist, said the June figure is likely to be the lowest of the year.\nHigher energy bills, brought about by a rise in Ofgem's price cap, will likely push inflation up again, she said.\n\"Although the impacts from the initial energy shock have so far been relatively limited, if energy prices remain high for longer, second-round effects risk feeding through into wages and more broadly across the economy.\"\nSarah Coles, head of personal finance at AJ Bell, said: \"The markets are still only expecting a single rate hike by the end of 2026, but it's expected to hit in September, with another potentially following in February.\n\"It means the most generous rates are likely to edge up. If you're in the market for a new savings account, it's worth keeping your eye open for a bargain and acting fast while it lasts.\"\nBut she added: \"There's miserable news for anyone in the market for a new mortgage. Mortgage rates had been falling across the board, but this week has seen them jump significantly.\"\nRelated topics\n- Published8 hours ago\n- Published18 hours ago",
    "bodyJa": "食品価格の上昇率は約2年間で最も低い\n- 公開されました\nマーガリンや砂糖などの主食の価格が下落しているため、食品価格の上昇率はここ２年近くで最も低い水準となっている。\n業界によると、小売業者が夏のセールで顧客を誘惑しようと努めているため、スーパーマーケットの価格競争が6月までの1年間の価格下落に貢献したという。\n国家統計局（ONS）によると、英国全体のインフレ率は6月までの1年間で2.6％と、5月までの1年間の2.8％から低下したが、これは主に燃料と食料価格の下落によるものだという。\n6月の数字はアンディ・バーナム新首相とその政府によって歓迎されるだろうが、アナリストらは、7月のエネルギー価格上昇がインフレを押し上げると予想されるため、下落は一時的なものだと警告している。\n燃料費の低下もインフレを押し下げ、中東戦争開始以来初めて物価が下落した。\n多くの小売店が昨年より大幅な割引を提供したことで、夏のセールにより衣料品のコストも下落した。\n食料価格の下落\n食品および非アルコール飲料のインフレ率は前月比0.2%低下し、砂糖、チョコレート、菓子類の価格下落が最も大きかった。\n6月には肉、特に牛肉と野菜の価格が上昇したが、その上昇幅は昨年の同時期に比べて小さかった。 6月の油脂、乳製品の価格は前年と比べて下落した。\n食料のインフレにはサプライチェーンの関係で最大13カ月の遅れが生じることが多く、イラン戦争の影響はまだ出ていない可能性がある。\n米国とイランが軍事作戦を停止し、重要なホルムズ海峡の再開を認めることで合意したことを受け、6月にポンプの燃料価格が下落した。\nしかし、最近の戦闘再開と原油価格の新たな高騰は、今後数カ月間にインフレが再び急上昇する可能性があることを意味している。\n英国小売コンソーシアム（BRC）は、食品インフレの低下は「スーパーマーケット間の激しい競争」が原因だと述べた。\nBRCのエコノミスト、ハービル・ディロン氏は「小売業者が長期的に消費者にとって手頃な価格を維持したいのであれば、政府は日々の事業コストを下げるための現実的な措置を講じる必要がある」と述べた。\n「アンディ・バーナム氏は家計への圧迫を緩和するために直ちに行動を起こしたが、これからは企業に対しても同じことを考えなければならない。」\n新首相は生活費を政府の優先事項とすることを約束しており、ジョン・ヒーリー新首相は、インフレ率の低下は「家族が聞きたがっているニュース」だが「やるべきことはまだたくさんある」と述べた。\n政府は水曜朝、イギリスのバス料金の上限を1月から2ポンドに戻すと発表した。\nそれはバーナムが国内の電気料金に対する付加価値税を10月から年内に廃止すると発表した後のことだった。\nヒーリー氏は「これらの変化はどちらもウィン・ウィンだ。人々が必需品を手に入れるのを助けながら、インフレを抑制するのに役立つ」と述べた。\n金利上昇の可能性は低い\n最新のインフレ率はイングランド銀行の目標である２％を依然として上回っているが、イングランド・ウェールズ公認会計士協会の首席エコノミスト、スレン・ティルー氏は、来週のイングランド銀行会合で利上げが行われる可能性は低いと述べた。\n同氏は「金利設定者は政策を再度引き締めるかどうかを決定する前に、新首相が発表した政策の影響を評価したいと考えているかもしれない」と述べた。\n同氏は、インフレ上昇がヒーリー氏にとって「より顕著な経済的頭痛の種になる可能性が高く」、「財政余裕が圧迫され、借入コストが上昇し、金融市場のボラティリティが高まる」と付け加えた。\nＫＰＭＧのチーフエコノミスト、ヤエル・セルフィン氏は、６月の数字は今年最低となる可能性が高いと述べた。\nオフジェムの価格上限引き上げによってもたらされるエネルギー料金の上昇により、インフレが再び上昇する可能性が高いと同氏は述べた。\n「初期のエネルギーショックによる影響はこれまでのところ比較的限定的だが、エネルギー価格が長期にわたって高止まりすれば、二次影響が賃金やより広範な経済全体に波及するリスクがある。」\nＡＪベルのパーソナル・ファイナンス部門責任者サラ・コールズ氏は、「市場はまだ２０２６年末までに１回の利上げしか予想していないが、９月に利上げがあり、２月にも利上げが行われる可能性がある」と述べた。\n「それは、最も寛大な金利が少しずつ上昇する可能性があることを意味する。新しい普通預金口座を探しているなら、お買い得品に常に目を光らせて、その期間が続くうちに素早く行動する価値があります。」\nしかし彼女はさらに、「新たな住宅ローンを検討している人にとっては悲惨なニュースだ。住宅ローン金利は軒並み低下していたが、今週は大幅に上昇した。」\n関連トピック\n- 8 時間前に公開\n- 18 時間前に公開",
