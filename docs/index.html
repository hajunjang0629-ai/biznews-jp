    "id": "tehran-s-hormuz-threat-risks-global-fall-902ecc17",
    "title": "Tehran's Hormuz threat risks global fallout, Rubio warns as U.S. strikes Iran for 11th straight night",
    "titleJa": "米国が11夜連続でイランを攻撃する中、テヘランのホルムズの脅威は世界的な影響の危険性があるとルビオ氏が警告",
    "summaryJa": "マルコ・ルビオ米国務長官は水曜日、イランがホルムズ海峡合意を遵守していないと非難する一方、米国は中東における「外交に全力を尽くしている」と繰り返した。同氏のコメントは、米中央軍が「ホルムズ海峡で商船を脅かすイランの能力を低下させ続ける」ことを目指して、11夜連続でイランの目標を攻撃している中で出された。",
    "bodyOriginal": "U.S. Secretary of State Marco Rubio on Wednesday accused Iran of not honoring the Strait of Hormuz deal, while reiterating that Washington was \"committed to diplomacy\" in the Middle East.\nHis comments come as U.S. Central Command hit Iranian targets for an 11th straight night, as it seeks to \"continue degrading Iran's ability to threaten commercial shipping in the Strait of Hormuz.\"\nCentcom said it had hit military operations centers, drone storage facilities, and military logistics infrastructure.\nSpeaking at the ASEAN Foreign Ministers' meeting in the Philippines, Rubio said that \"the problem we're having right now is that they're not serious about talks. If they're serious, we're serious. If they're not, then we will do what is necessary to protect our interest and also the interest of our allies.\"\nHe added that a key sticking point between Teheran and Washington was that Iran \"demands the right\" to control traffic in the Strait of Hormuz, a right it does not have under international law.\n\"If we create a precedent in the Middle East, where a nation state can decide that they are going to control an international waterway, charge a toll, and if you don't pay them, blow up your ships, we have created a very dangerous precedent, which will repeat itself in other parts of the world, including in this region,\" Rubio warned.\nRubio appeared to make a veiled reference to China, saying that \"of all the regions in the world, the one I don't need to teach about the importance of freedom of navigation in international waterways, it is this region.\"\nThe U.S. Navy has in the past conducted \"freedom of navigation\" operations around disputed islands in the South China Sea, where several Southeast Asian countries have competing claims with China, whose \"nine-dash line\" claims almost all of the sea as its waters.\nThat is despite a 2016 ruling by the Permanent Court of Arbitration that said that China's claims has no basis under international law. China has refused to recognize that outcome.\nU.S. and Iran had signed an interim memorandum of understanding on June 17 that halted military operations, called for the reopening of Hormuz and established a 60-day window for negotiating a permanent agreement, including terms covering Iran's nuclear program. But the document left the future management of the Strait of Hormuz unresolved.\nIran interpreted the text as recognizing a role for Tehran in managing traffic through the strait and potentially charging for maritime services after an initial 60-day period, but the U.S. maintained that the waterway must remain open without compulsory Iranian fees or restrictions.\nIran and Oman — which also border the Hormuz Strait — said in a joint June 23 statement that \"All arrangements related to the Strait of Hormuz must fully respect the sovereignty and sovereign rights of the two Coastal States of the Strait.\"\nThe strikes on Iran are \"consequences\" for Tehran not keeping their word, he said, adding \"If these consequences did not exist, then today we would be living in a world where the significant percentage of the energy supply of this region and 20% of the energy supply of the world is being held hostage by a nation state.\"",
    "bodyJa": "マルコ・ルビオ米国務長官は水曜日、イランがホルムズ海峡合意を遵守していないと非難する一方、米国は中東における「外交に全力を尽くしている」と繰り返した。\n同氏のコメントは、米中央軍が「ホルムズ海峡で商船を脅かすイランの能力を低下させ続ける」ことを目指して、11夜連続でイランの目標を攻撃している中で出された。\nセントコムは、軍事作戦センター、ドローン保管施設、軍事物流インフラが被害を受けたと発表した。\nルビオ氏はフィリピンで開催されたＡＳＥＡＮ外相会議で、「われわれが現在抱えている問題は、彼らが協議に真剣でないことだ。彼らが真剣であれば、われわれも真剣だ。もし彼らがそうでないのであれば、われわれはわれわれの利益と同盟国の利益を守るために必要なことを行う」と述べた。\n同氏は、テヘランと米国の間の主要な対立点は、イランがホルムズ海峡の交通を規制する「権利を要求している」ことであり、この権利は国際法上イランにはない、と付け加えた。\n「中東で国家が国際水路を管理し、通行料を請求し、支払わなければ船を爆破するという決定を下すことができるという前例を作ってしまえば、我々は非常に危険な前例を作ったことになり、この地域を含む世界の他の地域でも同じことが繰り返されることになる」とルビオ氏は警告した。\nルビオ氏は、秘密裏に中国に言及したようで、「世界のあらゆる地域の中で、国際水路における航行の自由の重要性について教える必要がないのはこの地域だ」と述べた。\n米海軍は過去に南シナ海の係争中の島々周辺で「航行の自由」作戦を実施したことがあるが、同海では東南アジアの数カ国が中国と領有権を争っており、同国の「九段線」で海のほぼ全域を自国の水域と主張している。\n中国の主張は国際法上根拠がないとの常設仲裁裁判所の2016年の判決にもかかわらずだ。中国はその結果を認めることを拒否している。\n米国とイランは6月17日、軍事作戦の停止、ホルムズの再開を求め、イランの核開発計画を含む条件を含む恒久的合意の交渉に60日間の猶予期間を設ける暫定覚書に署名していた。しかし、この文書はホルムズ海峡の将来の管理を未解決のままにした。\nイランはこの文書を、海峡の交通管理におけるテヘランの役割を認識し、最初の60日間の期間後に海上サービスに料金を請求する可能性を認めていると解釈したが、米国はイランによる強制的な料金や制限なしに水路は開通したままでなければならないと主張した。\n同じくホルムズ海峡に接するイランとオマーンは6月23日の共同声明で、「ホルムズ海峡に関連するすべての取り決めは、同海峡の沿岸2国の主権と主権を完全に尊重しなければならない」と述べた。\n同氏は、イランへの攻撃はイラン政府が約束を守らなかったことによる「結果」であると述べ、「これらの結果が存在しなかったなら、私たちは今日、この地域のエネルギー供給のかなりの割合、そして世界のエネルギー供給の20％が国民国家によって人質に取られている世界に住んでいることになるだろう」と付け加えた。",

  {
    "id": "these-japanese-ai-winners-don-t-make-chi-c8e3b88c",
    "title": "These Japanese AI winners don’t make chips. They make toilets, glass fiber and seasoning",
    "titleJa": "これら日本の AI 勝者はチップを製造しません。トイレ、ガラス繊維、調味料などを製造している",
    "summaryJa": "投資家の注目が半導体業界に集まる中、ハイテクとはまったく異なるビジネスを展開するいくつかの隠れた優良企業が、AIブームに乗って市場の勝者となっていることが判明した。TOTOは高級トイレで最もよく知られており、日東紡は繊維とガラス繊維を製造し、味の素はMSG調味料を製造している。同社のコア技術を活用してAIサプライチェーンの恩恵を受けるため、今年の株価はそれぞれ78％、63％、61％上昇した。",
    "bodyOriginal": "At a time when investor attention has been on the semiconductor industry, some hidden gems with businesses quite dissimilar to high tech have turned out to be market winners, riding the AI boom.\nToto is best known for high-end toilets, Nittobo makes textiles and glass fiber, and Ajinomoto makes MSG seasoning. Their shares have gained 78%, 63% and 61%, respectively, this year, as they make use of their core technologies to benefit from the AI supply chain.\nToto makes ceramic electrostatic chucks used in semiconductor manufacturing equipment, while Nittobo supplies advanced glass fiber used in semiconductor package substrates.\nAjinomoto makes insulating material, known as \"build-up film\" or ABF, used in semiconductor packaging for high-performance computers and data-center servers.\nAll three companies reported sharp growth in businesses tied to semiconductor demand for their full financial years ended March 31, highlighting the impact of the AI boom.\nToto: plugging away\nThe company's advanced ceramics business enjoyed higher profit margin than its housing equipment segment, thanks to demand from IoT, digital transformation, AI and data centers for advanced semiconductor equipment.\nToto, in its full year results, said it saw a decrease in sales and profits for its core 100-year-old housing equipment unit, but this was made up by increases in revenue and profits in its advanced ceramics business.\nThe segment saw a 34% increase in annual revenue and 42% jump in operating profit, almost single-handedly pulling the overall company into growth for the financial year.\nThe company's expertise in ceramics led it to manufacture electronic chucks for semiconductor manufacturing equipment in 1988.\nThese chucks hold silicon wafers in place during the etching process inside semiconductor manufacturing equipment. Toto says that their ceramics significantly contribute to improving the manufacturing yield of advanced chips.\n\"However, we do not view one segment as superior to the other. Our Advanced Ceramics Business is a high-growth area, but we endured long periods of deficits over its 40-year history before reaching this point,\" the company said to CNBC in an email.\nIt plans to grow both segments and \"maintain a balanced ratio\" for sustainable overall growth, and \"absolutely no plans\" to pivot away from its core housing equipment business, as it provides a stable foundation for the company's balance sheet, while the chip sector remains volatile.\nNittobo: looking to ride the boom\nNittobo said electronic materials were already its mainstay, as it continues to develop markets for its traditional glass-fiber business. Its T-glass product, launched in 1984, is used in printed circuit boards, and electronic components.\nThe company told CNBC that its T-glass and other electronic materials are \"the pillar\" of its growth for the next decade, and that AI semiconductor demand was changing how it allocates capital expenditure, research and development, and human resources.\nNittobo's results tell the story: the company said that strong demand related to AI servers, as well as factors such as strong sales of \"Special Glass\" pushed up sales and profits for the electronics materials business segment.\nNet sales in the electronic materials business climbed 20.4% year on year and operating profit climbed 39.7% compared to the previous financial year.\nThat segment contributed about 91% to Nittobo's net sales increase in the last financial year, according to CNBC's calculations, with the segment's profit rising by 5.5 billion yen (about $34 million), more than the company's operating profit increase of 4.4 billion yen.\nThe company said glass fiber has been used in many applications over time, including composite materials for plastic reinforcement, but now, the company sees that there is a \"very strong possibility electronic materials will remain its most important business well into the future.\"\nIn its results release, Nittobo said it \"expects to see strong demand for Special Glass used in electronic materials, particularly for servers at data centers, network equipment, and semiconductor package substrates, and will proactively strengthen its efforts to expand production capacity to meet this demand.\"\nWhile semiconductor segment becomes increasingly lucrative for the company, it is also expanding applications for its traditional glass-fiber businesses, including composite and industrial materials.\nAjinomoto: an ABF boost\nAjinomoto has found applications for its products, such as producing the ABF insulation film used in semiconductors, even as food remains its primary focus.\nAccording to Ajinomoto's website, a byproduct from the MSG manufacturing process helped the company develop technologies that eventually led to the creation of ABF.\nThe product was put on the market in 1999, and is currently used for high-performance semiconductors, including CPUs.\nAjinomoto says ABF's role has become more important as semiconductor packaging has grown more complex, and that AI, 5G and other advanced technologies will continue to drive semiconductor demand.\nThe company did not respond to CNBC's request for comment.\nAjinomoto does not break out ABF into its own segment, but said in its full year results that its \"Healthcare and Others\" segment — which include ABF — saw an increase in revenue of about 4% and business profit rising 45.1% year on year, partly due to higher revenue for electronic materials.\nThat segment, which makes up more than a third of the company's profit for this financial year, even surpassed Ajinomoto's frozen food segment in terms of revenue and profit.\n\"We foresee continued growth centered on ABFTM products in high-value-added and cutting-edge fields,\" the company said.\nThe company said it aims for a \"one-to-one balance\" between its food business and its AminoScience business, with ABF contributing to the latter.",
    "bodyJa": "投資家の注目が半導体業界に集まる中、ハイテクとはまったく異なるビジネスを展開するいくつかの隠れた優良企業が、AIブームに乗って市場の勝者となっていることが判明した。\nTOTOは高級トイレで最もよく知られており、日東紡は繊維とガラス繊維を製造し、味の素はMSG調味料を製造している。同社のコア技術を活用してAIサプライチェーンの恩恵を受けるため、今年の株価はそれぞれ78％、63％、61％上昇した。\nTOTOは半導体製造装置に使用されるセラミック静電チャックを製造し、日東紡は半導体パッケージ基板に使用される先端ガラスファイバーを供給しています。\n味の素は、高性能コンピューターやデータセンターサーバーの半導体パッケージに使用される「ビルドアップフィルム」またはABFとして知られる絶縁材料を製造しています。\n3社とも3月31日終了の通期決算で半導体需要に関連した事業が急成長したと報告し、AIブームの影響を浮き彫りにした。\nトト: プラグイン\n同社のアドバンストセラミックス事業は、IoT、デジタルトランスフォーメーション、AI、最先端半導体装置のデータセンターからの需要のおかげで、住宅設備機器部門よりも高い利益率を達成した。\nＴＯＴＯは通期決算で、創業１００年を超える主力の住宅設備機器部門が減収減益となったが、アドバンストセラミックス事業の増収増益で補ったと発表した。\nこの部門では年間収益が 34% 増加し、営業利益が 42% 増加し、ほぼ単独で会社全体を会計年度の成長に導きました。\n同社はセラミックスに関する専門知識を活かし、1988 年に半導体製造装置用の電子チャックの製造を開始しました。\nこれらのチャックは、半導体製造装置内のエッチングプロセス中にシリコンウェーハを所定の位置に保持します。 TOTO は、同社のセラミックスが先進チップの製造歩留まりの向上に大きく貢献していると述べています。\n「しかし、当社は一方のセグメントが他方より優れているとは考えていない。当社のアドバンストセラミックス事業は高成長分野だが、ここに至るまで40年の歴史の中で長期間の赤字に耐えてきた」と同社はCNBCに電子メールで述べた。\n同社は両セグメントを成長させ、持続可能な全体的な成長に向けて「バランスの取れた比率を維持」する計画であり、チップ部門が依然として不安定な一方で、同社のバランスシートの安定した基盤となる中核の住宅機器事業から軸足を移す計画は「全くない」。\n日東紡：ブームに乗りたい\n日東紡は、従来のガラス繊維事業の市場開拓を継続しており、電子材料はすでに同社の主力であると述べた。 1984 年に発売された同社の T ガラス製品は、プリント基板や電子部品に使用されています。\n同社はCNBCに対し、Tガラスやその他の電子材料が今後10年間の成長の「柱」であり、AI半導体の需要により設備投資、研究開発、人材の配分方法が変化していると語った。\n日東紡の業績は、AIサーバー関連の需要が堅調であったことや、「特殊ガラス」の販売好調などが電子材料事業部門の売上高と利益を押し上げたと発表した。\n電子材料事業の売上高は前期比20.4％増、営業利益は前期比39.7％増となりました。\nCNBCの計算によると、同部門は前会計年度の日東紡の純売上高増加に約91％貢献し、同部門の利益は55億円（約3,400万ドル）増加し、同社の営業利益の増加44億円を上回った。\n同社は、ガラス繊維は長年にわたってプラスチック強化用の複合材料を含む多くの用途に使用されてきたが、現在では「電子材料が将来にわたって最も重要な事業であり続ける可能性が非常に高い」と同社は見ていると述べた。\n日東紡は決算発表の中で、「電子材料用途の特殊ガラス、特にデータセンターのサーバーやネットワーク機器、半導体パッケージ基板などの需要が堅調に推移すると見込んでおり、この需要に応えるべく生産能力の拡大を積極的に強化していきます」と述べた。\n同社にとって半導体部門の収益性はますます高まっているが、複合材料や産業材料など、従来のガラス繊維事業の用途も拡大している。\n味の素：ABF強化\n味の素は食品を中心にしながらも、半導体に使われるABF絶縁膜の製造など、自社製品の用途を見出している。\n味の素のウェブサイトによると、MSG製造プロセスの副産物が同社の技術開発に役立ち、最終的にABFの誕生につながったという。\n1999年に発売され、現在ではCPUをはじめとする高性能半導体に採用されています。\n味の素は、半導体パッケージングがより複雑になるにつれてABFの役割がより重要になっており、AI、5G、その他の先進技術が半導体需要を引き続き促進すると述べている。\n同社はCNBCのコメント要請に応じなかった。\n味の素はABFを自社セグメントに分割していないが、通期決算では、ABFを含む「ヘルスケア・その他」セグメントは、電子材料の増収もあり、前年同期比約4％の増収、45.1％の事業利益が増加したと述べた。\n同部門は今会計年度の同社利益の3分の1以上を占め、売上高と利益の点で味の素の冷凍食品部門をも上回った。\n同社は「ABFTM製品を中心に高付加価値・最先端分野での継続的な成長が見込まれる」としている。\n同社は、食品事業とアミノサイエンス事業の「1対1のバランス」を目指しており、ABFは後者に貢献すると述べた。",

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getCategories() {
  const cats = new Set(ARTICLES.map((a) => a.category));
  return ["すべて", ...cats];
}

function getArticleById(id) {
  return ARTICLES.find((a) => a.id === id);
}

function getArticlesByCategory(category) {
  if (!category || category === "すべて") return ARTICLES;
  return ARTICLES.filter((a) => a.category === category);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function paragraphs(text) {
  return text.split("\n\n").filter(Boolean);
}


let activeCategory = "すべて";

function navigate(hash) {
  if (hash) location.hash = hash;
  else {
    history.pushState(null, "", location.pathname + location.search);
    location.hash = "";
  }
  render();
  window.scrollTo(0, 0);
}

function updateMobileBar(show) {
  const bar = document.getElementById("mobile-back-bar");
  document.body.classList.toggle("has-mobile-bar", show);
  if (bar) bar.classList.toggle("hidden", !show);
}

function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("article/")) {
    return { page: "article", id: decodeURIComponent(h.slice(8)) };
  }
  return { page: "home" };
}

function renderHome() {
  document.title = "BizNews JP | ビジネスニュース和訳";
  updateMobileBar(false);
  const main = document.getElementById("app");
  main.className = "main-content";
  main.innerHTML = `
    <section>
      <h1 class="page-title">ビジネスニュース</h1>
      <p class="page-desc">世界の主要メディアから厳選。要約と全文和訳付き。</p>
    </section>
    <div class="category-bar" id="category-bar" role="tablist" aria-label="カテゴリ"></div>
    <div id="articles-container"></div>
    <div class="info-box">
      <strong>記事の読み方：</strong>
      各記事を開くと、まず全文の要約（日本語）が表示されます。その下に和訳全文を掲載しています。原文は折りたたみで確認できます。
    </div>`;
  renderCategories();
  renderArticles();
}

function renderCategories() {
  const bar = document.getElementById("category-bar");
  if (!bar) return;
  const categories = getCategories();
  bar.innerHTML = categories
    .map(
      (cat) =>
        `<button type="button" class="cat-btn${cat === activeCategory ? " active" : ""}" data-category="${escapeHtml(cat)}" role="tab">${escapeHtml(cat)}</button>`
    )
    .join("");
  bar.querySelectorAll(".cat-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      renderCategories();
      renderArticles();
    });
  });
}

function renderArticles() {
  const container = document.getElementById("articles-container");
  if (!container) return;
  const filtered = getArticlesByCategory(activeCategory);
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0">該当する記事がありません。</p>';
    return;
  }
  const [featured, ...rest] = filtered;
  let html = "";
  if (featured) {
    html += `
      <a href="#article/${encodeURIComponent(featured.id)}" class="featured-card" style="margin-bottom:0.75rem;display:block">
        <div class="featured-img-wrap">
          <img src="${featured.imageUrl}" alt="${escapeHtml(featured.titleJa)}" loading="lazy" />
          <div class="featured-overlay"></div>
          <div class="featured-overlay-text">
            <span class="badge">${escapeHtml(featured.category)}</span>
            <h2 class="featured-title">${escapeHtml(featured.titleJa)}</h2>
          </div>
        </div>
        <div class="card-body">
          <p class="card-summary">${escapeHtml(featured.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(featured.source)}</span><span>·</span>
            <span>${formatDate(featured.publishedAt)}</span><span>·</span>
            <span>${featured.readTime}分で読める</span>
          </div>
        </div>
      </a>`;
  }
  if (rest.length) {
    html += '<div class="articles-list">' + rest.map((a) => `
      <a href="#article/${encodeURIComponent(a.id)}" class="article-card">
        <div class="card-thumb"><img src="${a.imageUrl}" alt="${escapeHtml(a.titleJa)}" loading="lazy" /></div>
        <div class="card-content">
          <span class="badge badge-light">${escapeHtml(a.category)}</span>
          <h3 class="card-title">${escapeHtml(a.titleJa)}</h3>
          <p class="card-summary" style="-webkit-line-clamp:2;margin-top:0.25rem">${escapeHtml(a.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(a.source)}</span><span>·</span>
            <span>${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </a>`).join("") + "</div>";
  }
  container.innerHTML = html;
}

function renderArticlePage(id) {
  const article = getArticleById(id);
  const main = document.getElementById("app");
  main.className = "main-content article-detail";
  if (!article) {
    document.title = "記事が見つかりません | BizNews JP";
    updateMobileBar(false);
    main.innerHTML = `
      <div class="not-found">
        <h1>記事が見つかりません</h1>
        <p>お探しの記事は存在しないか、削除された可能性があります。</p>
        <a href="#" class="btn-primary" onclick="navigate('');return false;">トップに戻る</a>
      </div>`;
    return;
  }
  updateMobileBar(true);
  document.title = article.titleJa + " | BizNews JP";
  const parasJa = paragraphs(article.bodyJa).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  const parasEn = paragraphs(article.bodyOriginal).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  main.innerHTML = `
    <a href="#" class="back-link" onclick="navigate('');return false;">← 記事一覧に戻る</a>
    <div class="article-hero"><img src="${article.imageUrl}" alt="${escapeHtml(article.titleJa)}" /></div>
    <header class="article-header">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;margin-bottom:0.75rem">
        <span class="badge">${escapeHtml(article.category)}</span>
        <span style="font-size:0.75rem;color:#94a3b8">${escapeHtml(article.source)}</span>
      </div>
      <h1 class="article-h1">${escapeHtml(article.titleJa)}</h1>
      <p class="article-title-en">${escapeHtml(article.title)}</p>
      <div class="card-meta">
        <time datetime="${article.publishedAt}">${formatDate(article.publishedAt)}</time>
        <span>·</span><span>約${article.readTime}分で読める</span>
      </div>
    </header>
    <section>
      <div class="section-heading"><div class="section-bar"></div><h2>要約</h2></div>
      <div class="summary-box"><p>${escapeHtml(article.summaryJa)}</p></div>
    </section>
    <section>
      <div class="section-heading"><div class="section-bar gray"></div><h2>和訳全文</h2></div>
      <div class="translation-box">${parasJa}</div>
    </section>
    <section>
      <button type="button" class="toggle-btn" id="toggle-original" aria-expanded="false">
        <span>原文（英語）を表示する</span><span class="arrow">▼</span>
      </button>
      <div class="original-box hidden" id="original-box">${parasEn}</div>
    </section>
    <p class="source-line">出典：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.source)}</a></p>`;
  const toggleBtn = document.getElementById("toggle-original");
  const originalBox = document.getElementById("original-box");
  toggleBtn.addEventListener("click", () => {
    const isHidden = originalBox.classList.toggle("hidden");
    const isOpen = !isHidden;
    toggleBtn.classList.toggle("open", isOpen);
    toggleBtn.setAttribute("aria-expanded", String(isOpen));
    toggleBtn.querySelector("span").textContent = isOpen ? "原文（英語）を隠す" : "原文（英語）を表示する";
  });
}

function render() {
  const route = getRoute();
  if (route.page === "article") renderArticlePage(route.id);
  else renderHome();
}

window.addEventListener("hashchange", render);
window.addEventListener("popstate", render);
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.getElementById("mobile-back-btn");
  if (backBtn) backBtn.addEventListener("click", () => navigate(""));
  render();
});
