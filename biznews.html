    "bodyOriginal": "Five headaches Andy Burnham will have to deal with as PM\n- Published\nWhen Andy Burnham enters No 10 Downing Street, he will inherit some formidable and complex problems that successive prime ministers and governments have attempted to address - mostly without success.\nBBC Verify has looked at five big policy challenges Burnham will face and the approaches he might take to address them.\nWelfare: Cutting £58bn sickness and disability bill\nThe cost of sickness and disability benefits for people of working age has grown rapidly since the Covid pandemic and now stands at around £58bn a year, external.\nAnd it's projected to rise to £78bn a year by 2030, external.\nThe biggest driver of the increase is the number of people claiming Personal Independence Payments (Pip) - a working age benefit designed to support people with disabilities that increase their living costs.\nThe number of people claiming Pip is forecast to rise from four million today, to five million by 2030, external.\nThe share of people who are younger and claiming Pip for mental health problems or neurodevelopmental disorders such as ADHD is also rising fast.\nThe previous Conservative government attempted to reform the working age disability welfare system but the cost continued to rise during their time in office, external.\nLast year, Sir Keir Starmer's government tried to reduce the Pip bill by £5bn a year by 2030 by tightening eligibility - but had to do a U-turn after a revolt by Labour MPs.\nA recent interim report by the disability minister, Sir Stephen Timms, external, co-produced with disability groups, accepts that Pip is \"not fit for purpose\".\nThe final Timms report is expected to propose reforms to the system later this year, which Burnham could adopt.\nThere has been speculation, external this could involve offering young people with mental health problems therapy or other support rather than cash.\nBut there remains the risk of backlash from disability groups and potentially Labour MPs if the reforms are considered unfair.\nBurnham has recently said, external he does want to reduce the welfare bill, but by encouraging people into work and not through \"crude cuts\".\nDefence: Finding £9bn extra a year\nAfter a delay of almost a year, Starmer finally published the government's Defence Investment Plan in June.\nThis led to an outcry in some quarters because it only took defence spending to 2.7% of GDP by 2030.\nAnd it was not fully funded, requiring savings to be extracted from other Whitehall departments.\nThe pressure on Burnham to lift defence spending to 3% of GDP by 2030 from the former defence secretary John Healey, who resigned over the issue, and the defence establishment will continue.\nBut this would cost an additional £9bn a year relative to the current plans.\nAnother challenge for Burnham is the new Nato target of raising defence spending to 3.5% by 2035. That would cost an additional £24bn a year relative to current plans.\nSome have suggested, external this could be paid for by the Treasury issuing special \"war bonds\", to avoid the need to raise taxes or cut spending elsewhere.\nAnother challenge for Burnham if he does spend more on defence is reforming defence procurement - buying and developing planes, ships, vehicles and weapons - which has been historically wasteful.\nOf 47 major defence investment spending projects only three were rated \"green\" by the National Infrastructure & Service Transformation Authority, external in 2025, meaning likely to be successfully delivered on time and at the right quality.\nSocial care: Two million older people living with unmet care needs\nThe social care system in England - which is delivered mainly by independent providers rather than the NHS - is widely perceived as underfunded and unfair.\nPublic funding is means tested and it is estimated, external that there are two million older people in England now living with some unmet need for social care.\nAnd around 10% of people aged 65 and over face lifetime care costs above £100,000 for their care.\nBurnham has himself described it as a \"broken\" system., external\nAnd , externalhe made an attempt to reform it, external when he was health secretary in Gordon Brown's cabinet, though his plan was abandoned after Labour lost the 2010 election.\nA government-commissioned report by the economist Andrew Dilnot in 2011, external proposed a state-funded cap on lifetime care costs, of around £35,000, meaning no one would be required to pay more than that to fund their own care.\nThe principle of a state-funded cap was accepted by Conservative ministers, but the Dilnot system was never implemented.\nFormer Prime Minister Theresa May put a separate plan for a new system of social care support into the 2017 Tory manifesto, which proposed including the value of a person's home in the means test for care received in an individual's home - and did not initially mention a cap on lifetime contributions.\nThis proved controversial because homeowners could have been required to contribute more towards their care costs, external based on the value of their property.\nBut the former PM was forced to reverse course within days and the proposal was blamed for the loss of the Tory majority in that election.\nLabour's 2024 manifesto, external pledged a new \"national care service\".\nBut Starmer kicked the reform can down the road when he became PM and commissioned Baroness Casey to produce a review on options for reform, external, instructing her to deliver her final report by 2028.\nBurnham has suggested he will ask Baroness Casey to report back sooner - by the end of 2026 - and could choose to implement her recommendations.\nBut any reform is likely to cost money, likely billions of pounds a year.\nIn the past, Burnham has suggested changing inheritance tax to pay for social care reform, external, floating the idea of a 10% levy on all estates.\nHowever, polling frequently suggests inheritance tax is widely regarded as the least fair tax, external. It should be said more recently he has said he is open to getting rid of inheritance tax completely, external and instead moving to tax \"the wealthy properly while they are alive\".\nHousing: 1.5m new homes promised, only 204,000 delivered last year\nThe government promised to deliver 1.5m new homes in England over the five years of this Parliament, which would imply an average annual rate of 300,000.\nBut it is badly off track, with only 204,000 delivered in the 12 months to March 2026.\nBurnham has said he wants to deliver \"the biggest council house building programme since the post-war period\", though he has not defined what this means.\nBut the facts are stark. English councils built just 1,970 homes to rent in 2025, external, down from a construction rate of almost 200,000 a year in the 1950s.\nThe Starmer government has already committed to spend around £4bn a year in state subsidies, external to deliver around 30,000 \"social and affordable\" homes a year, which includes homes for people to buy.\nBurnham could devote all of this money to councils or housing associations to try to increase the amount of new council and social housing being built.\nBut it is estimated that to deliver major uplift in these forms of housing would require an extra £13bn per year of state subsidy, external on top of the existing £4bn per year spending commitments.\nBurnham could potentially attempt to borrow to fund more public housing, but he would have to ensure this was consistent with the fiscal rules he has also said he will retain.\nNeets: Getting a million young people into work\nJust over one million young people in the UK aged 16-24 are not in employment, education or training (Neets), external, around one in seven of the total.\nThe UK's Neet rate was in the middle of the pack of European Union countries in 2015. But in 2025 it had risen to the second highest, after Romania.\nOne of the possible contributing factors, external to that rising Neet rate is that the number of 19- to 24-year-olds starting apprenticeship courses has fallen by a fifth, external since what is widely regarded as a botched reform of the system in 2016 by the previous government.\nA recent government-commissioned report by former Labour cabinet minister Alan Milburn described the Neet rate as an \"urgent national crisis\"; he will propose policy recommendations later this year.\nBurnham will be able to pick up these proposals, although they might come with an up-front cost attached if they involve greater investment in training opportunities or guaranteed work placements.\nIs it possible we will see more support for vocational training?\nBurnham has said recently, external that the school system is too focused on the university route.\nBut many governments in recent decades have proclaimed a need for a greater focus on support for non-graduates, yet have often still tended to focus more attention and resources on university students and higher education, external, rather than on vocational qualifications and further education.",
    "bodyJa": "アンディ・バーナムが首相として対処しなければならない5つの頭痛\n- 公開されました\nアンディ・バーナムがダウニング街10番街に参入するとき、彼は歴代の首相や政府が対処しようとしてきたものの、ほとんどが成功しなかったいくつかの恐るべき複雑な問題を引き継ぐことになる。\nBBC Verifyは、バーナムが直面する5つの大きな政策課題と、それらに対処するために彼が採り得るアプローチを検討した。\n福祉: 580億ポンドの疾病・障害関連法案を削減\n生産年齢の人々に対する病気や障害給付金の費用は、新型コロナウイルスのパンデミック以来急速に増加しており、現在、対外的には年間約580億ポンドに達している。\nそして、対外的には 2030 年までに年間 780 億ポンドに増加すると予測されています。\nこの増加の最大の要因は、生活費を増加させる障害のある人々を支援するために設計された労働年齢手当である個人独立手当（Pip）を請求する人の数です。\nピップを主張する人の数は、現在の 400 万人から 2030 年までに 500 万人に増加すると予測されています。\n精神的健康上の問題やADHDなどの神経発達障害を理由にPipを主張する若年層の割合も急速に上昇している。\n前保守党政権は労働年齢障害福祉制度の改革を試みたが、その費用は政権在任中に対外的に上昇し続けた。\n昨年、キア・スターマー卿の政府は受給資格を厳格化することで、2030年までにピップ請求額を年間50億ポンド削減しようとしたが、労働党議員らの反乱を受けて方向転換を余儀なくされた。\n障害大臣であるスティーブン・ティムズ卿による最近の中間報告書は、障害者団体と共同で作成した外部の報告書で、ピップが「目的に適していない」ことを認めている。\nティムズの最終報告書は今年後半にシステムの改革を提案する予定で、バーナムがそれを採用する可能性がある。\n対外的には、メンタルヘルス上の問題を抱える若者に現金ではなくセラピーやその他の支援を提供することが含まれるのではないかという憶測もある。\nしかし、改革が不公平であるとみなされた場合、障害者団体や潜在的には労働党議員からの反発を受けるリスクが依然としてある。\nバーナム氏は最近、対外的には生活保護費を削減したいが、「粗削り」ではなく人々の就労を奨励することによって削減したいと述べた。\n防衛：年間90億ポンドの追加資金を見つける\n1年近くの遅れを経て、スターマー氏はようやく6月に政府の国防投資計画を発表した。\n2030年までに防衛費がGDPの2.7％にとどまるため、これは一部で反発を招いた。\nまた、十分な資金が提供されていなかったため、ホワイトホールの他の部門から節約を引き出す必要がありました。\nこの問題で辞任したジョン・ヒーリー前国防長官と国防体制から、バーナムに対し、2030年までに国防支出を国内総生産（GDP）比3％まで引き上げるよう圧力は続くだろう。\nしかし、これには現在の計画と比較して年間90億ポンドの追加費用がかかることになる。\nバーナムにとってのもう一つの課題は、2035年までに国防支出を3.5%に引き上げるというNATOの新たな目標である。これには、現在の計画と比べて年間240億ポンドの追加費用がかかることになる。\n対外的には、増税や他の支出削減の必要性を避けるために、財務省が特別な「戦時公債」を発行することでこの費用をまかなえるのではないかと示唆する人もいる。\nバーナムが防衛にさらに支出する場合のもう一つの課題は、歴史的に無駄だった航空機、船舶、車両、兵器の購入と開発といった防衛調達の改革だ。\n主要な防衛投資支出プロジェクト 47 件のうち、2025 年に外部の国家インフラ・サービス変革局によって「グリーン」と評価されたのは 3 件のみであり、これは、予定どおり適切な品質で正常に実行される可能性が高いことを意味します。\n社会的ケア：満たされていないケアニーズを抱えて暮らす200万人の高齢者\n英国の社会保障制度は、主にNHSではなく独立した医療提供者によって提供されているが、資金不足で不公平であると広く認識されている。\n公的資金の投入は資力を試されており、英国には現在200万人の高齢者が満たされていない社会的ケアのニーズを抱えて暮らしていると外部から推定されている。\nまた、65 歳以上の人の約 10% が、生涯にわたって 10 万ポンドを超える介護費用に直面しています。\nバーナム自身、これを「壊れた」システムだと述べています。\nそして、彼はゴードン・ブラウン内閣の保健長官だったときに外部的に改革を試みたが、2010年の選挙で労働党が負けた後、彼の計画は放棄された。\n経済学者のアンドリュー・ディルノット氏が政府に委託した2011年の報告書では、国が負担する生涯介護費用の上限を約3万5000ポンドとすることを提案しており、これは誰も自分の介護に資金を提供するためにそれ以上支払う必要はないことを意味している。\n国家資金による上限の原則は保守党閣僚によって受け入れられたが、ディルノット制度は決して実施されなかった。\nテリーザ・メイ前首相は、2017年の保守党マニフェストに新たな社会的養護支援システムに関する別の計画を盛り込み、個人の自宅で受けられるケアの資力調査に自宅の価値を含めることを提案したが、当初は生涯拠出金の上限については言及していなかった。\nこれは物議を醸した。なぜなら、住宅所有者は、その財産の価値に基づいて、外部から介護費用に対してより多くの拠出を求められる可能性があったからである。\nしかし、前首相は数日以内に方向転換を余儀なくされ、この提案がその選挙で保守党の過半数を失った原因だと非難された。\n労働党の2024年マニフェストでは、新たな「国民介護サービス」を対外的に約束した。\nしかし、スターマー氏は首相に就任すると改革の可能性を蹴り、ケイシー男爵夫人に改革のオプションに関する外部レビューの作成を依頼し、2028年までに最終報告書を提出するよう指示した。\nバーナム氏は、ケイシー男爵夫人にもっと早く（2026年末までに）報告するよう依頼し、彼女の勧告を実行することを選択する可能性があると示唆した。\nしかし、どのような改革にも費用がかかる可能性が高く、おそらく年間数十億ポンドに上るだろう。\nバーナム氏は過去に、社会的養護改革の費用として相続税を変更することを提案し、すべての遺産に10％課税するという考えを浮上させた。\nしかし、世論調査では、相続税が対外的に最も不公平な税金であると広く考えられていることが頻繁に示唆されています。さらに最近では、相続税を対外的に完全に廃止し、その代わりに「富裕層が生きている間に適切に」課税する方向に移行することに前向きであると述べたことは注目すべきだろう。\n住宅: 150万戸の新築住宅が約束されているが、昨年引き渡されたのは20万4,000戸のみ\n政府は、この議会の5年間で英国に150万戸の新築住宅を供給すると約束したが、これは平均年間30万戸を意味する。\nしかし、軌道からは大きく外れており、2026年3月までの12カ月で納入台数はわずか20万4000台にとどまっている。\nバーナム氏は「戦後最大の議会建設計画」を実現したいと述べたが、これが何を意味するのかは明らかにしていない。\nしかし事実は厳然たるものだ。英国の市議会が2025年に建設した外部賃貸住宅はわずか1,970戸で、1950年代の年間約20万戸の建設率に比べて減少した。\nスターマー政府はすでに、国民が購入できる住宅を含む年間約3万戸の「社会的で手頃な価格」住宅を提供するために、国からの補助金として年間約40億ポンドを支出することを約束している。\nバーナムはこの資金をすべて市議会や住宅協会に充てて、新しい市営住宅や公営住宅の建設量を増やそうとする可能性がある。\nしかし、これらの形式の住宅を大幅に改善するには、既存の年間 40 億ポンドの支出約束に加えて、年間 130 億ポンドの追加の国補助金が必要になると推定されています。\nバーナム首相は、より多くの公営住宅に資金を提供するために借り入れを試みる可能性があるが、それが維持するとも述べた財政規則と一致しているかどうかを確認する必要があるだろう。\nニート: 100 万人の若者を就労させる\n英国では16～24歳の若者100万人強が社外で雇用、教育、訓練を受けていない（ニート）、つまり全体の約7人に1人に相当する。\n英国のニート率は2015年には欧州連合諸国の中で中位だったが、2025年にはルーマニアに次いで2番目に高い水準にまで上昇した。\nニート率の上昇以外に考えられる要因の1つは、前政権による2016年の制度改革が失敗だったと広くみなされて以来、実習コースを開始する19歳から24歳の人口が5分の1減少したことだ。\n元労働党閣僚のアラン・ミルバーン氏による最近の政府委託報告書では、ニート率を「差し迫った国家危機」と表現している。同氏は今年後半に政策提言を提案する予定だ。\nバーナムはこれらの提案を受け入れることができるが、訓練の機会や就職の保証に対する多額の投資が伴う場合には、前払い費用がかかる可能性がある。\n職業訓練への支援がさらに増える可能性はあるでしょうか?\nバーナム氏は最近、学校制度が大学進学に重点を置きすぎていると対外的に述べた。\nしかしここ数十年、多くの政府は非卒業生への支援にさらに重点を置く必要があると宣言してきたにもかかわらず、職業資格やさらなる教育よりも、大学生や外部の高等教育により多くの関心とリソースを集中させる傾向が続いている。",

function formatDate(iso) {
  return new Date(iso).toLocaleDateString("ja-JP", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getCategories() {
  const cats = new Set(ARTICLES.map((a) => a.category));
  return ["すべて", ...cats];
}

function getArticleById(id) {
  return ARTICLES.find((a) => a.id === id);
}

function getArticlesByCategory(category) {
  if (!category || category === "すべて") return ARTICLES;
  return ARTICLES.filter((a) => a.category === category);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function paragraphs(text) {
  return text.split("\n\n").filter(Boolean);
}


let activeCategory = "すべて";

function navigate(hash) {
  if (hash) location.hash = hash;
  else {
    history.pushState(null, "", location.pathname + location.search);
    location.hash = "";
  }
  render();
  window.scrollTo(0, 0);
}

function updateMobileBar(show) {
  const bar = document.getElementById("mobile-back-bar");
  document.body.classList.toggle("has-mobile-bar", show);
  if (bar) bar.classList.toggle("hidden", !show);
}

function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (h.startsWith("article/")) {
    return { page: "article", id: decodeURIComponent(h.slice(8)) };
  }
  return { page: "home" };
}

function renderHome() {
  document.title = "BizNews JP | ビジネスニュース和訳";
  updateMobileBar(false);
  const main = document.getElementById("app");
  main.className = "main-content";
  main.innerHTML = `
    <section>
      <h1 class="page-title">ビジネスニュース</h1>
      <p class="page-desc">世界の主要メディアから厳選。要約と全文和訳付き。</p>
    </section>
    <div class="category-bar" id="category-bar" role="tablist" aria-label="カテゴリ"></div>
    <div id="articles-container"></div>
    <div class="info-box">
      <strong>記事の読み方：</strong>
      各記事を開くと、まず全文の要約（日本語）が表示されます。その下に和訳全文を掲載しています。原文は折りたたみで確認できます。
    </div>`;
  renderCategories();
  renderArticles();
}

function renderCategories() {
  const bar = document.getElementById("category-bar");
  if (!bar) return;
  const categories = getCategories();
  bar.innerHTML = categories
    .map(
      (cat) =>
        `<button type="button" class="cat-btn${cat === activeCategory ? " active" : ""}" data-category="${escapeHtml(cat)}" role="tab">${escapeHtml(cat)}</button>`
    )
    .join("");
  bar.querySelectorAll(".cat-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeCategory = btn.dataset.category;
      renderCategories();
      renderArticles();
    });
  });
}

function renderArticles() {
  const container = document.getElementById("articles-container");
  if (!container) return;
  const filtered = getArticlesByCategory(activeCategory);
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#64748b;padding:3rem 0">該当する記事がありません。</p>';
    return;
  }
  const [featured, ...rest] = filtered;
  let html = "";
  if (featured) {
    html += `
      <a href="#article/${encodeURIComponent(featured.id)}" class="featured-card" style="margin-bottom:0.75rem;display:block">
        <div class="featured-img-wrap">
          <img src="${featured.imageUrl}" alt="${escapeHtml(featured.titleJa)}" loading="lazy" />
          <div class="featured-overlay"></div>
          <div class="featured-overlay-text">
            <span class="badge">${escapeHtml(featured.category)}</span>
            <h2 class="featured-title">${escapeHtml(featured.titleJa)}</h2>
          </div>
        </div>
        <div class="card-body">
          <p class="card-summary">${escapeHtml(featured.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(featured.source)}</span><span>·</span>
            <span>${formatDate(featured.publishedAt)}</span><span>·</span>
            <span>${featured.readTime}分で読める</span>
          </div>
        </div>
      </a>`;
  }
  if (rest.length) {
    html += '<div class="articles-list">' + rest.map((a) => `
      <a href="#article/${encodeURIComponent(a.id)}" class="article-card">
        <div class="card-thumb"><img src="${a.imageUrl}" alt="${escapeHtml(a.titleJa)}" loading="lazy" /></div>
        <div class="card-content">
          <span class="badge badge-light">${escapeHtml(a.category)}</span>
          <h3 class="card-title">${escapeHtml(a.titleJa)}</h3>
          <p class="card-summary" style="-webkit-line-clamp:2;margin-top:0.25rem">${escapeHtml(a.summaryJa)}</p>
          <div class="card-meta">
            <span>${escapeHtml(a.source)}</span><span>·</span>
            <span>${formatDate(a.publishedAt)}</span>
          </div>
        </div>
      </a>`).join("") + "</div>";
  }
  container.innerHTML = html;
}

function renderArticlePage(id) {
  const article = getArticleById(id);
  const main = document.getElementById("app");
  main.className = "main-content article-detail";
  if (!article) {
    document.title = "記事が見つかりません | BizNews JP";
    updateMobileBar(false);
    main.innerHTML = `
      <div class="not-found">
        <h1>記事が見つかりません</h1>
        <p>お探しの記事は存在しないか、削除された可能性があります。</p>
        <a href="#" class="btn-primary" onclick="navigate('');return false;">トップに戻る</a>
      </div>`;
    return;
  }
  updateMobileBar(true);
  document.title = article.titleJa + " | BizNews JP";
  const parasJa = paragraphs(article.bodyJa).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  const parasEn = paragraphs(article.bodyOriginal).map((p) => `<p>${escapeHtml(p)}</p>`).join("");
  main.innerHTML = `
    <a href="#" class="back-link" onclick="navigate('');return false;">← 記事一覧に戻る</a>
    <div class="article-hero"><img src="${article.imageUrl}" alt="${escapeHtml(article.titleJa)}" /></div>
    <header class="article-header">
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;margin-bottom:0.75rem">
        <span class="badge">${escapeHtml(article.category)}</span>
        <span style="font-size:0.75rem;color:#94a3b8">${escapeHtml(article.source)}</span>
      </div>
      <h1 class="article-h1">${escapeHtml(article.titleJa)}</h1>
      <p class="article-title-en">${escapeHtml(article.title)}</p>
      <div class="card-meta">
        <time datetime="${article.publishedAt}">${formatDate(article.publishedAt)}</time>
        <span>·</span><span>約${article.readTime}分で読める</span>
      </div>
    </header>
    <section>
      <div class="section-heading"><div class="section-bar"></div><h2>要約</h2></div>
      <div class="summary-box"><p>${escapeHtml(article.summaryJa)}</p></div>
    </section>
    <section>
      <div class="section-heading"><div class="section-bar gray"></div><h2>和訳全文</h2></div>
      <div class="translation-box">${parasJa}</div>
    </section>
    <section>
      <button type="button" class="toggle-btn" id="toggle-original" aria-expanded="false">
        <span>原文（英語）を表示する</span><span class="arrow">▼</span>
      </button>
      <div class="original-box hidden" id="original-box">${parasEn}</div>
    </section>
    <p class="source-line">出典：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.source)}</a></p>`;
  const toggleBtn = document.getElementById("toggle-original");
  const originalBox = document.getElementById("original-box");
  toggleBtn.addEventListener("click", () => {
    const isHidden = originalBox.classList.toggle("hidden");
    const isOpen = !isHidden;
    toggleBtn.classList.toggle("open", isOpen);
    toggleBtn.setAttribute("aria-expanded", String(isOpen));
    toggleBtn.querySelector("span").textContent = isOpen ? "原文（英語）を隠す" : "原文（英語）を表示する";
  });
}

function render() {
  const route = getRoute();
  if (route.page === "article") renderArticlePage(route.id);
  else renderHome();
}

window.addEventListener("hashchange", render);
window.addEventListener("popstate", render);
document.addEventListener("DOMContentLoaded", () => {
  const backBtn = document.getElementById("mobile-back-btn");
  if (backBtn) backBtn.addEventListener("click", () => navigate(""));
  render();
});

  </script>
